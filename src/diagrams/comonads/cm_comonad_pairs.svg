<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260" font-family="monospace,Arial,sans-serif">
  <rect width="700" height="260" fill="#ffffff" rx="8"/>
  <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Concrete Dual Pairs: Monad vs Comonad</text>

  <!-- Headers -->
  <rect x="10" y="36" width="220" height="26" rx="4" fill="#eef1fb"/>
  <text x="120" y="53" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a4a96">MONAD</text>
  <rect x="240" y="36" width="220" height="26" rx="4" fill="#e9f4ee"/>
  <text x="350" y="53" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f6f54">COMONAD</text>
  <rect x="470" y="36" width="220" height="26" rx="4" fill="#f7f8fa"/>
  <text x="580" y="53" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Source</text>

  <!-- Row 1: Maybe -->
  <rect x="10" y="68" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="120" y="85" text-anchor="middle" font-size="11" fill="#5872c9">Maybe</text>
  <rect x="240" y="68" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="350" y="85" text-anchor="middle" font-size="10" fill="#8a93a3">no dual (Maybe &#8775; com.)</text>
  <rect x="470" y="68" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="580" y="85" text-anchor="middle" font-size="9" fill="#8a93a3">no clean dual</text>

  <!-- Row 2: Either -->
  <rect x="10" y="100" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="120" y="117" text-anchor="middle" font-size="11" fill="#5872c9">Either e</text>
  <rect x="240" y="100" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="350" y="117" text-anchor="middle" font-size="10" fill="#8a93a3">no dual</text>
  <rect x="470" y="100" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="580" y="117" text-anchor="middle" font-size="9" fill="#8a93a3">no clean dual</text>

  <!-- Row 3: List -->
  <rect x="10" y="132" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="120" y="149" text-anchor="middle" font-size="11" fill="#5872c9">[] (List)</text>
  <rect x="240" y="132" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="350" y="149" text-anchor="middle" font-size="11" fill="#3f9d77">NonEmpty*</text>
  <rect x="470" y="132" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="580" y="149" text-anchor="middle" font-size="9" fill="#8a93a3">partial (Stream)</text>

  <!-- Row 4: State / Store -->
  <rect x="10" y="164" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="120" y="181" text-anchor="middle" font-size="11" fill="#5872c9">State s</text>
  <rect x="240" y="164" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="350" y="181" text-anchor="middle" font-size="11" fill="#3f9d77">Store s</text>
  <rect x="470" y="164" width="220" height="28" rx="3" fill="#eef1fb"/>
  <text x="580" y="181" text-anchor="middle" font-size="9" fill="#8a93a3">(-&gt;s) &#8868; (s-&gt;)</text>

  <!-- Row 5: Reader / Env -->
  <rect x="10" y="196" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="120" y="213" text-anchor="middle" font-size="11" fill="#5872c9">Reader r</text>
  <rect x="240" y="196" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="350" y="213" text-anchor="middle" font-size="11" fill="#3f9d77">Env r</text>
  <rect x="470" y="196" width="220" height="28" rx="3" fill="#f7f8fa"/>
  <text x="580" y="213" text-anchor="middle" font-size="9" fill="#8a93a3">&#916; &#8868; &#928; (diagonal-produced)</text>

  <!-- Row 6: Writer / Traced -->
  <rect x="10" y="228" width="220" height="26" rx="3" fill="#eef1fb"/>
  <text x="120" y="244" text-anchor="middle" font-size="11" fill="#5872c9">Writer w</text>
  <rect x="240" y="228" width="220" height="26" rx="3" fill="#eef1fb"/>
  <text x="350" y="244" text-anchor="middle" font-size="11" fill="#3f9d77">Traced w</text>
  <rect x="470" y="228" width="220" height="26" rx="3" fill="#eef1fb"/>
  <text x="580" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">w -&gt; a (Monoid w)</text>
</svg>
