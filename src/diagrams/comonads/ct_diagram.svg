<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">

  <rect width="860" height="420" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
    </marker>
  </defs>
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">ComonadTrans vs MonadTrans Duality</text>
  <!-- Left: MonadTrans -->
  <rect x="30" y="55" width="360" height="330" fill="#f7f8fa" stroke="#cbd5e1" rx="6"/>
  <text x="210" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">MonadTrans</text>
  <!-- m -->
  <rect x="100" y="100" width="120" height="44" fill="#f7f8fa" stroke="#5872c9" rx="5"/>
  <text x="160" y="127" text-anchor="middle" font-size="13" fill="#5872c9">m a</text>
  <!-- t m -->
  <rect x="260" y="100" width="120" height="44" fill="#f7f8fa" stroke="#8b6db5" rx="5"/>
  <text x="320" y="127" text-anchor="middle" font-size="13" fill="#8b6db5">t m a</text>
  <!-- lift -->
  <line x1="220" y1="122" x2="258" y2="122" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="239" y="115" text-anchor="middle" font-size="11" fill="#8a93a3">lift</text>
  <!-- return -->
  <rect x="100" y="175" width="120" height="44" fill="#f7f8fa" stroke="#5872c9" rx="5"/>
  <text x="160" y="202" text-anchor="middle" font-size="13" fill="#5872c9">a</text>
  <line x1="160" y1="175" x2="160" y2="144" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="170" y="165" font-size="11" fill="#8a93a3">return</text>
  <!-- bind -->
  <rect x="100" y="250" width="280" height="44" fill="#f7f8fa" stroke="#5872c9" rx="5"/>
  <text x="240" y="277" text-anchor="middle" font-size="12" fill="#5872c9">(>>=) :: m a -> (a -> m b) -> m b</text>
  <!-- class -->
  <rect x="70" y="320" width="320" height="44" fill="#ffffff" stroke="#cbd5e1" rx="5"/>
  <text x="230" y="347" text-anchor="middle" font-size="11" fill="#8a93a3">class MonadTrans t where</text>
  <text x="230" y="362" text-anchor="middle" font-size="10" fill="#5872c9">lift :: Monad m => m a -> t m a</text>
  <!-- Right: ComonadTrans -->
  <rect x="470" y="55" width="360" height="330" fill="#f7f8fa" stroke="#cbd5e1" rx="6"/>
  <text x="650" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f9d77">ComonadTrans</text>
  <!-- t w -->
  <rect x="530" y="100" width="120" height="44" fill="#f7f8fa" stroke="#8b6db5" rx="5"/>
  <text x="590" y="127" text-anchor="middle" font-size="13" fill="#8b6db5">t w a</text>
  <!-- w -->
  <rect x="690" y="100" width="120" height="44" fill="#f7f8fa" stroke="#3f9d77" rx="5"/>
  <text x="750" y="127" text-anchor="middle" font-size="13" fill="#3f9d77">w a</text>
  <!-- lower -->
  <line x1="650" y1="122" x2="688" y2="122" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="669" y="115" text-anchor="middle" font-size="11" fill="#8a93a3">lower</text>
  <!-- extract -->
  <rect x="690" y="175" width="120" height="44" fill="#f7f8fa" stroke="#3f9d77" rx="5"/>
  <text x="750" y="202" text-anchor="middle" font-size="13" fill="#3f9d77">a</text>
  <line x1="750" y1="175" x2="750" y2="144" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="760" y="165" font-size="11" fill="#8a93a3">extract</text>
  <!-- extend -->
  <rect x="530" y="250" width="280" height="44" fill="#f7f8fa" stroke="#3f9d77" rx="5"/>
  <text x="670" y="277" text-anchor="middle" font-size="12" fill="#3f9d77">extend :: (w a -> b) -> w a -> w b</text>
  <!-- class -->
  <rect x="500" y="320" width="320" height="44" fill="#ffffff" stroke="#cbd5e1" rx="5"/>
  <text x="660" y="347" text-anchor="middle" font-size="11" fill="#8a93a3">class ComonadTrans t where</text>
  <text x="660" y="362" text-anchor="middle" font-size="10" fill="#3f9d77">lower :: Comonad w => t w a -> w a</text>
  <!-- Duality arrow in middle -->
  <text x="430" y="130" text-anchor="middle" font-size="20" fill="#d9a441">&#8660;</text>
  <text x="430" y="150" text-anchor="middle" font-size="10" fill="#d9a441">dual</text>
  <text x="430" y="200" text-anchor="middle" font-size="20" fill="#d9a441">&#8660;</text>
  <text x="430" y="220" text-anchor="middle" font-size="10" fill="#d9a441">dual</text>
  <text x="430" y="270" text-anchor="middle" font-size="20" fill="#d9a441">&#8660;</text>
  <text x="430" y="290" text-anchor="middle" font-size="10" fill="#d9a441">dual</text>
</svg>