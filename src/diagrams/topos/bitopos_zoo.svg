<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" style="background:#f8f9fa;font-family:Georgia,serif"><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334466"/></marker></defs><text x="360" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#334466">Зоопарк топосов</text><rect x="18" y="48" width="155" height="72" rx="10" fill="#334466"/><text x="95" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Set</text><text x="95" y="92" text-anchor="middle" font-size="11" fill="#b0c8e8">Ω = {F,T}, класс.</text><rect x="192" y="48" width="155" height="72" rx="10" fill="#885500"/><text x="269" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Sh(X)</text><text x="269" y="92" text-anchor="middle" font-size="11" fill="#ffe0a0">Ω = Open, инт.</text><rect x="366" y="48" width="155" height="72" rx="10" fill="#663366"/><text x="443" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">[C, Set]</text><text x="443" y="92" text-anchor="middle" font-size="11" fill="#f0d0f0">предпучки</text><rect x="540" y="48" width="162" height="72" rx="10" fill="#336633"/><text x="621" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">BG (групп)</text><text x="621" y="92" text-anchor="middle" font-size="11" fill="#c0f0c0">G-множества</text><line x1="95"  y1="120" x2="200" y2="190" stroke="#334466" stroke-width="1.5" marker-end="url(#arr)"/><line x1="269" y1="120" x2="238" y2="190" stroke="#885500" stroke-width="1.5" marker-end="url(#arr)"/><line x1="443" y1="120" x2="478" y2="190" stroke="#663366" stroke-width="1.5" marker-end="url(#arr)"/><rect x="98" y="194" width="240" height="80" rx="10" fill="#553388"/><text x="218" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">BiTopos(Set)</text><text x="218" y="238" text-anchor="middle" font-size="11" fill="#e0d0ff">Ω₊={F,T}, Ω₋={F,T}</text><text x="218" y="258" text-anchor="middle" font-size="11" fill="#e0d0ff">4-значная логика</text><rect x="382" y="194" width="262" height="80" rx="10" fill="#2d5c2d"/><text x="513" y="218" text-anchor="middle" font-size="13" font-weight="bold" fill="white">BiTopos([0,1]) = Пытьев</text><text x="513" y="238" text-anchor="middle" font-size="11" fill="#c0f0c0">Ω₊ = Pl = Lan_J(τ)</text><text x="513" y="258" text-anchor="middle" font-size="11" fill="#c0f0c0">Ω₋ = Bel = Ran_J(τ)</text><text x="360" y="305" text-anchor="middle" font-size="11" fill="#885500" font-style="italic">Стрелка вниз: один классификатор → два = два мира истинности</text></svg>