<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" style="background:#f8f9fa;font-family:Georgia,serif"><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334466"/></marker><marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#663366"/></marker></defs><text x="330" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#334466">Классификатор подобъектов Ω:  Hom(A,Ω) ≅ Sub(A)</text><rect x="100" y="52" width="80" height="38" rx="8" fill="#334466"/><text x="140" y="76" text-anchor="middle" font-size="16" font-weight="bold" fill="white">S</text><rect x="310" y="52" width="80" height="38" rx="8" fill="#885500"/><text x="350" y="76" text-anchor="middle" font-size="16" font-weight="bold" fill="white">1</text><rect x="100" y="182" width="80" height="38" rx="8" fill="#334466"/><text x="140" y="206" text-anchor="middle" font-size="16" font-weight="bold" fill="white">A</text><rect x="310" y="182" width="80" height="38" rx="8" fill="#663366"/><text x="350" y="206" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Ω</text><line x1="182" y1="71" x2="308" y2="71" stroke="#334466" stroke-width="1.8" marker-end="url(#arr)"/><text x="245" y="63" text-anchor="middle" font-size="12" fill="#334466">!_S</text><line x1="140" y1="92" x2="140" y2="180" stroke="#334466" stroke-width="1.8" marker-end="url(#arr)"/><text x="118" y="142" text-anchor="middle" font-size="12" fill="#334466">m</text><line x1="350" y1="92" x2="350" y2="180" stroke="#663366" stroke-width="1.8" marker-end="url(#arrP)"/><text x="368" y="142" text-anchor="middle" font-size="12" fill="#663366">true</text><line x1="182" y1="201" x2="308" y2="201" stroke="#663366" stroke-width="1.8" marker-end="url(#arrP)"/><text x="245" y="219" text-anchor="middle" font-size="12" fill="#663366">χ_m</text><rect x="150" y="93" width="13" height="13" fill="none" stroke="#334466" stroke-width="1.3"/><text x="432" y="62" font-size="13" font-weight="bold" fill="#334466">Set:</text><text x="432" y="81" font-size="12" fill="#334466">Ω = {F,T}</text><text x="432" y="100" font-size="12" fill="#334466">χ_S(a) = T ➺ a ∈ S</text><text x="432" y="129" font-size="13" font-weight="bold" fill="#885500">Sh(X):</text><text x="432" y="148" font-size="12" fill="#885500">Ω_X(U) = Open(U)</text><text x="432" y="167" font-size="12" fill="#885500">true_U = U</text><text x="432" y="196" font-size="13" font-weight="bold" fill="#663366">Sub.Mod:</text><text x="432" y="215" font-size="12" fill="#663366">Ω = [0,1]</text><text x="432" y="234" font-size="12" fill="#663366">τ: X → [0,1]</text></svg>