<svg xmlns="http://www.w3.org/2000/svg" width="660" height="320" style="background:#f8f9fa;font-family:Georgia,serif"><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334466"/></marker></defs><text x="330" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#334466">Внутренний язык Mitchell–Benabou</text><circle cx="330" cy="105" r="38" fill="#334466"/><text x="330" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Топос</text><circle cx="110" cy="230" r="36" fill="#885500"/><text x="110" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Типы</text><circle cx="550" cy="230" r="36" fill="#663366"/><text x="550" y="235" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Логика</text><line x1="297" y1="134" x2="140" y2="200" stroke="#885500" stroke-width="1.8" marker-end="url(#arr)"/><line x1="363" y1="134" x2="520" y2="200" stroke="#663366" stroke-width="1.8" marker-end="url(#arr)"/><line x1="146" y1="240" x2="514" y2="240" stroke="#334466" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/><text x="190" y="168" text-anchor="middle" font-size="11" fill="#885500">Объекты = Типы</text><text x="472" y="168" text-anchor="middle" font-size="11" fill="#663366">Стрелки A→Ω = Предикаты</text><text x="330" y="233" text-anchor="middle" font-size="11" fill="#334466">Термы = Морфизмы</text><text x="130" y="284" text-anchor="middle" font-size="11" fill="#885500">∀x.P(x) = Ran_π(P)</text><text x="130" y="300" text-anchor="middle" font-size="11" fill="#885500">∃x.P(x) = Lan_π(P)</text><text x="330" y="284" text-anchor="middle" font-size="11" fill="#334466">π: Γ×A → Γ (проекция)</text></svg>