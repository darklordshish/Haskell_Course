<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" style="background:#f8f9fa;font-family:Georgia,serif"><text x="330" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#334466">Решётка значений истинности Ω_{Sh(X)}</text><circle cx="240" cy="78" r="26" fill="#334466"/><text x="240" y="83" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⊤</text><text x="240" y="66" text-anchor="middle" font-size="10" fill="#334466">U (топ)</text><circle cx="140" cy="168" r="24" fill="#885500"/><text x="140" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="white">V₁</text><circle cx="340" cy="168" r="24" fill="#885500"/><text x="340" y="174" text-anchor="middle" font-size="13" font-weight="bold" fill="white">V₂</text><circle cx="240" cy="258" r="26" fill="#663366"/><text x="240" y="264" text-anchor="middle" font-size="12" font-weight="bold" fill="white">V₁∩V₂</text><circle cx="240" cy="308" r="22" fill="#888"/><text x="240" y="314" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⊥</text><line x1="218" y1="100" x2="158" y2="146" stroke="#334466" stroke-width="1.5"/><line x1="262" y1="100" x2="322" y2="146" stroke="#334466" stroke-width="1.5"/><line x1="158" y1="190" x2="222" y2="236" stroke="#663366" stroke-width="1.5"/><line x1="322" y1="190" x2="258" y2="236" stroke="#663366" stroke-width="1.5"/><line x1="240" y1="284" x2="240" y2="286" stroke="#888" stroke-width="1.5"/><text x="415" y="50" font-size="13" font-weight="bold" fill="#334466">Операции:</text><text x="415" y="72" font-size="12" fill="#334466">¬U = Int(X\U)</text><text x="415" y="92" font-size="12" fill="#334466">¬¬U = Int(Cl(U))</text><text x="415" y="112" font-size="12" fill="#885500">¬¬U ≥ U (всегда)</text><text x="415" y="132" font-size="12" fill="#885500">¬¬U = U ⟺ U регулярно</text><text x="415" y="160" font-size="12" fill="#663366">U ∨ ¬U = X? Нет!</text><rect x="415" y="176" width="220" height="52" rx="8" fill="#ffe8e8" stroke="#cc4444" stroke-width="1.2"/><text x="525" y="197" text-anchor="middle" font-size="11" fill="#cc4444">U = (−1,0) ∪ (0,1):</text><text x="525" y="216" text-anchor="middle" font-size="11" fill="#cc4444">¬¬U = (−1,1) ≠ U</text></svg>