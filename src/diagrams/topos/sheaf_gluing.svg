<svg xmlns="http://www.w3.org/2000/svg" width="660" height="330" style="background:#f8f9fa;font-family:Georgia,serif"><defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334466"/></marker></defs><text x="330" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#334466">Условие склейки пучка</text><rect x="145" y="34" width="370" height="36" rx="7" fill="#f0e8ff" stroke="#663366" stroke-width="1.2"/><text x="330" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#663366">U₁ ∩ U₂:  s₁|_{U₁∩U₂} = s₂|_{U₁∩U₂}</text><ellipse cx="215" cy="158" rx="158" ry="82" fill="#cce0ff" stroke="#334466" stroke-width="1.5" opacity="0.88"/><text x="148" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#334466">U₁</text><text x="148" y="170" text-anchor="middle" font-size="12" fill="#885500">s₁ ∈ F(U₁)</text><ellipse cx="445" cy="158" rx="158" ry="82" fill="#ffe5cc" stroke="#885500" stroke-width="1.5" opacity="0.88"/><text x="516" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#885500">U₂</text><text x="516" y="170" text-anchor="middle" font-size="12" fill="#885500">s₂ ∈ F(U₂)</text><line x1="330" y1="248" x2="330" y2="272" stroke="#334466" stroke-width="2" marker-end="url(#arr)"/><text x="352" y="264" font-size="11" fill="#334466">склейка</text><rect x="140" y="276" width="380" height="38" rx="8" fill="#334466"/><text x="330" y="301" text-anchor="middle" font-size="13" fill="white">∃! s ∈ F(U),  s|_{Uᵢ} = sᵢ</text></svg>