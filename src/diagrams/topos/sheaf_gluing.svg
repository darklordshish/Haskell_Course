<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300"
     font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Sheaf Gluing Condition</text>

  <!-- Agreement condition banner -->
  <rect x="120" y="42" width="360" height="30" rx="6" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="300" y="62" text-anchor="middle" font-size="12" fill="#8b6db5">Agreement: s&#8321;|_{U&#8321;&#8745;U&#8322;} = s&#8322;|_{U&#8321;&#8745;U&#8322;}</text>

  <!-- U1 ellipse (left) -->
  <ellipse cx="190" cy="155" rx="148" ry="72" fill="#eef1fb" stroke="#5872c9" stroke-width="1.8" opacity="0.85"/>
  <text x="120" y="145" text-anchor="middle" font-size="17" font-weight="bold" fill="#5872c9">U&#8321;</text>
  <text x="120" y="168" text-anchor="middle" font-size="12" fill="#3a4a96">s&#8321; &#8712; F(U&#8321;)</text>

  <!-- U2 ellipse (right) -->
  <ellipse cx="410" cy="155" rx="148" ry="72" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.8" opacity="0.85"/>
  <text x="480" y="145" text-anchor="middle" font-size="17" font-weight="bold" fill="#3f9d77">U&#8322;</text>
  <text x="480" y="168" text-anchor="middle" font-size="12" fill="#3f9d77">s&#8322; &#8712; F(U&#8322;)</text>

  <!-- Intersection label -->
  <text x="300" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">U&#8321;&#8745;U&#8322;</text>
  <text x="300" y="165" text-anchor="middle" font-size="10" fill="#8a93a3">overlap</text>

  <!-- Arrow down to global section -->
  <line x1="300" y1="232" x2="300" y2="256" stroke="#5872c9" stroke-width="2" marker-end="url(#arr)"/>
  <text x="322" y="248" font-size="10" fill="#8a93a3">gluing</text>

  <!-- Global section box -->
  <rect x="120" y="260" width="360" height="32" rx="8" fill="#5872c9" stroke="#3a4a96" stroke-width="1.5"/>
  <text x="300" y="281" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">&#8707;! s &#8712; F(U),  s|_{U&#7522;} = s&#7522;</text>

  <!-- Cover label -->
  <text x="300" y="228" text-anchor="middle" font-size="11" fill="#8a93a3">Cover: U = U&#8321; &#8746; U&#8322;</text>
</svg>
