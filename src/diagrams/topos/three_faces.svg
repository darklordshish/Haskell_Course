<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300"
     font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="330" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Three Faces of a Topos</text>

  <!-- TOPOS center box -->
  <rect x="250" y="48" width="160" height="44" rx="8" fill="#5872c9" stroke="#3a4a96" stroke-width="1.5"/>
  <text x="330" y="75" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">TOPOS</text>

  <!-- Geometry box -->
  <rect x="40" y="175" width="170" height="60" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="125" y="199" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Geometry</text>
  <text x="125" y="218" text-anchor="middle" font-size="11" fill="#8a93a3">Sh(X), sheaves</text>

  <!-- Logic box -->
  <rect x="245" y="190" width="170" height="60" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="330" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Logic</text>
  <text x="330" y="233" text-anchor="middle" font-size="11" fill="#8a93a3">&#937;, classifier</text>

  <!-- Types box -->
  <rect x="450" y="175" width="170" height="60" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="535" y="199" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">Types</text>
  <text x="535" y="218" text-anchor="middle" font-size="11" fill="#8a93a3">Mitchell-Benabou</text>

  <!-- Arrow: TOPOS -> Geometry -->
  <line x1="280" y1="90" x2="155" y2="173" stroke="#5872c9" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="200" y="140" text-anchor="middle" font-size="11" fill="#5872c9">Sh(-)</text>

  <!-- Arrow: TOPOS -> Logic -->
  <line x1="330" y1="92" x2="330" y2="188" stroke="#8b6db5" stroke-width="1.8" marker-end="url(#arrP)"/>
  <text x="346" y="145" font-size="11" fill="#8b6db5">&#937;</text>

  <!-- Arrow: TOPOS -> Types -->
  <line x1="380" y1="90" x2="505" y2="173" stroke="#3f9d77" stroke-width="1.8" marker-end="url(#arrG)"/>
  <text x="460" y="136" text-anchor="middle" font-size="11" fill="#3f9d77">internal lang</text>

  <!-- Footer note -->
  <rect x="80" y="260" width="500" height="28" rx="6" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1"/>
  <text x="330" y="279" text-anchor="middle" font-size="11" fill="#8a93a3" font-style="italic">All three views are equivalent (Seely 1984)</text>
</svg>
