<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280" viewBox="0 0 500 280"
     font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="280" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">BiTopos: Two Classifiers</text>

  <!-- Category E box -->
  <rect x="175" y="50" width="150" height="44" rx="8" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Category E</text>

  <!-- Omega+ box (Positive, green) -->
  <rect x="40" y="155" width="170" height="66" rx="8" fill="#f1f5f9" stroke="#34d399" stroke-width="2"/>
  <text x="125" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">&#937;&#8314; (Positive)</text>
  <text x="125" y="197" text-anchor="middle" font-size="11" fill="#0f172a">true&#8314;: 1 &#8594; &#937;&#8314;</text>
  <text x="125" y="213" text-anchor="middle" font-size="10" fill="#64748b">Plausibility measure</text>

  <!-- Omega- box (Negative, orange) -->
  <rect x="290" y="155" width="170" height="66" rx="8" fill="#f1f5f9" stroke="#fb923c" stroke-width="2"/>
  <text x="375" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#fb923c">&#937;&#8315; (Negative)</text>
  <text x="375" y="197" text-anchor="middle" font-size="11" fill="#0f172a">true&#8315;: 1 &#8594; &#937;&#8315;</text>
  <text x="375" y="213" text-anchor="middle" font-size="10" fill="#64748b">Belief measure</text>

  <!-- Arrow: E -> Omega+ -->
  <line x1="215" y1="92" x2="155" y2="153" stroke="#34d399" stroke-width="1.8" marker-end="url(#arrG)"/>
  <text x="168" y="128" text-anchor="middle" font-size="11" fill="#34d399">&#967;&#8314;: A &#8594; &#937;&#8314;</text>

  <!-- Arrow: E -> Omega- -->
  <line x1="285" y1="92" x2="345" y2="153" stroke="#fb923c" stroke-width="1.8" marker-end="url(#arrR)"/>
  <text x="332" y="128" text-anchor="middle" font-size="11" fill="#fb923c">&#967;&#8315;: A &#8594; &#937;&#8315;</text>

  <!-- Law box -->
  <rect x="60" y="242" width="380" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="250" y="261" text-anchor="middle" font-size="12" fill="#0f172a">BiTopos law:  Bel(A) &#8804; Pl(A)</text>
</svg>
