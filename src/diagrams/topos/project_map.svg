<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" viewBox="0 0 700 340"
     font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="340" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Project Map: Key Formulas</text>

  <!-- Central node: Kan Extensions -->
  <rect x="258" y="120" width="184" height="52" rx="10" fill="#5872c9" stroke="#3a4a96" stroke-width="2"/>
  <text x="350" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Kan Extensions</text>
  <text x="350" y="160" text-anchor="middle" font-size="11" fill="#eef1fb">Lan_J  and  Ran_J</text>

  <!-- Top-left: Quantifiers -->
  <rect x="30" y="48" width="170" height="54" rx="8" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.8"/>
  <text x="115" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">Quantifiers</text>
  <text x="115" y="88" text-anchor="middle" font-size="11" fill="#0f172a">&#8704; = Ran_&#960;,  &#8707; = Lan_&#960;</text>

  <!-- Top-right: Geometric Morphism -->
  <rect x="500" y="48" width="170" height="54" rx="8" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.8"/>
  <text x="585" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b6db5">Geom. Morphism</text>
  <text x="585" y="86" text-anchor="middle" font-size="11" fill="#0f172a">f* = Lan_f,  f&#8314; = Ran_f</text>

  <!-- Bottom-left: Belief / Plausibility -->
  <rect x="30" y="218" width="170" height="54" rx="8" fill="#f7f8fa" stroke="#d9a441" stroke-width="1.8"/>
  <text x="115" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#d9a441">Bel / Pl</text>
  <text x="115" y="256" text-anchor="middle" font-size="11" fill="#0f172a">Bel=Ran_J,  Pl=Lan_J</text>

  <!-- Bottom-right: Subobj. Classifier -->
  <rect x="500" y="218" width="170" height="54" rx="8" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.8"/>
  <text x="585" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">Classifier &#937;</text>
  <text x="585" y="256" text-anchor="middle" font-size="11" fill="#0f172a">Hom(A,&#937;) &#8773; Sub(A)</text>

  <!-- Arrows from Kan Extensions outward -->

  <!-- -> Quantifiers (top-left) -->
  <line x1="272" y1="128" x2="197" y2="90" stroke="#3f9d77" stroke-width="1.6" marker-end="url(#arrG)"/>

  <!-- -> Geom. Morphism (top-right) -->
  <line x1="428" y1="128" x2="503" y2="90" stroke="#8b6db5" stroke-width="1.6" marker-end="url(#arrP)"/>

  <!-- -> Bel/Pl (bottom-left) -->
  <line x1="272" y1="162" x2="197" y2="224" stroke="#d9a441" stroke-width="1.6" marker-end="url(#arrO)"/>

  <!-- -> Classifier (bottom-right) -->
  <line x1="428" y1="162" x2="503" y2="224" stroke="#3f9d77" stroke-width="1.6" marker-end="url(#arrG)"/>

  <!-- Footer banner -->
  <rect x="20" y="296" width="660" height="34" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="350" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Key: all constructions = Kan extensions</text>
  <text x="350" y="325" text-anchor="middle" font-size="10" fill="#8a93a3">&#8704;=Ran_&#960;  |  &#8707;=Lan_&#960;  |  f*=Lan_f  |  f&#8314;=Ran_f  |  Bel=Ran_J  |  Pl=Lan_J</text>
</svg>
