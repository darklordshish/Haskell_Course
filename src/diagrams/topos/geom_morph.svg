<svg xmlns="http://www.w3.org/2000/svg" width="660" height="310" style="background:#f8f9fa;font-family:Georgia,serif"><defs><marker id="arrL" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334466"/></marker><marker id="arrR" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#885500"/></marker></defs><text x="330" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#334466">Геометрический морфизм: f* ⊣ f₊ (расширения Кана)</text><rect x="55" y="100" width="185" height="56" rx="10" fill="#334466"/><text x="147" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Sh(X) = ℱ</text><rect x="420" y="100" width="185" height="56" rx="10" fill="#885500"/><text x="512" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Sh(Y) = ℰ</text><path d="M 242 116 Q 330 72 418 116" fill="none" stroke="#334466" stroke-width="2" marker-end="url(#arrL)"/><text x="330" y="82" text-anchor="middle" font-size="13" fill="#334466">f* = Lan_f  (левый сопр.)</text><path d="M 418 140 Q 330 184 242 140" fill="none" stroke="#885500" stroke-width="2" marker-end="url(#arrR)"/><text x="330" y="178" text-anchor="middle" font-size="13" fill="#885500">f₊ = Ran_f  (правый сопр.)</text><text x="330" y="222" text-anchor="middle" font-size="12" fill="#334466">f*(F)(V) = F(f⁻¹(V)) = Ran_f(F)</text><text x="330" y="244" text-anchor="middle" font-size="12" fill="#885500">f*(G)(U) = colim_{V⊇f(U)} G(V) = Lan_f(G)</text><rect x="155" y="262" width="350" height="32" rx="8" fill="#f0f0ff" stroke="#334466" stroke-width="1.2"/><text x="330" y="283" text-anchor="middle" font-size="12" fill="#334466">Геом. морф. = (Lan_f, Ran_f) на пучках</text></svg>