<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="480" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5872c9"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3f9d77"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#8b6db5"/>
    </marker>
  </defs>

  <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Arrow Hierarchy in Haskell</text>

  <!-- Category (top) -->
  <rect x="310" y="55" width="240" height="54" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="430" y="78" text-anchor="middle" font-size="14" fill="#5872c9">Category</text>
  <text x="430" y="97" text-anchor="middle" font-size="11" fill="#8a93a3">id :: a ~> a</text>
  <text x="430" y="110" text-anchor="middle" font-size="11" fill="#8a93a3">(.) :: b ~> c -&gt; a ~> b -&gt; a ~> c</text>

  <!-- Arrow (middle) -->
  <rect x="310" y="165" width="240" height="54" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="430" y="188" text-anchor="middle" font-size="14" fill="#5872c9">Arrow</text>
  <text x="430" y="207" text-anchor="middle" font-size="11" fill="#8a93a3">arr :: (a -&gt; b) -&gt; a ~> b</text>
  <text x="430" y="220" text-anchor="middle" font-size="11" fill="#8a93a3">(***) :: a~>b -&gt; c~>d -&gt; (a,c)~>(b,d)</text>

  <!-- Arrow up from Category to Arrow -->
  <line x1="430" y1="109" x2="430" y2="163" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="140" font-size="11" fill="#8a93a3">superclass</text>

  <!-- ArrowChoice (left branch) -->
  <rect x="100" y="290" width="230" height="54" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="215" y="313" text-anchor="middle" font-size="14" fill="#3f9d77">ArrowChoice</text>
  <text x="215" y="332" text-anchor="middle" font-size="11" fill="#8a93a3">left :: a~>b -&gt; Either a c ~> Either b c</text>
  <text x="215" y="345" text-anchor="middle" font-size="11" fill="#8a93a3">(+++) (+++) (|||)</text>

  <!-- ArrowLoop (right branch) -->
  <rect x="530" y="290" width="230" height="54" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="645" y="313" text-anchor="middle" font-size="14" fill="#8b6db5">ArrowLoop</text>
  <text x="645" y="332" text-anchor="middle" font-size="11" fill="#8a93a3">loop :: (a,c) ~> (b,c) -&gt; a ~> b</text>
  <text x="645" y="345" text-anchor="middle" font-size="11" fill="#8a93a3">traced monoidal category</text>

  <!-- ArrowApply (center branch) -->
  <rect x="310" y="290" width="200" height="54" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="410" y="313" text-anchor="middle" font-size="14" fill="#d9a441">ArrowApply</text>
  <text x="410" y="332" text-anchor="middle" font-size="11" fill="#8a93a3">app :: (a~>b, a) ~> b</text>
  <text x="410" y="345" text-anchor="middle" font-size="11" fill="#8a93a3">equiv. to Monad</text>

  <!-- Lines from Arrow to subclasses -->
  <line x1="370" y1="219" x2="240" y2="288" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="430" y1="219" x2="410" y2="288" stroke="#d9a441" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="219" x2="620" y2="288" stroke="#8b6db5" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- Kleisli instance box -->
  <rect x="100" y="410" width="200" height="46" fill="#ffffff" stroke="#8a93a3" stroke-width="1" rx="6" stroke-dasharray="6,3"/>
  <text x="200" y="430" text-anchor="middle" font-size="13" fill="#5872c9">Kleisli m</text>
  <text x="200" y="448" text-anchor="middle" font-size="11" fill="#8a93a3">newtype Kleisli m a b =</text>

  <!-- Function arrow instance box -->
  <rect x="560" y="410" width="200" height="46" fill="#ffffff" stroke="#8a93a3" stroke-width="1" rx="6" stroke-dasharray="6,3"/>
  <text x="660" y="430" text-anchor="middle" font-size="13" fill="#5872c9">(->)</text>
  <text x="660" y="448" text-anchor="middle" font-size="11" fill="#8a93a3">pure functions as arrows</text>

  <!-- Instance labels -->
  <text x="200" y="405" text-anchor="middle" font-size="10" fill="#8a93a3">instance (Monad m)</text>
  <text x="660" y="405" text-anchor="middle" font-size="10" fill="#8a93a3">instance</text>

  <line x1="200" y1="388" x2="200" y2="408" stroke="#8a93a3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="388" x2="660" y2="408" stroke="#8a93a3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="720" y="455" font-size="10" fill="#8a93a3">solid = subclass</text>
  <text x="720" y="468" font-size="10" fill="#8a93a3">dashed = instance</text>
</svg>