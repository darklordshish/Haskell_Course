<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="420" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#5872c9"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3f9d77"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#d9a441"/></marker>
  </defs>
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Monad =&gt; Arrow: Kleisli Construction</text>
  <rect x="20" y="50" width="380" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="210" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">Monad World</text>
  <rect x="50" y="95" width="320" height="50" fill="#f7f8fa" stroke="#5872c9" stroke-width="1" rx="5"/>
  <text x="210" y="116" text-anchor="middle" font-size="12" fill="#475569">f :: a -&gt; m b</text>
  <text x="210" y="133" text-anchor="middle" font-size="11" fill="#8a93a3">Kleisli (monadic function)</text>
  <rect x="50" y="165" width="320" height="50" fill="#f7f8fa" stroke="#5872c9" stroke-width="1" rx="5"/>
  <text x="210" y="186" text-anchor="middle" font-size="12" fill="#475569">f &gt;=&gt; g  =  \x -&gt; f x &gt;&gt;= g</text>
  <text x="210" y="203" text-anchor="middle" font-size="11" fill="#8a93a3">Kleisli composition</text>
  <rect x="50" y="235" width="320" height="50" fill="#f7f8fa" stroke="#5872c9" stroke-width="1" rx="5"/>
  <text x="210" y="256" text-anchor="middle" font-size="12" fill="#475569">return :: a -&gt; m a</text>
  <text x="210" y="273" text-anchor="middle" font-size="11" fill="#8a93a3">identity (pure)</text>
  <rect x="50" y="305" width="320" height="60" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="210" y="326" text-anchor="middle" font-size="12" fill="#8a93a3">newtype Kleisli m a b =</text>
  <text x="210" y="343" text-anchor="middle" font-size="12" fill="#5872c9">  Kleisli { runKleisli :: a -&gt; m b }</text>
  <text x="210" y="358" text-anchor="middle" font-size="11" fill="#8a93a3">instance Monad m =&gt; Arrow (Kleisli m)</text>
  <rect x="460" y="50" width="380" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="650" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f9d77">Arrow World</text>
  <rect x="490" y="95" width="320" height="50" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1" rx="5"/>
  <text x="650" y="116" text-anchor="middle" font-size="12" fill="#475569">arr f :: a ~&gt; b</text>
  <text x="650" y="133" text-anchor="middle" font-size="11" fill="#8a93a3">lifted pure function</text>
  <rect x="490" y="165" width="320" height="50" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1" rx="5"/>
  <text x="650" y="186" text-anchor="middle" font-size="12" fill="#475569">f &gt;&gt;&gt; g :: a ~&gt; c</text>
  <text x="650" y="203" text-anchor="middle" font-size="11" fill="#8a93a3">sequential composition</text>
  <rect x="490" y="235" width="320" height="50" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1" rx="5"/>
  <text x="650" y="256" text-anchor="middle" font-size="12" fill="#475569">arr id :: a ~&gt; a</text>
  <text x="650" y="273" text-anchor="middle" font-size="11" fill="#8a93a3">identity arrow</text>
  <rect x="490" y="305" width="320" height="60" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="650" y="326" text-anchor="middle" font-size="12" fill="#8a93a3">class Category arr =&gt; Arrow arr where</text>
  <text x="650" y="343" text-anchor="middle" font-size="12" fill="#3f9d77">  arr    :: (a -&gt; b) -&gt; arr a b</text>
  <text x="650" y="358" text-anchor="middle" font-size="12" fill="#3f9d77">  first  :: arr a b -&gt; arr (a,c) (b,c)</text>
  <line x1="370" y1="120" x2="488" y2="120" stroke="#d9a441" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="113" text-anchor="middle" font-size="11" fill="#d9a441">runKleisli</text>
  <line x1="370" y1="190" x2="488" y2="190" stroke="#d9a441" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="183" text-anchor="middle" font-size="11" fill="#d9a441">&gt;&gt;&gt;</text>
  <line x1="370" y1="260" x2="488" y2="260" stroke="#d9a441" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="253" text-anchor="middle" font-size="11" fill="#d9a441">arr return</text>
  <rect x="200" y="398" width="460" height="18" fill="#f7f8fa" rx="3"/>
  <text x="430" y="411" text-anchor="middle" font-size="11" fill="#d9a441">Every Monad gives an Arrow, but not every Arrow is a Monad</text>
</svg>