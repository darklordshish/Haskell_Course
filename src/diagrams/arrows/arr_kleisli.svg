<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="420" fill="#0f172a" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fb923c"/></marker>
  </defs>
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1f5f9">Monad =&gt; Arrow: Kleisli Construction</text>
  <rect x="20" y="50" width="380" height="340" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="210" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">Monad World</text>
  <rect x="50" y="95" width="320" height="50" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="5"/>
  <text x="210" y="116" text-anchor="middle" font-size="12" fill="#e2e8f0">f :: a -&gt; m b</text>
  <text x="210" y="133" text-anchor="middle" font-size="11" fill="#94a3b8">Kleisli (monadic function)</text>
  <rect x="50" y="165" width="320" height="50" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="5"/>
  <text x="210" y="186" text-anchor="middle" font-size="12" fill="#e2e8f0">f &gt;=&gt; g  =  \x -&gt; f x &gt;&gt;= g</text>
  <text x="210" y="203" text-anchor="middle" font-size="11" fill="#94a3b8">Kleisli composition</text>
  <rect x="50" y="235" width="320" height="50" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="5"/>
  <text x="210" y="256" text-anchor="middle" font-size="12" fill="#e2e8f0">return :: a -&gt; m a</text>
  <text x="210" y="273" text-anchor="middle" font-size="11" fill="#94a3b8">identity (pure)</text>
  <rect x="50" y="305" width="320" height="60" fill="#1e293b" stroke="#334155" stroke-width="1" rx="5"/>
  <text x="210" y="326" text-anchor="middle" font-size="12" fill="#94a3b8">newtype Kleisli m a b =</text>
  <text x="210" y="343" text-anchor="middle" font-size="12" fill="#60a5fa">  Kleisli { runKleisli :: a -&gt; m b }</text>
  <text x="210" y="358" text-anchor="middle" font-size="11" fill="#94a3b8">instance Monad m =&gt; Arrow (Kleisli m)</text>
  <rect x="460" y="50" width="380" height="340" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="650" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#34d399">Arrow World</text>
  <rect x="490" y="95" width="320" height="50" fill="#1e293b" stroke="#34d399" stroke-width="1" rx="5"/>
  <text x="650" y="116" text-anchor="middle" font-size="12" fill="#e2e8f0">arr f :: a ~&gt; b</text>
  <text x="650" y="133" text-anchor="middle" font-size="11" fill="#94a3b8">lifted pure function</text>
  <rect x="490" y="165" width="320" height="50" fill="#1e293b" stroke="#34d399" stroke-width="1" rx="5"/>
  <text x="650" y="186" text-anchor="middle" font-size="12" fill="#e2e8f0">f &gt;&gt;&gt; g :: a ~&gt; c</text>
  <text x="650" y="203" text-anchor="middle" font-size="11" fill="#94a3b8">sequential composition</text>
  <rect x="490" y="235" width="320" height="50" fill="#1e293b" stroke="#34d399" stroke-width="1" rx="5"/>
  <text x="650" y="256" text-anchor="middle" font-size="12" fill="#e2e8f0">arr id :: a ~&gt; a</text>
  <text x="650" y="273" text-anchor="middle" font-size="11" fill="#94a3b8">identity arrow</text>
  <rect x="490" y="305" width="320" height="60" fill="#1e293b" stroke="#334155" stroke-width="1" rx="5"/>
  <text x="650" y="326" text-anchor="middle" font-size="12" fill="#94a3b8">class Category arr =&gt; Arrow arr where</text>
  <text x="650" y="343" text-anchor="middle" font-size="12" fill="#34d399">  arr    :: (a -&gt; b) -&gt; arr a b</text>
  <text x="650" y="358" text-anchor="middle" font-size="12" fill="#34d399">  first  :: arr a b -&gt; arr (a,c) (b,c)</text>
  <line x1="370" y1="120" x2="488" y2="120" stroke="#fb923c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="113" text-anchor="middle" font-size="11" fill="#fb923c">runKleisli</text>
  <line x1="370" y1="190" x2="488" y2="190" stroke="#fb923c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="183" text-anchor="middle" font-size="11" fill="#fb923c">&gt;&gt;&gt;</text>
  <line x1="370" y1="260" x2="488" y2="260" stroke="#fb923c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="253" text-anchor="middle" font-size="11" fill="#fb923c">arr return</text>
  <rect x="200" y="398" width="460" height="18" fill="#1e293b" rx="3"/>
  <text x="430" y="411" text-anchor="middle" font-size="11" fill="#fb923c">Every Monad gives an Arrow, but not every Arrow is a Monad</text>
</svg>