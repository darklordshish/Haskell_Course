<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="420" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#059669"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
  </defs>
  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Monad =&gt; Arrow: Kleisli Construction</text>
  <rect x="20" y="50" width="380" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="210" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">Monad World</text>
  <rect x="50" y="95" width="320" height="50" fill="#f1f5f9" stroke="#2563eb" stroke-width="1" rx="5"/>
  <text x="210" y="116" text-anchor="middle" font-size="12" fill="#334155">f :: a -&gt; m b</text>
  <text x="210" y="133" text-anchor="middle" font-size="11" fill="#64748b">Kleisli (monadic function)</text>
  <rect x="50" y="165" width="320" height="50" fill="#f1f5f9" stroke="#2563eb" stroke-width="1" rx="5"/>
  <text x="210" y="186" text-anchor="middle" font-size="12" fill="#334155">f &gt;=&gt; g  =  \x -&gt; f x &gt;&gt;= g</text>
  <text x="210" y="203" text-anchor="middle" font-size="11" fill="#64748b">Kleisli composition</text>
  <rect x="50" y="235" width="320" height="50" fill="#f1f5f9" stroke="#2563eb" stroke-width="1" rx="5"/>
  <text x="210" y="256" text-anchor="middle" font-size="12" fill="#334155">return :: a -&gt; m a</text>
  <text x="210" y="273" text-anchor="middle" font-size="11" fill="#64748b">identity (pure)</text>
  <rect x="50" y="305" width="320" height="60" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="210" y="326" text-anchor="middle" font-size="12" fill="#64748b">newtype Kleisli m a b =</text>
  <text x="210" y="343" text-anchor="middle" font-size="12" fill="#2563eb">  Kleisli { runKleisli :: a -&gt; m b }</text>
  <text x="210" y="358" text-anchor="middle" font-size="11" fill="#64748b">instance Monad m =&gt; Arrow (Kleisli m)</text>
  <rect x="460" y="50" width="380" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="650" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">Arrow World</text>
  <rect x="490" y="95" width="320" height="50" fill="#f1f5f9" stroke="#059669" stroke-width="1" rx="5"/>
  <text x="650" y="116" text-anchor="middle" font-size="12" fill="#334155">arr f :: a ~&gt; b</text>
  <text x="650" y="133" text-anchor="middle" font-size="11" fill="#64748b">lifted pure function</text>
  <rect x="490" y="165" width="320" height="50" fill="#f1f5f9" stroke="#059669" stroke-width="1" rx="5"/>
  <text x="650" y="186" text-anchor="middle" font-size="12" fill="#334155">f &gt;&gt;&gt; g :: a ~&gt; c</text>
  <text x="650" y="203" text-anchor="middle" font-size="11" fill="#64748b">sequential composition</text>
  <rect x="490" y="235" width="320" height="50" fill="#f1f5f9" stroke="#059669" stroke-width="1" rx="5"/>
  <text x="650" y="256" text-anchor="middle" font-size="12" fill="#334155">arr id :: a ~&gt; a</text>
  <text x="650" y="273" text-anchor="middle" font-size="11" fill="#64748b">identity arrow</text>
  <rect x="490" y="305" width="320" height="60" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="650" y="326" text-anchor="middle" font-size="12" fill="#64748b">class Category arr =&gt; Arrow arr where</text>
  <text x="650" y="343" text-anchor="middle" font-size="12" fill="#059669">  arr    :: (a -&gt; b) -&gt; arr a b</text>
  <text x="650" y="358" text-anchor="middle" font-size="12" fill="#059669">  first  :: arr a b -&gt; arr (a,c) (b,c)</text>
  <line x1="370" y1="120" x2="488" y2="120" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="113" text-anchor="middle" font-size="11" fill="#ea580c">runKleisli</text>
  <line x1="370" y1="190" x2="488" y2="190" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="183" text-anchor="middle" font-size="11" fill="#ea580c">&gt;&gt;&gt;</text>
  <line x1="370" y1="260" x2="488" y2="260" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/>
  <text x="430" y="253" text-anchor="middle" font-size="11" fill="#ea580c">arr return</text>
  <rect x="200" y="398" width="460" height="18" fill="#f1f5f9" rx="3"/>
  <text x="430" y="411" text-anchor="middle" font-size="11" fill="#ea580c">Every Monad gives an Arrow, but not every Arrow is a Monad</text>
</svg>