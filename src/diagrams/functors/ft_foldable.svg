<svg xmlns="http://www.w3.org/2000/svg" width="740" height="360" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="740" height="360" fill="#ffffff" rx="8"/>
  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#334155">Foldable vs Traversable</text>

  <!-- === LEFT: Foldable === -->
  <rect x="20" y="42" width="330" height="300" rx="8" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5"/>
  <text x="185" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Foldable t</text>

  <!-- Type box -->
  <rect x="40" y="76" width="290" height="44" rx="6" fill="#dbeafe"/>
  <text x="185" y="94" text-anchor="middle" font-size="11" fill="#1e40af">t a -&gt; [a]  (fold to list)</text>
  <text x="185" y="112" text-anchor="middle" font-size="10" fill="#64748b">(homomorphism to monoid)</text>

  <!-- foldr -->
  <rect x="40" y="128" width="290" height="44" rx="6" fill="#dbeafe"/>
  <text x="185" y="146" text-anchor="middle" font-size="10" fill="#1e40af">foldr :: (a -&gt; b -&gt; b) -&gt; b -&gt; t a -&gt; b</text>
  <text x="185" y="162" text-anchor="middle" font-size="9" fill="#64748b">(structural recursion)</text>

  <!-- Operations -->
  <rect x="40" y="180" width="290" height="30" rx="4" fill="#e0f2fe"/>
  <text x="185" y="199" text-anchor="middle" font-size="10" fill="#0f172a">sum, product, length, elem, toList, ...</text>

  <!-- Instances -->
  <rect x="40" y="218" width="290" height="30" rx="4" fill="#e0f2fe"/>
  <text x="185" y="237" text-anchor="middle" font-size="10" fill="#0f172a">Tree, [], Maybe, Map, Set, Seq</text>

  <!-- Output type -->
  <rect x="80" y="262" width="210" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="185" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">t a -&gt; b</text>
  <text x="185" y="294" text-anchor="middle" font-size="10" fill="#64748b">lose structure</text>

  <!-- === RIGHT: Traversable === -->
  <rect x="390" y="42" width="330" height="300" rx="8" fill="#f1f5f9" stroke="#34d399" stroke-width="1.5"/>
  <text x="555" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Traversable t</text>

  <!-- Type box -->
  <rect x="410" y="76" width="290" height="44" rx="6" fill="#d1fae5"/>
  <text x="555" y="94" text-anchor="middle" font-size="11" fill="#065f46">t a -&gt; f (t b)  (traversal with effects)</text>
  <text x="555" y="112" text-anchor="middle" font-size="10" fill="#64748b">requires: Applicative f</text>

  <!-- traverse -->
  <rect x="410" y="128" width="290" height="44" rx="6" fill="#d1fae5"/>
  <text x="555" y="146" text-anchor="middle" font-size="10" fill="#065f46">traverse :: (a -&gt; f b) -&gt; t a -&gt; f (t b)</text>
  <text x="555" y="162" text-anchor="middle" font-size="9" fill="#64748b">sequenceA :: t (f a) -&gt; f (t a)</text>

  <!-- Operations -->
  <rect x="410" y="180" width="290" height="30" rx="4" fill="#dcfce7"/>
  <text x="555" y="199" text-anchor="middle" font-size="10" fill="#0f172a">mapM, forM, mapAccumL, ...</text>

  <!-- Instances -->
  <rect x="410" y="218" width="290" height="30" rx="4" fill="#dcfce7"/>
  <text x="555" y="237" text-anchor="middle" font-size="10" fill="#0f172a">requires: Functor + Foldable</text>

  <!-- Output type -->
  <rect x="450" y="262" width="210" height="40" rx="6" fill="#d1fae5" stroke="#34d399" stroke-width="1.5"/>
  <text x="555" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">t a -&gt; f (t b)</text>
  <text x="555" y="294" text-anchor="middle" font-size="10" fill="#64748b">keep structure + effect</text>

  <!-- Arrow: Traversable is stronger -->
  <line x1="350" y1="190" x2="390" y2="190" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="183" text-anchor="middle" font-size="9" fill="#a78bfa">stronger</text>

  <!-- Laws at bottom -->
  <rect x="20" y="350" width="700" height="4" rx="2" fill="#f1f5f9"/>
  <text x="370" y="348" text-anchor="middle" font-size="9" fill="#64748b">fmap f = runIdentity . traverse (Identity . f)  |  foldMap f = getConst . traverse (Const . f)</text>
</svg>
