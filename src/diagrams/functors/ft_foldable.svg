<svg xmlns="http://www.w3.org/2000/svg" width="740" height="360" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
  </defs>
  <rect width="740" height="360" fill="#ffffff" rx="8"/>
  <!-- Title -->
  <text x="370" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#475569">Foldable vs Traversable</text>

  <!-- === LEFT: Foldable === -->
  <rect x="20" y="42" width="330" height="300" rx="8" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="185" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a4a96">Foldable t</text>

  <!-- Type box -->
  <rect x="40" y="76" width="290" height="44" rx="6" fill="#eef1fb"/>
  <text x="185" y="94" text-anchor="middle" font-size="11" fill="#3a4a96">t a -&gt; [a]  (fold to list)</text>
  <text x="185" y="112" text-anchor="middle" font-size="10" fill="#8a93a3">(homomorphism to monoid)</text>

  <!-- foldr -->
  <rect x="40" y="128" width="290" height="44" rx="6" fill="#eef1fb"/>
  <text x="185" y="146" text-anchor="middle" font-size="10" fill="#3a4a96">foldr :: (a -&gt; b -&gt; b) -&gt; b -&gt; t a -&gt; b</text>
  <text x="185" y="162" text-anchor="middle" font-size="9" fill="#8a93a3">(structural recursion)</text>

  <!-- Operations -->
  <rect x="40" y="180" width="290" height="30" rx="4" fill="#eef1fb"/>
  <text x="185" y="199" text-anchor="middle" font-size="10" fill="#0f172a">sum, product, length, elem, toList, ...</text>

  <!-- Instances -->
  <rect x="40" y="218" width="290" height="30" rx="4" fill="#eef1fb"/>
  <text x="185" y="237" text-anchor="middle" font-size="10" fill="#0f172a">Tree, [], Maybe, Map, Set, Seq</text>

  <!-- Output type -->
  <rect x="80" y="262" width="210" height="40" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="185" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a4a96">t a -&gt; b</text>
  <text x="185" y="294" text-anchor="middle" font-size="10" fill="#8a93a3">lose structure</text>

  <!-- === RIGHT: Traversable === -->
  <rect x="390" y="42" width="330" height="300" rx="8" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="555" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f6f54">Traversable t</text>

  <!-- Type box -->
  <rect x="410" y="76" width="290" height="44" rx="6" fill="#e9f4ee"/>
  <text x="555" y="94" text-anchor="middle" font-size="11" fill="#2f6f54">t a -&gt; f (t b)  (traversal with effects)</text>
  <text x="555" y="112" text-anchor="middle" font-size="10" fill="#8a93a3">requires: Applicative f</text>

  <!-- traverse -->
  <rect x="410" y="128" width="290" height="44" rx="6" fill="#e9f4ee"/>
  <text x="555" y="146" text-anchor="middle" font-size="10" fill="#2f6f54">traverse :: (a -&gt; f b) -&gt; t a -&gt; f (t b)</text>
  <text x="555" y="162" text-anchor="middle" font-size="9" fill="#8a93a3">sequenceA :: t (f a) -&gt; f (t a)</text>

  <!-- Operations -->
  <rect x="410" y="180" width="290" height="30" rx="4" fill="#e9f4ee"/>
  <text x="555" y="199" text-anchor="middle" font-size="10" fill="#0f172a">mapM, forM, mapAccumL, ...</text>

  <!-- Instances -->
  <rect x="410" y="218" width="290" height="30" rx="4" fill="#e9f4ee"/>
  <text x="555" y="237" text-anchor="middle" font-size="10" fill="#0f172a">requires: Functor + Foldable</text>

  <!-- Output type -->
  <rect x="450" y="262" width="210" height="40" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="555" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f6f54">t a -&gt; f (t b)</text>
  <text x="555" y="294" text-anchor="middle" font-size="10" fill="#8a93a3">keep structure + effect</text>

  <!-- Arrow: Traversable is stronger -->
  <line x1="350" y1="190" x2="390" y2="190" stroke="#8b6db5" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="183" text-anchor="middle" font-size="9" fill="#8b6db5">stronger</text>

  <!-- Laws at bottom -->
  <rect x="20" y="350" width="700" height="4" rx="2" fill="#f7f8fa"/>
  <text x="370" y="348" text-anchor="middle" font-size="9" fill="#8a93a3">fmap f = runIdentity . traverse (Identity . f)  |  foldMap f = getConst . traverse (Const . f)</text>
</svg>
