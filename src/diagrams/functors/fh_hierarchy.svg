<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" font-family="monospace,Arial,sans-serif">
<rect width="880" height="480" fill="#0f172a" rx="8"/>
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
  </marker>
  <marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
  </marker>
</defs>

<!-- Title -->
<text x="440" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f0">Functor Hierarchy in Haskell</text>

<!-- Row 1: Contravariant | Functor | Bifunctor -->
<rect x="360" y="50" width="160" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
<text x="440" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#93c5fd">Functor</text>
<text x="440" y="84" text-anchor="middle" font-size="10" fill="#64748b">fmap :: (a-&gt;b) -&gt; f a -&gt; f b</text>

<rect x="30" y="50" width="160" height="50" rx="8" fill="#2d1b3d" stroke="#a855f7" stroke-width="2"/>
<text x="110" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#c084fc">Contravariant</text>
<text x="110" y="84" text-anchor="middle" font-size="10" fill="#64748b">contramap</text>

<rect x="690" y="50" width="160" height="50" rx="8" fill="#2d1b3d" stroke="#ec4899" stroke-width="2"/>
<text x="770" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#f9a8d4">Bifunctor</text>
<text x="770" y="84" text-anchor="middle" font-size="10" fill="#64748b">bimap</text>

<!-- Row 2: Invariant | Applicative | Profunctor -->
<rect x="360" y="160" width="160" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
<text x="440" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#86efac">Applicative</text>
<text x="440" y="194" text-anchor="middle" font-size="10" fill="#64748b">(&lt;*&gt;) :: f(a-&gt;b) -&gt; f a -&gt; f b</text>

<rect x="30" y="160" width="160" height="50" rx="8" fill="#2d1b3d" stroke="#a855f7" stroke-width="2"/>
<text x="110" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#c084fc">Invariant</text>
<text x="110" y="194" text-anchor="middle" font-size="10" fill="#64748b">invmap</text>

<rect x="690" y="160" width="160" height="50" rx="8" fill="#0c2340" stroke="#06b6d4" stroke-width="2"/>
<text x="770" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#67e8f9">Profunctor</text>
<text x="770" y="194" text-anchor="middle" font-size="10" fill="#64748b">dimap</text>

<!-- Row 3: Alternative | Monad | Selective -->
<rect x="360" y="270" width="160" height="50" rx="8" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
<text x="440" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#fcd34d">Monad</text>
<text x="440" y="304" text-anchor="middle" font-size="10" fill="#64748b">(&gt;&gt;=) :: m a -&gt; (a-&gt;m b) -&gt; m b</text>

<rect x="30" y="270" width="160" height="50" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
<text x="110" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#a5b4fc">Alternative</text>
<text x="110" y="304" text-anchor="middle" font-size="10" fill="#64748b">(&lt;|&gt;) :: f a -&gt; f a -&gt; f a</text>

<rect x="690" y="270" width="160" height="50" rx="8" fill="#0c2340" stroke="#06b6d4" stroke-width="2"/>
<text x="770" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#67e8f9">Selective</text>
<text x="770" y="304" text-anchor="middle" font-size="10" fill="#64748b">select :: f(Either a b)</text>

<!-- Row 4: MonadPlus -->
<rect x="360" y="380" width="160" height="50" rx="8" fill="#422006" stroke="#f97316" stroke-width="2"/>
<text x="440" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#fdba74">MonadPlus</text>
<text x="440" y="414" text-anchor="middle" font-size="10" fill="#64748b">mzero, mplus</text>

<!-- Arrows: vertical main chain -->
<line x1="440" y1="100" x2="440" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
<line x1="440" y1="210" x2="440" y2="270" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
<line x1="440" y1="320" x2="440" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

<!-- Arrows: dashed side connections -->
<line x1="360" y1="75" x2="190" y2="75" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="520" y1="75" x2="690" y2="75" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="110" y1="100" x2="110" y2="160" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="770" y1="100" x2="770" y2="160" stroke="#475569" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="360" y1="185" x2="190" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#arrD)"/>
<line x1="520" y1="185" x2="690" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#arrD)"/>

<!-- Footer -->
<rect x="30" y="445" width="820" height="25" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
<text x="440" y="462" text-anchor="middle" font-size="10" fill="#64748b">solid = subclass / dashed = related concept</text>
</svg>