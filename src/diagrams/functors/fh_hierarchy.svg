<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" font-family="monospace,Arial,sans-serif">
<rect width="880" height="480" fill="#ffffff" rx="8"/>
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#8a93a3"/>
  </marker>
  <marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#8a93a3"/>
  </marker>
</defs>

<!-- Title -->
<text x="440" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#475569">Functor Hierarchy in Haskell</text>

<!-- Row 1: Contravariant | Functor | Bifunctor -->
<rect x="360" y="50" width="160" height="50" rx="8" fill="#eef1fb" stroke="#3a4a96" stroke-width="2"/>
<text x="440" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a4a96">Functor</text>
<text x="440" y="84" text-anchor="middle" font-size="10" fill="#8a93a3">fmap :: (a-&gt;b) -&gt; f a -&gt; f b</text>

<rect x="30" y="50" width="160" height="50" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="110" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b6db5">Contravariant</text>
<text x="110" y="84" text-anchor="middle" font-size="10" fill="#8a93a3">contramap</text>

<rect x="690" y="50" width="160" height="50" rx="8" fill="#efeaf6" stroke="#c4625f" stroke-width="2"/>
<text x="770" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#c4625f">Bifunctor</text>
<text x="770" y="84" text-anchor="middle" font-size="10" fill="#8a93a3">bimap</text>

<!-- Row 2: Invariant | Applicative | Profunctor -->
<rect x="360" y="160" width="160" height="50" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="2"/>
<text x="440" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f9d77">Applicative</text>
<text x="440" y="194" text-anchor="middle" font-size="10" fill="#8a93a3">(&lt;*&gt;) :: f(a-&gt;b) -&gt; f a -&gt; f b</text>

<rect x="30" y="160" width="160" height="50" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="110" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b6db5">Invariant</text>
<text x="110" y="194" text-anchor="middle" font-size="10" fill="#8a93a3">invmap</text>

<rect x="690" y="160" width="160" height="50" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="770" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">Profunctor</text>
<text x="770" y="194" text-anchor="middle" font-size="10" fill="#8a93a3">dimap</text>

<!-- Row 3: Alternative | Monad | Selective -->
<rect x="360" y="270" width="160" height="50" rx="8" fill="#f4e7cf" stroke="#8a6418" stroke-width="2"/>
<text x="440" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a6418">Monad</text>
<text x="440" y="304" text-anchor="middle" font-size="10" fill="#8a93a3">(&gt;&gt;=) :: m a -&gt; (a-&gt;m b) -&gt; m b</text>

<rect x="30" y="270" width="160" height="50" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="110" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">Alternative</text>
<text x="110" y="304" text-anchor="middle" font-size="10" fill="#8a93a3">(&lt;|&gt;) :: f a -&gt; f a -&gt; f a</text>

<rect x="690" y="270" width="160" height="50" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="770" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">Selective</text>
<text x="770" y="304" text-anchor="middle" font-size="10" fill="#8a93a3">select :: f(Either a b)</text>

<!-- Row 4: MonadPlus -->
<rect x="360" y="380" width="160" height="50" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="2"/>
<text x="440" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#d9a441">MonadPlus</text>
<text x="440" y="414" text-anchor="middle" font-size="10" fill="#8a93a3">mzero, mplus</text>

<!-- Arrows: vertical main chain -->
<line x1="440" y1="100" x2="440" y2="160" stroke="#8a93a3" stroke-width="2" marker-end="url(#arr)"/>
<line x1="440" y1="210" x2="440" y2="270" stroke="#8a93a3" stroke-width="2" marker-end="url(#arr)"/>
<line x1="440" y1="320" x2="440" y2="380" stroke="#8a93a3" stroke-width="2" marker-end="url(#arr)"/>

<!-- Arrows: dashed side connections -->
<line x1="360" y1="75" x2="190" y2="75" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="520" y1="75" x2="690" y2="75" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="110" y1="100" x2="110" y2="160" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="770" y1="100" x2="770" y2="160" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrD)"/>
<line x1="360" y1="185" x2="190" y2="295" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arrD)"/>
<line x1="520" y1="185" x2="690" y2="295" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arrD)"/>

<!-- Footer -->
<rect x="30" y="445" width="820" height="25" rx="4" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1"/>
<text x="440" y="462" text-anchor="middle" font-size="10" fill="#8a93a3">solid = subclass / dashed = related concept</text>
</svg>
