<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arrd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8a93a3"/></marker>
    <marker id="arrdb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/></marker>
    <marker id="arrdr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#c4625f"/></marker>
    <marker id="arrdp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/></marker>
  </defs>
  <rect width="420" height="260" fill="#ffffff" rx="8"/>
  <text x="210" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">dimap: Profunctor Square</text>

  <!-- Top-left: a' -->
  <rect x="30" y="40" width="70" height="38" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="65" y="64" text-anchor="middle" font-size="16" font-style="italic" fill="#5872c9">a'</text>

  <!-- Top-right: a -->
  <rect x="220" y="40" width="70" height="38" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="255" y="64" text-anchor="middle" font-size="16" font-style="italic" fill="#5872c9">a</text>

  <!-- Bottom-left: b' -->
  <rect x="30" y="182" width="70" height="38" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="65" y="206" text-anchor="middle" font-size="16" font-style="italic" fill="#8b6db5">b'</text>

  <!-- Bottom-right: b -->
  <rect x="220" y="182" width="70" height="38" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="255" y="206" text-anchor="middle" font-size="16" font-style="italic" fill="#8b6db5">b</text>

  <!-- Top arrow: f (contravariant, reversed) -->
  <line x1="218" y1="59" x2="102" y2="59" stroke="#5872c9" stroke-width="2" marker-end="url(#arrdb)"/>
  <text x="160" y="50" text-anchor="middle" font-size="12" fill="#5872c9">f</text>
  <text x="160" y="74" text-anchor="middle" font-size="9" fill="#8a93a3">(contravariant)</text>

  <!-- Bottom arrow: g (covariant) -->
  <line x1="102" y1="201" x2="218" y2="201" stroke="#c4625f" stroke-width="2" marker-end="url(#arrdr)"/>
  <text x="160" y="193" text-anchor="middle" font-size="12" fill="#c4625f">g</text>
  <text x="160" y="218" text-anchor="middle" font-size="9" fill="#8a93a3">(covariant)</text>

  <!-- Left arrow: dimap f g p -->
  <line x1="65" y1="80" x2="65" y2="180" stroke="#8b6db5" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrdp)"/>
  <text x="20" y="132" text-anchor="middle" font-size="10" fill="#8b6db5">dimap</text>
  <text x="20" y="145" text-anchor="middle" font-size="10" fill="#8b6db5">f g p</text>

  <!-- Right arrow: p -->
  <line x1="255" y1="80" x2="255" y2="180" stroke="#8a93a3" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="280" y="133" text-anchor="middle" font-size="12" fill="#0f172a">p</text>

  <!-- Center labels -->
  <text x="160" y="128" text-anchor="middle" font-size="13" fill="#0f172a">dimap f g p</text>
  <text x="160" y="145" text-anchor="middle" font-size="11" fill="#8a93a3">= g . p . f</text>

  <!-- Corner labels -->
  <text x="316" y="72" font-size="10" fill="#8a93a3">Hask^op</text>
  <text x="316" y="84" font-size="10" fill="#8a93a3">(a axis)</text>
  <text x="316" y="165" font-size="10" fill="#8a93a3">Hask</text>
  <text x="316" y="177" font-size="10" fill="#8a93a3">(b axis)</text>

  <!-- Bottom note -->
  <text x="210" y="250" text-anchor="middle" font-size="10" fill="#8a93a3">Profunctor: contravariant in a, covariant in b</text>
</svg>
