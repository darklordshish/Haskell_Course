<svg xmlns="http://www.w3.org/2000/svg" width="580" height="300" font-family="monospace,'JetBrains Mono',Arial,sans-serif">
  <rect width="580" height="300" fill="#ffffff" rx="10"/>
  <text x="290" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Profunctor: dimap kak kvadrat</text>
  <text x="290" y="46" text-anchor="middle" font-size="10" fill="#64748b">Hask^op x Hask -&gt; Hask</text>

  <!-- Uzly kvadrata -->
  <rect x="40" y="70" width="160" height="44" rx="6" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="88" text-anchor="middle" font-size="11" fill="#2563eb">p a b</text>
  <text x="120" y="104" text-anchor="middle" font-size="10" fill="#64748b">(istochnik)</text>

  <rect x="380" y="70" width="160" height="44" rx="6" fill="#f1f5f9" stroke="#059669" stroke-width="1.5"/>
  <text x="460" y="88" text-anchor="middle" font-size="11" fill="#059669">p a&#39; b&#39;</text>
  <text x="460" y="104" text-anchor="middle" font-size="10" fill="#64748b">(tseli)</text>

  <rect x="40" y="200" width="160" height="44" rx="6" fill="#f1f5f9" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="218" text-anchor="middle" font-size="11" fill="#7c3aed">p a&#39; b</text>
  <text x="120" y="234" text-anchor="middle" font-size="10" fill="#64748b">(posle lmap)</text>

  <!-- Strelki -->
  <!-- Verkh: p a b -> p a' b' -->
  <line x1="200" y1="92" x2="378" y2="92" stroke="#ea580c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="82" text-anchor="middle" font-size="10" fill="#ea580c">dimap f g</text>

  <!-- Levo nizh: p a b -> p a' b (lmap f) -->
  <line x1="120" y1="114" x2="120" y2="198" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="85" y="162" text-anchor="middle" font-size="9" fill="#2563eb">lmap f</text>
  <text x="85" y="175" text-anchor="middle" font-size="9" fill="#64748b">f: a&#39;-&gt;a</text>

  <!-- Nizh: p a' b -> p a' b' (rmap g) -->
  <line x1="200" y1="222" x2="378" y2="100" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr3)"/>
  <text x="310" y="175" text-anchor="middle" font-size="9" fill="#059669">rmap g</text>
  <text x="310" y="188" text-anchor="middle" font-size="9" fill="#64748b">g: b-&gt;b&#39;</text>

  <!-- Strelka vverhu sleva: f: a'->a (kontravariant) -->
  <text x="290" y="140" text-anchor="middle" font-size="10" fill="#64748b">(Hask^op: strelki obratny)</text>
  <text x="290" y="155" text-anchor="middle" font-size="10" fill="#334155">dimap f g = rmap g . lmap f</text>

  <!-- Marker strelok -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Zakony -->
  <rect x="20" y="258" width="540" height="32" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="290" y="271" text-anchor="middle" font-size="10" fill="#334155">Zakon 1: dimap id id = id</text>
  <text x="290" y="284" text-anchor="middle" font-size="10" fill="#334155">Zakon 2: dimap (f.g) (h.i) = dimap g h . dimap f i</text>
</svg>