<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="420" fill="#0f172a" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fb923c"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#a78bfa"/></marker>
  </defs>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#f1f5f9">Tambara Modules: Profunctor Optics Explained</text>
  <rect x="20" y="45" width="390" height="340" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="215" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">Strong  =  Tambara for (,)</text>
  <rect x="40" y="82" width="350" height="55" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="5"/>
  <text x="215" y="103" text-anchor="middle" font-size="12" fill="#e2e8f0">class Profunctor p =&gt; Strong p where</text>
  <text x="215" y="120" text-anchor="middle" font-size="12" fill="#60a5fa">  first :: p a b -&gt; p (a,c) (b,c)</text>
  <rect x="55" y="160" width="100" height="40" fill="#1e293b" stroke="#334155" rx="5"/>
  <text x="105" y="185" text-anchor="middle" font-size="12" fill="#e2e8f0">p a b</text>
  <rect x="255" y="160" width="120" height="40" fill="#1e293b" stroke="#334155" rx="5"/>
  <text x="315" y="185" text-anchor="middle" font-size="12" fill="#e2e8f0">p (a,c) (b,c)</text>
  <rect x="55" y="265" width="100" height="40" fill="#1e293b" stroke="#334155" rx="5"/>
  <text x="105" y="285" text-anchor="middle" font-size="12" fill="#e2e8f0">p a' b'</text>
  <rect x="255" y="265" width="130" height="40" fill="#1e293b" stroke="#334155" rx="5"/>
  <text x="320" y="285" text-anchor="middle" font-size="12" fill="#e2e8f0">p (a',c) (b',c)</text>
  <line x1="155" y1="180" x2="253" y2="180" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="204" y="173" text-anchor="middle" font-size="11" fill="#94a3b8">first</text>
  <line x1="155" y1="285" x2="253" y2="285" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="204" y="278" text-anchor="middle" font-size="11" fill="#94a3b8">first</text>
  <line x1="105" y1="200" x2="105" y2="263" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="68" y="236" font-size="11" fill="#94a3b8">dimap f g</text>
  <line x1="315" y1="200" x2="315" y2="263" stroke="#34d399" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="330" y="236" font-size="11" fill="#94a3b8">dimap f g</text>
  <text x="215" y="240" text-anchor="middle" font-size="11" fill="#fb923c">naturality: commutes</text>
  <rect x="40" y="325" width="350" height="44" fill="#1e293b" rx="4"/>
  <text x="215" y="343" text-anchor="middle" font-size="11" fill="#94a3b8">Tambara condition:</text>
  <text x="215" y="360" text-anchor="middle" font-size="11" fill="#60a5fa">first . dimap f g = dimap (f***id) (g***id) . first</text>
  <rect x="450" y="45" width="390" height="340" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
  <text x="645" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">Optic = Tambara Natural Transformation</text>
  <rect x="470" y="80" width="350" height="70" fill="#1e293b" stroke="#a78bfa" stroke-width="1" rx="5"/>
  <text x="645" y="102" text-anchor="middle" font-size="12" fill="#e2e8f0">type Optic p s t a b = p a b -&gt; p s t</text>
  <text x="645" y="122" text-anchor="middle" font-size="11" fill="#94a3b8">-- p must be a Tambara module for the optic's action</text>
  <text x="645" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">-- this is why the forall constraint works</text>
  <rect x="470" y="168" width="350" height="160" fill="#1e293b" stroke="#334155" rx="5"/>
  <text x="645" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#f1f5f9">Optic = Tambara for action F</text>
  <line x1="470" y1="196" x2="820" y2="196" stroke="#334155" stroke-width="1"/>
  <text x="555" y="212" text-anchor="middle" font-size="11" fill="#94a3b8">Optic</text>
  <text x="720" y="212" text-anchor="middle" font-size="11" fill="#94a3b8">Action F</text>
  <line x1="470" y1="218" x2="820" y2="218" stroke="#334155" stroke-width="1"/>
  <text x="555" y="236" text-anchor="middle" font-size="12" fill="#60a5fa">Lens</text>
  <text x="720" y="236" text-anchor="middle" font-size="12" fill="#60a5fa">F a = (a, c)  -- Strong</text>
  <text x="555" y="256" text-anchor="middle" font-size="12" fill="#34d399">Prism</text>
  <text x="720" y="256" text-anchor="middle" font-size="12" fill="#34d399">F a = Either a c  -- Choice</text>
  <text x="555" y="276" text-anchor="middle" font-size="12" fill="#a78bfa">Traversal</text>
  <text x="720" y="276" text-anchor="middle" font-size="12" fill="#a78bfa">F a = f a  -- Wander</text>
  <text x="555" y="296" text-anchor="middle" font-size="12" fill="#fb923c">Grate</text>
  <text x="720" y="296" text-anchor="middle" font-size="12" fill="#fb923c">F a = x -&gt; a  -- Closed</text>
  <text x="555" y="316" text-anchor="middle" font-size="12" fill="#94a3b8">Iso</text>
  <text x="720" y="316" text-anchor="middle" font-size="12" fill="#94a3b8">no constraint  -- any p</text>
  <rect x="470" y="345" width="350" height="44" fill="#1e293b" rx="4"/>
  <text x="645" y="363" text-anchor="middle" font-size="11" fill="#34d399">Yoneda for profunctors:</text>
  <text x="645" y="379" text-anchor="middle" font-size="11" fill="#94a3b8">(forall p. Tambara p =&gt; p a b -&gt; p s t)  ~=  Optic s t a b</text>
</svg>