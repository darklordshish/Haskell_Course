<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="420" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#5872c9"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3f9d77"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#d9a441"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#8b6db5"/></marker>
  </defs>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Tambara Modules: Profunctor Optics Explained</text>
  <rect x="20" y="45" width="390" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="215" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">Strong  =  Tambara for (,)</text>
  <rect x="40" y="82" width="350" height="55" fill="#f7f8fa" stroke="#5872c9" stroke-width="1" rx="5"/>
  <text x="215" y="103" text-anchor="middle" font-size="12" fill="#475569">class Profunctor p =&gt; Strong p where</text>
  <text x="215" y="120" text-anchor="middle" font-size="12" fill="#5872c9">  first :: p a b -&gt; p (a,c) (b,c)</text>
  <rect x="55" y="160" width="100" height="40" fill="#f7f8fa" stroke="#cbd5e1" rx="5"/>
  <text x="105" y="185" text-anchor="middle" font-size="12" fill="#475569">p a b</text>
  <rect x="255" y="160" width="120" height="40" fill="#f7f8fa" stroke="#cbd5e1" rx="5"/>
  <text x="315" y="185" text-anchor="middle" font-size="12" fill="#475569">p (a,c) (b,c)</text>
  <rect x="55" y="265" width="100" height="40" fill="#f7f8fa" stroke="#cbd5e1" rx="5"/>
  <text x="105" y="285" text-anchor="middle" font-size="12" fill="#475569">p a' b'</text>
  <rect x="255" y="265" width="130" height="40" fill="#f7f8fa" stroke="#cbd5e1" rx="5"/>
  <text x="320" y="285" text-anchor="middle" font-size="12" fill="#475569">p (a',c) (b',c)</text>
  <line x1="155" y1="180" x2="253" y2="180" stroke="#5872c9" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="204" y="173" text-anchor="middle" font-size="11" fill="#8a93a3">first</text>
  <line x1="155" y1="285" x2="253" y2="285" stroke="#5872c9" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="204" y="278" text-anchor="middle" font-size="11" fill="#8a93a3">first</text>
  <line x1="105" y1="200" x2="105" y2="263" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="68" y="236" font-size="11" fill="#8a93a3">dimap f g</text>
  <line x1="315" y1="200" x2="315" y2="263" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="330" y="236" font-size="11" fill="#8a93a3">dimap f g</text>
  <text x="215" y="240" text-anchor="middle" font-size="11" fill="#d9a441">naturality: commutes</text>
  <rect x="40" y="325" width="350" height="44" fill="#f7f8fa" rx="4"/>
  <text x="215" y="343" text-anchor="middle" font-size="11" fill="#8a93a3">Tambara condition:</text>
  <text x="215" y="360" text-anchor="middle" font-size="11" fill="#5872c9">first . dimap f g = dimap (f***id) (g***id) . first</text>
  <rect x="450" y="45" width="390" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" rx="8"/>
  <text x="645" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b6db5">Optic = Tambara Natural Transformation</text>
  <rect x="470" y="80" width="350" height="70" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1" rx="5"/>
  <text x="645" y="102" text-anchor="middle" font-size="12" fill="#475569">type Optic p s t a b = p a b -&gt; p s t</text>
  <text x="645" y="122" text-anchor="middle" font-size="11" fill="#8a93a3">-- p must be a Tambara module for the optic's action</text>
  <text x="645" y="138" text-anchor="middle" font-size="11" fill="#8a93a3">-- this is why the forall constraint works</text>
  <rect x="470" y="168" width="350" height="160" fill="#f7f8fa" stroke="#cbd5e1" rx="5"/>
  <text x="645" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Optic = Tambara for action F</text>
  <line x1="470" y1="196" x2="820" y2="196" stroke="#cbd5e1" stroke-width="1"/>
  <text x="555" y="212" text-anchor="middle" font-size="11" fill="#8a93a3">Optic</text>
  <text x="720" y="212" text-anchor="middle" font-size="11" fill="#8a93a3">Action F</text>
  <line x1="470" y1="218" x2="820" y2="218" stroke="#cbd5e1" stroke-width="1"/>
  <text x="555" y="236" text-anchor="middle" font-size="12" fill="#5872c9">Lens</text>
  <text x="720" y="236" text-anchor="middle" font-size="12" fill="#5872c9">F a = (a, c)  -- Strong</text>
  <text x="555" y="256" text-anchor="middle" font-size="12" fill="#3f9d77">Prism</text>
  <text x="720" y="256" text-anchor="middle" font-size="12" fill="#3f9d77">F a = Either a c  -- Choice</text>
  <text x="555" y="276" text-anchor="middle" font-size="12" fill="#8b6db5">Traversal</text>
  <text x="720" y="276" text-anchor="middle" font-size="12" fill="#8b6db5">F a = f a  -- Wander</text>
  <text x="555" y="296" text-anchor="middle" font-size="12" fill="#d9a441">Grate</text>
  <text x="720" y="296" text-anchor="middle" font-size="12" fill="#d9a441">F a = x -&gt; a  -- Closed</text>
  <text x="555" y="316" text-anchor="middle" font-size="12" fill="#8a93a3">Iso</text>
  <text x="720" y="316" text-anchor="middle" font-size="12" fill="#8a93a3">no constraint  -- any p</text>
  <rect x="470" y="345" width="350" height="44" fill="#f7f8fa" rx="4"/>
  <text x="645" y="363" text-anchor="middle" font-size="11" fill="#3f9d77">Yoneda for profunctors:</text>
  <text x="645" y="379" text-anchor="middle" font-size="11" fill="#8a93a3">(forall p. Tambara p =&gt; p a b -&gt; p s t)  ~=  Optic s t a b</text>
</svg>