<svg xmlns="http://www.w3.org/2000/svg" width="860" height="460" viewBox="0 0 860 460" font-family="monospace,Arial,sans-serif">
  <rect width="860" height="460" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#059669"/></marker>
    <marker id="av" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#7c3aed"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ea580c"/></marker>
  </defs>
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Ends and Coends</text>
  <text x="210" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">End:  forall x. p x x</text>
  <rect x="150" y="70" width="120" height="44" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="210" y="90" text-anchor="middle" font-size="13" fill="#2563eb">End p</text>
  <text x="210" y="107" text-anchor="middle" font-size="11" fill="#64748b">forall x. p x x</text>
  <rect x="60" y="180" width="110" height="44" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="115" y="200" text-anchor="middle" font-size="13" fill="#334155">p a a</text>
  <text x="115" y="216" text-anchor="middle" font-size="11" fill="#64748b">diag a</text>
  <rect x="250" y="180" width="110" height="44" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="305" y="200" text-anchor="middle" font-size="13" fill="#334155">p b b</text>
  <text x="305" y="216" text-anchor="middle" font-size="11" fill="#64748b">diag b</text>
  <line x1="190" y1="114" x2="135" y2="178" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="230" y1="114" x2="285" y2="178" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="148" y="152" font-size="11" fill="#64748b">pi_a</text>
  <text x="256" y="152" font-size="11" fill="#64748b">pi_b</text>
  <rect x="155" y="310" width="110" height="44" fill="#ffffff" stroke="#64748b" stroke-width="1" rx="6" stroke-dasharray="5,3"/>
  <text x="210" y="330" text-anchor="middle" font-size="12" fill="#64748b">f : a -&gt; b</text>
  <text x="210" y="346" text-anchor="middle" font-size="11" fill="#64748b">any morphism</text>
  <line x1="170" y1="224" x2="198" y2="308" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <line x1="250" y1="308" x2="278" y2="226" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="160" y="275" font-size="10" fill="#64748b">dimap f id</text>
  <text x="265" y="275" font-size="10" fill="#64748b">dimap id f</text>
  <rect x="50" y="375" width="330" height="34" fill="#f1f5f9" rx="4"/>
  <text x="215" y="390" text-anchor="middle" font-size="11" fill="#2563eb">Wedge condition:</text>
  <text x="215" y="404" text-anchor="middle" font-size="11" fill="#64748b">pi_b . dimap f id = pi_a . dimap id f</text>
  <rect x="50" y="420" width="330" height="28" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
  <text x="215" y="438" text-anchor="middle" font-size="11" fill="#059669">In Haskell:  newtype End p = End { getEnd :: forall x. p x x }</text>
  <text x="650" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">Coend:  exists x. p x x</text>
  <rect x="590" y="330" width="120" height="44" fill="#f1f5f9" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
  <text x="650" y="350" text-anchor="middle" font-size="13" fill="#7c3aed">Coend p</text>
  <text x="650" y="366" text-anchor="middle" font-size="11" fill="#64748b">exists x. p x x</text>
  <rect x="490" y="180" width="110" height="44" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="545" y="200" text-anchor="middle" font-size="13" fill="#334155">p a a</text>
  <text x="545" y="216" text-anchor="middle" font-size="11" fill="#64748b">inj a</text>
  <rect x="680" y="180" width="110" height="44" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" rx="6"/>
  <text x="735" y="200" text-anchor="middle" font-size="13" fill="#334155">p b b</text>
  <text x="735" y="216" text-anchor="middle" font-size="11" fill="#64748b">inj b</text>
  <line x1="565" y1="224" x2="625" y2="328" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#av)"/>
  <line x1="715" y1="224" x2="675" y2="328" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#av)"/>
  <text x="578" y="285" font-size="11" fill="#64748b">inj_a</text>
  <text x="696" y="285" font-size="11" fill="#64748b">inj_b</text>
  <rect x="460" y="70" width="360" height="80" fill="#f1f5f9" stroke="#cbd5e1" rx="6"/>
  <text x="640" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">Profunctor composition via Coend</text>
  <text x="640" y="110" text-anchor="middle" font-size="12" fill="#334155">(p o q)(a,c) = Coend_b (p a b, q b c)</text>
  <text x="640" y="128" text-anchor="middle" font-size="11" fill="#64748b">i.e.  exists b. (p a b, q b c)</text>
  <text x="640" y="144" text-anchor="middle" font-size="11" fill="#64748b">Hom-profunctor Hom(a,b) = a -&gt; b  is the identity</text>
  <rect x="460" y="420" width="370" height="28" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
  <text x="645" y="438" text-anchor="middle" font-size="11" fill="#059669">data Coend p = forall x. Coend (p x x)  -- ExistentialQuantification</text>
</svg>