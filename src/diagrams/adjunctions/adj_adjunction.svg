="308" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">G</text><text x="430" y="322" text-anchor="middle" font-size="10" fill="#1e40af">(right adjoint)</text><rect x="290" y="360" width="280" height="90" rx="8" fill="#f1f5f9" stroke="#7c3aed" stroke-width="2"/><text x="430" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">Hom Isomorphism</text><text x="430" y="400" text-anchor="middle" font-size="11" fill="#334155">Hom_D(F a, b)</text><text x="430" y="418" text-anchor="middle" font-size="13" fill="#7c3aed">&#8773;</text><text x="430" y="436" text-anchor="middle" font-size="11" fill="#334155">Hom_C(a, G b)</text><rect x="30" y="410" width="240" height="80" rx="6" fill="#f1f5f9" stroke="#d97706" stroke-width="1.5"/><text x="150" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">Triangle Laws</text><text x="150" y="448" text-anchor="middle" font-size="10" fill="#334155">G&#949; &#8728; &#951;G = id_G</text><text x="150" y="464" text-anchor="middle" font-size="10" fill="#334155">&#949;F &#8728; F&#951; = id_F</text><text x="150" y="480" text-anchor="middle" font-size="9" fill="#64748b">(unit-counit equations)</text><rect x="590" y="410" width="240" height="80" rx="6" fill="#f1f5f9" stroke="#059669" stroke-width="1.5"/><text x="710" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">Haskell (curry)</text><text x="710" y="448" text-anchor="middle" font-size="10" fill="#334155">F = (,) r  (pair with r)</text><text x="710" y="464" text-anchor="middle" font-size="10" fill="#334155">G = r ->  (function from r)</text><text x="710" y="480" text-anchor="middle" font-size="9" fill="#64748b">curry :: ((r,a)->b) -> r->a->b</text><text x="430" y="510" text-anchor="middle" font-size="10" fill="#64748b">Adjunction: universal mapping property | F &#8869; G iff Hom_D(Fa,b) &#8773; Hom_C(a,Gb) nat. in a,b</text></svg>