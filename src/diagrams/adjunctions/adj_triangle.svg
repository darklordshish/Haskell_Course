<svg xmlns="http://www.w3.org/2000/svg" width="700" height="260"
     viewBox="0 0 700 260"
     font-family="monospace,'JetBrains Mono',Arial,sans-serif">
  <!-- Background -->
  <rect width="700" height="260" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="bold">
    Triangle Identities (Triangular Equations)
  </text>

  <!-- TOP ROW: F(a) -> F(GF(a)) -> F(a) -->
  <!-- Nodes -->
  <rect x="30" y="55" width="70" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="65" y="77" text-anchor="middle" fill="#2563eb" font-size="13">F(a)</text>

  <rect x="290" y="55" width="110" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="345" y="77" text-anchor="middle" fill="#7c3aed" font-size="13">F(G(F(a)))</text>

  <rect x="590" y="55" width="70" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="625" y="77" text-anchor="middle" fill="#2563eb" font-size="13">F(a)</text>

  <!-- Arrows top row -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <line x1="102" y1="72" x2="287" y2="72" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="65" text-anchor="middle" fill="#64748b" font-size="11">F(eta_a)</text>

  <line x1="403" y1="72" x2="587" y2="72" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="65" text-anchor="middle" fill="#64748b" font-size="11">eps_{F(a)}</text>

  <!-- id arc top -->
  <path d="M 100 90 Q 350 140 588 90" fill="none" stroke="#059669" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="350" y="135" text-anchor="middle" fill="#059669" font-size="12" font-style="italic">id_{F(a)}</text>

  <!-- BOTTOM ROW: G(b) -> G(F(G(b))) -> G(b) -->
  <rect x="30" y="185" width="70" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="65" y="207" text-anchor="middle" fill="#2563eb" font-size="13">G(b)</text>

  <rect x="290" y="185" width="110" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="345" y="207" text-anchor="middle" fill="#7c3aed" font-size="13">G(F(G(b)))</text>

  <rect x="590" y="185" width="70" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="625" y="207" text-anchor="middle" fill="#2563eb" font-size="13">G(b)</text>

  <!-- Arrows bottom row -->
  <line x1="102" y1="202" x2="287" y2="202" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="195" text-anchor="middle" fill="#64748b" font-size="11">eta_{G(b)}</text>

  <line x1="403" y1="202" x2="587" y2="202" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="495" y="195" text-anchor="middle" fill="#64748b" font-size="11">G(eps_b)</text>

  <!-- id arc bottom -->
  <path d="M 100 220 Q 350 255 588 220" fill="none" stroke="#059669" stroke-width="1.5"
        stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="350" y="252" text-anchor="middle" fill="#059669" font-size="12" font-style="italic">id_{G(b)}</text>
</svg>