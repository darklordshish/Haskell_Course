<svg xmlns="http://www.w3.org/2000/svg" width="560" height="300" viewBox="0 0 560 300" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334466"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-size="11" fill="#0f172a" font-weight="bold">Bayesian network = morphism in Kleisli(Dist); update = disintegration</text>

  <!-- Panel background for DAG area -->
  <rect x="60" y="35" width="440" height="245" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Node: Cloudy (top center) -->
  <rect x="215" y="50" width="110" height="38" rx="6" fill="#dbeafe" stroke="#2255cc" stroke-width="1.8"/>
  <text x="270" y="73" text-anchor="middle" font-size="13" fill="#0f172a" font-weight="bold">Cloudy</text>

  <!-- Node: Sprinkler (mid left) -->
  <rect x="90" y="148" width="120" height="38" rx="6" fill="#ede9fe" stroke="#7733aa" stroke-width="1.8"/>
  <text x="150" y="171" text-anchor="middle" font-size="13" fill="#0f172a" font-weight="bold">Sprinkler</text>

  <!-- Node: Rain (mid right) -->
  <rect x="340" y="148" width="110" height="38" rx="6" fill="#dbeafe" stroke="#2255cc" stroke-width="1.8"/>
  <text x="395" y="171" text-anchor="middle" font-size="13" fill="#0f172a" font-weight="bold">Rain</text>

  <!-- Node: WetGrass (bottom center) -->
  <rect x="205" y="238" width="120" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8"/>
  <text x="265" y="261" text-anchor="middle" font-size="13" fill="#0f172a" font-weight="bold">WetGrass</text>

  <!-- Edge: Cloudy -> Sprinkler -->
  <line x1="240" y1="88" x2="185" y2="148" stroke="#334466" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Edge: Cloudy -> Rain -->
  <line x1="300" y1="88" x2="367" y2="148" stroke="#334466" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Edge: Sprinkler -> WetGrass -->
  <line x1="185" y1="186" x2="235" y2="238" stroke="#334466" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Edge: Rain -> WetGrass -->
  <line x1="370" y1="186" x2="305" y2="238" stroke="#334466" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- CPT hint label on Cloudy->Rain edge -->
  <text x="356" y="128" text-anchor="middle" font-size="10" fill="#7733aa" font-style="italic">P(Rain|Cloudy)</text>

  <!-- CPT hint label on Cloudy->Sprinkler edge -->
  <text x="192" y="120" text-anchor="middle" font-size="10" fill="#7733aa" font-style="italic">P(S|C)</text>

</svg>
