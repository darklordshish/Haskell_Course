<svg xmlns="http://www.w3.org/2000/svg" width="620" height="300" viewBox="0 0 620 300" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334466"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="180" y="28" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Kripke frame (W, R)</text>

  <!-- Accessibility arrows -->
  <!-- w1 -> w2 -->
  <line x1="96" y1="110" x2="174" y2="110" stroke="#334466" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- w2 -> w3 -->
  <line x1="216" y1="110" x2="294" y2="110" stroke="#334466" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- w1 -> w3 (arc above) -->
  <path d="M 80 95 Q 195 50 300 95" stroke="#2255cc" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <!-- w3 -> w4 -->
  <line x1="336" y1="110" x2="414" y2="110" stroke="#334466" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- World w1 -->
  <circle cx="80" cy="110" r="28" fill="#f8fafc" stroke="#2255cc" stroke-width="2"/>
  <text x="80" y="114" font-size="13" font-weight="bold" fill="#2255cc" text-anchor="middle">w1</text>

  <!-- World w2 -->
  <circle cx="195" cy="110" r="28" fill="#f8fafc" stroke="#2255cc" stroke-width="2"/>
  <text x="195" y="114" font-size="13" font-weight="bold" fill="#2255cc" text-anchor="middle">w2</text>

  <!-- World w3 (p = true, highlighted) -->
  <circle cx="315" cy="110" r="28" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="315" y="106" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">w3</text>
  <text x="315" y="122" font-size="10" fill="#16a34a" text-anchor="middle">p = true</text>

  <!-- World w4 -->
  <circle cx="435" cy="110" r="28" fill="#f8fafc" stroke="#2255cc" stroke-width="2"/>
  <text x="435" y="114" font-size="13" font-weight="bold" fill="#2255cc" text-anchor="middle">w4</text>

  <!-- World labels below -->
  <text x="80" y="152" font-size="10" fill="#334466" text-anchor="middle">w1</text>
  <text x="195" y="152" font-size="10" fill="#334466" text-anchor="middle">w2</text>
  <text x="315" y="152" font-size="10" fill="#16a34a" text-anchor="middle">w3</text>
  <text x="435" y="152" font-size="10" fill="#334466" text-anchor="middle">w4</text>

  <!-- Legend box -->
  <rect x="30" y="185" width="555" height="90" rx="6" ry="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="45" y="207" font-size="12" font-weight="bold" fill="#0f172a">Legend:</text>
  <text x="45" y="228" font-size="11" fill="#7733aa">Box p @ w  iff  all R-reachable worlds |= p</text>
  <text x="45" y="250" font-size="11" fill="#7733aa">Dia p @ w  iff  some R-reachable world |= p</text>
  <text x="45" y="268" font-size="10" fill="#334466">R = {(w1,w2), (w2,w3), (w1,w3), (w3,w4)}   (transitive cluster)</text>
</svg>
