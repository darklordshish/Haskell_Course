<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334466"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="320" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Fuzzy logic in the lattice ([0,1], min, max)</text>

  <!-- LEFT PANEL -->
  <rect x="20" y="44" width="230" height="240" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="135" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#2255cc">Lattice [0,1]</text>

  <!-- Vertical lattice line -->
  <line x1="100" y1="85" x2="100" y2="255" stroke="#334466" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Tick marks and labels -->
  <!-- 0 at bottom -->
  <line x1="93" y1="250" x2="107" y2="250" stroke="#334466" stroke-width="1.5"/>
  <text x="82" y="254" text-anchor="end" font-size="11" fill="#0f172a">0</text>

  <!-- 0.5 in middle -->
  <line x1="93" y1="168" x2="107" y2="168" stroke="#334466" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="82" y="172" text-anchor="end" font-size="11" fill="#0f172a">0.5</text>

  <!-- 1 at top -->
  <line x1="93" y1="88" x2="107" y2="88" stroke="#334466" stroke-width="1.5"/>
  <text x="82" y="92" text-anchor="end" font-size="11" fill="#0f172a">1</text>

  <!-- meet / join labels -->
  <text x="115" y="92" font-size="10" fill="#7733aa">^ meet = min</text>
  <text x="115" y="254" font-size="10" fill="#7733aa">v join = max</text>

  <!-- Dots on lattice -->
  <circle cx="100" cy="88" r="4" fill="#2255cc"/>
  <circle cx="100" cy="168" r="4" fill="#16a34a"/>
  <circle cx="100" cy="250" r="4" fill="#2255cc"/>

  <!-- Annotations -->
  <text x="135" y="200" text-anchor="middle" font-size="10" fill="#334466">all truth values</text>
  <text x="135" y="213" text-anchor="middle" font-size="10" fill="#334466">in [0,1]</text>
  <text x="135" y="230" text-anchor="middle" font-size="10" fill="#334466">form a complete</text>
  <text x="135" y="243" text-anchor="middle" font-size="10" fill="#334466">lattice</text>

  <!-- RIGHT PANEL -->
  <rect x="265" y="44" width="400" height="200" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
  <text x="465" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#2255cc">Connectives</text>

  <!-- Table rows -->
  <text x="280" y="88" font-size="11" fill="#0f172a">T-norm min:   min(a, b)</text>
  <line x1="280" y1="94" x2="650" y2="94" stroke="#cbd5e1" stroke-width="0.8"/>

  <text x="280" y="112" font-size="11" fill="#0f172a">T-norm prod:  a * b</text>
  <line x1="280" y1="118" x2="650" y2="118" stroke="#cbd5e1" stroke-width="0.8"/>

  <text x="280" y="136" font-size="11" fill="#0f172a">Luka:         max(0, a + b - 1)</text>
  <line x1="280" y1="142" x2="650" y2="142" stroke="#cbd5e1" stroke-width="0.8"/>

  <text x="280" y="160" font-size="11" fill="#0f172a">T-conorm:     max(a, b)</text>
  <line x1="280" y1="166" x2="650" y2="166" stroke="#cbd5e1" stroke-width="0.8"/>

  <text x="280" y="184" font-size="11" fill="#0f172a">neg:          1 - x</text>
  <line x1="280" y1="190" x2="650" y2="190" stroke="#cbd5e1" stroke-width="0.8"/>

  <!-- BOTTOM EXAMPLE -->
  <rect x="20" y="294" width="645" height="22" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="332" y="309" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="bold">tall(175) = 0.5  AND  young(30) = 0.67  -&gt;  min(0.5, 0.67) = 0.5</text>
</svg>
