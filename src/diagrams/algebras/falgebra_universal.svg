<svg xmlns="http://www.w3.org/2000/svg" width="560" height="320" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b6db5"/></marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3f9d77"/></marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5872c9"/></marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d9a441"/></marker>
  </defs>
  <rect width="560" height="320" fill="#ffffff" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Universal Property of Initial F-Algebra</text>
  <text x="280" y="44" text-anchor="middle" font-size="10" fill="#8a93a3">Catamorphism: unique arrow from (&#956;F, in)</text>

  <!-- Nodes -->
  <!-- F(muF) - top left -->
  <rect x="30" y="70" width="150" height="44" rx="6" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="105" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">F(&#956;F)</text>
  <text x="105" y="105" text-anchor="middle" font-size="9" fill="#8a93a3">functor application</text>

  <!-- muF - top right -->
  <rect x="370" y="70" width="150" height="44" rx="6" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="445" y="89" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">&#956;F</text>
  <text x="445" y="105" text-anchor="middle" font-size="9" fill="#8a93a3">initial algebra</text>

  <!-- F(A) - bottom left -->
  <rect x="30" y="220" width="150" height="44" rx="6" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="105" y="239" text-anchor="middle" font-size="11" fill="#3f9d77">F(A)</text>
  <text x="105" y="255" text-anchor="middle" font-size="9" fill="#8a93a3">functor application</text>

  <!-- A - bottom right -->
  <rect x="370" y="220" width="150" height="44" rx="6" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="445" y="239" text-anchor="middle" font-size="11" fill="#3f9d77">A</text>
  <text x="445" y="255" text-anchor="middle" font-size="9" fill="#8a93a3">algebra carrier</text>

  <!-- Arrows -->
  <!-- Top: F(muF) -> muF (in) -->
  <line x1="180" y1="92" x2="368" y2="92" stroke="#8b6db5" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="274" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">in</text>

  <!-- Bottom: F(A) -> A (alg) -->
  <line x1="180" y1="242" x2="368" y2="242" stroke="#3f9d77" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="274" y="234" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">alg</text>

  <!-- Left: F(muF) -> F(A) (F(h)) -->
  <line x1="105" y1="114" x2="105" y2="218" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="75" y="168" text-anchor="middle" font-size="10" fill="#5872c9">F(h)</text>

  <!-- Right: muF -> A (h = cata alg) -->
  <line x1="445" y1="114" x2="445" y2="218" stroke="#d9a441" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr4)"/>
  <text x="490" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#d9a441">h</text>
  <text x="490" y="172" text-anchor="middle" font-size="9" fill="#d9a441">= cata alg</text>
  <text x="490" y="185" text-anchor="middle" font-size="9" fill="#8a93a3">(unique)</text>

  <!-- Law -->
  <rect x="20" y="282" width="520" height="28" rx="5" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="280" y="295" text-anchor="middle" font-size="10" fill="#475569">Law: h . in = alg . fmap h</text>
  <text x="280" y="308" text-anchor="middle" font-size="9" fill="#8a93a3">cata alg is the unique arrow making the square commute</text>
</svg>
