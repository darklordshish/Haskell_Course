<svg xmlns="http://www.w3.org/2000/svg" width="680" height="280" font-family="monospace,Arial,sans-serif">
  <rect width="680" height="280" fill="#ffffff" rx="8"/>
  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Type Semiring in Haskell</text>
  <!-- Header row -->
  <rect x="30" y="40" width="620" height="36" fill="#eef1fb" rx="4"/>
  <text x="130" y="63" text-anchor="middle" font-size="13" fill="#5872c9" font-weight="bold">Structure</text>
  <text x="280" y="63" text-anchor="middle" font-size="13" fill="#5872c9" font-weight="bold">Operation</text>
  <text x="430" y="63" text-anchor="middle" font-size="13" fill="#5872c9" font-weight="bold">Haskell</text>
  <text x="610" y="63" text-anchor="middle" font-size="13" fill="#5872c9" font-weight="bold">Neutral</text>
  <!-- Col dividers -->
  <line x1="200" y1="40" x2="200" y2="260" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="350" y1="40" x2="350" y2="260" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="520" y1="40" x2="520" y2="260" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Row 1: Sum -->
  <rect x="30" y="76" width="620" height="36" fill="#f5e3e2" rx="2"/>
  <text x="130" y="99" text-anchor="middle" font-size="12" fill="#0f172a">Sum</text>
  <text x="280" y="99" text-anchor="middle" font-size="12" fill="#0f172a">A + B</text>
  <text x="430" y="99" text-anchor="middle" font-size="12" fill="#0f172a">Either a b</text>
  <text x="610" y="99" text-anchor="middle" font-size="12" fill="#0f172a">Void</text>
  <!-- Row 2: Product -->
  <rect x="30" y="112" width="620" height="36" fill="#e9f4ee" rx="2"/>
  <text x="130" y="135" text-anchor="middle" font-size="12" fill="#0f172a">Product</text>
  <text x="280" y="135" text-anchor="middle" font-size="12" fill="#0f172a">A &#215; B</text>
  <text x="430" y="135" text-anchor="middle" font-size="12" fill="#0f172a">(a, b)</text>
  <text x="610" y="135" text-anchor="middle" font-size="12" fill="#0f172a">()</text>
  <!-- Row 3: Exponent -->
  <rect x="30" y="148" width="620" height="36" fill="#f4e7cf" rx="2"/>
  <text x="130" y="171" text-anchor="middle" font-size="12" fill="#0f172a">Exponent</text>
  <text x="280" y="171" text-anchor="middle" font-size="12" fill="#0f172a">B^A</text>
  <text x="430" y="171" text-anchor="middle" font-size="12" fill="#0f172a">a -&gt; b</text>
  <text x="610" y="171" text-anchor="middle" font-size="12" fill="#0f172a">&#8212;</text>
  <!-- Row 4: Isomorphism -->
  <rect x="30" y="184" width="620" height="36" fill="#efeaf6" rx="2"/>
  <text x="130" y="207" text-anchor="middle" font-size="12" fill="#0f172a">Isomorphism</text>
  <text x="280" y="207" text-anchor="middle" font-size="12" fill="#0f172a">A &#8773; B</text>
  <text x="430" y="207" text-anchor="middle" font-size="12" fill="#0f172a">Iso a b</text>
  <text x="610" y="207" text-anchor="middle" font-size="12" fill="#0f172a">equality law</text>
  <!-- Laws row -->
  <rect x="30" y="224" width="620" height="36" fill="#f7f8fa" rx="4"/>
  <text x="340" y="242" text-anchor="middle" font-size="10" fill="#8a93a3">0 + A &#8773; A &#8226; 1 &#215; A &#8773; A &#8226; (A+B)&#215;C &#8773; A&#215;C + B&#215;C</text>
  <text x="340" y="256" text-anchor="middle" font-size="10" fill="#8a93a3">B^(A+C) &#8773; B^A &#215; B^C &#8226; (B&#215;C)^A &#8773; B^A &#215; C^A</text>
</svg>
