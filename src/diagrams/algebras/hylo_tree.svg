<svg xmlns="http://www.w3.org/2000/svg" width="500" height="180" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>
  <rect width="500" height="180" fill="#ffffff" rx="8"/>

  <!-- A (source) -->
  <rect x="15" y="72" width="80" height="38" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="55" y="96" text-anchor="middle" font-size="16" font-style="italic" fill="#065f46">A</text>

  <!-- muF (intermediate tree) -->
  <rect x="200" y="50" width="100" height="82" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="250" y="74" text-anchor="middle" font-size="13" fill="#334155">muF</text>
  <circle cx="250" cy="96" r="5" fill="#64748b"/>
  <circle cx="230" cy="114" r="4" fill="#64748b"/>
  <circle cx="270" cy="114" r="4" fill="#64748b"/>
  <line x1="250" y1="101" x2="234" y2="110" stroke="#64748b" stroke-width="1"/>
  <line x1="250" y1="101" x2="266" y2="110" stroke="#64748b" stroke-width="1"/>
  <text x="250" y="132" text-anchor="middle" font-size="9" fill="#94a3b8">(intermediate)</text>

  <!-- B (result) -->
  <rect x="405" y="72" width="80" height="38" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="445" y="96" text-anchor="middle" font-size="16" font-style="italic" fill="#5b21b6">B</text>

  <!-- Arrow A -> muF: ana/unfold -->
  <line x1="97" y1="91" x2="198" y2="91" stroke="#2563eb" stroke-width="2" marker-end="url(#arrb)"/>
  <text x="148" y="81" text-anchor="middle" font-size="11" fill="#2563eb">ana / unfold</text>
  <text x="148" y="106" text-anchor="middle" font-size="9" fill="#64748b">(coalgebra)</text>

  <!-- Arrow muF -> B: cata/fold -->
  <line x1="302" y1="91" x2="403" y2="91" stroke="#dc2626" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="353" y="81" text-anchor="middle" font-size="11" fill="#dc2626">cata / fold</text>
  <text x="353" y="106" text-anchor="middle" font-size="9" fill="#64748b">(algebra)</text>

  <!-- Curved arrow: hylo = cata . ana -->
  <path d="M 55 72 C 55 25, 445 25, 445 72" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrp)"/>
  <text x="250" y="18" text-anchor="middle" font-size="12" fill="#7c3aed">hylo = cata . ana</text>

  <!-- Bottom note -->
  <text x="250" y="168" text-anchor="middle" font-size="11" fill="#94a3b8">Hylomorphism deforests the intermediate tree</text>
</svg>
