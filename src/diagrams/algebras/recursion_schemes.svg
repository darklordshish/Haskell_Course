<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" font-family="monospace,Arial,sans-serif">
  <rect width="680" height="360" fill="#ffffff" rx="10"/>
  <text x="340" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Recursion Schemes Hierarchy</text>
  <text x="340" y="44" text-anchor="middle" font-size="10" fill="#8a93a3">Each subsequent scheme extends the previous</text>

  <!-- cata -->
  <rect x="30" y="60" width="120" height="40" rx="5" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="90" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">cata</text>
  <text x="90" y="93" text-anchor="middle" font-size="9" fill="#8a93a3">Algebra</text>

  <!-- para -->
  <rect x="190" y="60" width="120" height="40" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">para</text>
  <text x="250" y="93" text-anchor="middle" font-size="9" fill="#8a93a3">RAlgebra</text>

  <!-- ana -->
  <rect x="30" y="140" width="120" height="40" rx="5" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="90" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">ana</text>
  <text x="90" y="173" text-anchor="middle" font-size="9" fill="#8a93a3">Coalgebra</text>

  <!-- apo -->
  <rect x="190" y="140" width="120" height="40" rx="5" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="250" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">apo</text>
  <text x="250" y="173" text-anchor="middle" font-size="9" fill="#8a93a3">RCoalgebra</text>

  <!-- histo -->
  <rect x="350" y="140" width="130" height="40" rx="5" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="415" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">histo</text>
  <text x="415" y="173" text-anchor="middle" font-size="9" fill="#8a93a3">CVAlgebra</text>

  <!-- futu -->
  <rect x="510" y="140" width="130" height="40" rx="5" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="575" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">futu</text>
  <text x="575" y="173" text-anchor="middle" font-size="9" fill="#8a93a3">CVCoalgebra</text>

  <!-- hylo -->
  <rect x="30" y="230" width="120" height="40" rx="5" fill="#f7f8fa" stroke="#d9a441" stroke-width="1.5"/>
  <text x="90" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#d9a441">hylo</text>
  <text x="90" y="263" text-anchor="middle" font-size="9" fill="#8a93a3">cata . ana</text>

  <!-- chrono -->
  <rect x="415" y="230" width="130" height="40" rx="5" fill="#f7f8fa" stroke="#d9a441" stroke-width="1.5"/>
  <text x="480" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#d9a441">chrono</text>
  <text x="480" y="263" text-anchor="middle" font-size="9" fill="#8a93a3">histo . futu</text>

  <!-- Arrows -->
  <line x1="150" y1="80" x2="188" y2="80" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="170" y="73" text-anchor="middle" font-size="8" fill="#8a93a3">+ orig.</text>

  <line x1="150" y1="160" x2="188" y2="160" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="170" y="153" text-anchor="middle" font-size="8" fill="#8a93a3">+ exit</text>

  <line x1="310" y1="160" x2="348" y2="160" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="330" y="153" text-anchor="middle" font-size="8" fill="#8a93a3">+ hist.</text>

  <line x1="480" y1="160" x2="508" y2="160" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#sarr)"/>
  <text x="495" y="153" text-anchor="middle" font-size="8" fill="#8a93a3">pred.</text>

  <line x1="90" y1="180" x2="90" y2="228" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#sarr)"/>
  <text x="60" y="208" text-anchor="middle" font-size="8" fill="#8a93a3">comp.</text>

  <line x1="415" y1="180" x2="440" y2="228" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#sarr)"/>

  <!-- Legend -->
  <rect x="20" y="295" width="640" height="54" rx="5" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="340" y="314" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Hylomorphism: hylo alg coalg = cata alg . ana coalg</text>
  <text x="340" y="330" text-anchor="middle" font-size="9" fill="#8a93a3">(optimised: no intermediate structure materialised)</text>
  <text x="340" y="345" text-anchor="middle" font-size="9" fill="#8a93a3">Separates recursion from logic: cata tears down, ana builds up structure</text>

  <defs>
    <marker id="sarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#cbd5e1"/></marker>
  </defs>
</svg>
