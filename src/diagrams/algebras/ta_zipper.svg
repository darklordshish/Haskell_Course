<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
  </defs>
  <rect width="680" height="220" fill="#ffffff" rx="8"/>
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">List Zipper = derivative of List type</text>
  <text x="340" y="44" text-anchor="middle" font-size="11" fill="#8a93a3">L(A) = 1 + A &#215; L(A) &#8658; dL/dA = L(A)&#178; = [A] &#215; [A]</text>

  <!-- Left context label -->
  <text x="130" y="70" text-anchor="middle" font-size="11" fill="#8a93a3">Left context</text>
  <!-- Focus label -->
  <text x="340" y="70" text-anchor="middle" font-size="11" fill="#d9a441">Focus</text>
  <!-- Right context label -->
  <text x="550" y="70" text-anchor="middle" font-size="11" fill="#8a93a3">Right context</text>

  <!-- Left context boxes (green) -->
  <rect x="20" y="80" width="46" height="36" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="43" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8321;</text>
  <rect x="74" y="80" width="46" height="36" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="97" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8322;</text>
  <rect x="128" y="80" width="46" height="36" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="151" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8323;</text>

  <!-- Focus box (amber, larger) -->
  <rect x="290" y="74" width="100" height="48" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="2.5"/>
  <text x="340" y="103" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">a&#8324;</text>

  <!-- Right context boxes -->
  <rect x="416" y="80" width="46" height="36" rx="5" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="439" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8325;</text>
  <rect x="470" y="80" width="46" height="36" rx="5" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="493" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8326;</text>
  <rect x="524" y="80" width="46" height="36" rx="5" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="547" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8327;</text>
  <rect x="578" y="80" width="46" height="36" rx="5" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="601" y="103" text-anchor="middle" font-size="13" fill="#0f172a">a&#8328;</text>

  <!-- Navigation arrows -->
  <line x1="285" y1="98" x2="182" y2="98" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="232" y="92" text-anchor="middle" font-size="11" fill="#5872c9">&#8592;</text>
  <line x1="395" y1="98" x2="410" y2="98" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="448" y="92" text-anchor="middle" font-size="11" fill="#5872c9">&#8594;</text>

  <!-- Code -->
  <text x="340" y="148" text-anchor="middle" font-size="12" fill="#5872c9">data ListZipper a = LZ [a] a [a]</text>
  <text x="340" y="167" text-anchor="middle" font-size="11" fill="#8a93a3">goLeft, goRight :: ListZipper a -&gt; Maybe (ListZipper a)</text>
  <!-- Law -->
  <rect x="30" y="178" width="620" height="28" rx="4" fill="#f7f8fa"/>
  <text x="340" y="196" text-anchor="middle" font-size="11" fill="#8b6db5">|LZ(A)| = |[A]| &#215; |A| &#215; |[A]| = L(A)&#178; = dL/dA &#10003;</text>
</svg>
