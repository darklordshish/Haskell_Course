<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="700" height="340" fill="#ffffff" rx="8"/>
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Product (A&#215;B) and Coproduct (A+B)</text>

  <!-- === LEFT: Product === -->
  <text x="175" y="55" text-anchor="middle" font-size="13" fill="#64748b">Product</text>
  <!-- A x B (center top) -->
  <rect x="130" y="70" width="90" height="36" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">A &#215; B</text>
  <!-- A (bottom left) -->
  <rect x="60" y="170" width="60" height="36" rx="6" fill="#f1f5f9" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="194" text-anchor="middle" font-size="13" fill="#0f172a">A</text>
  <!-- B (bottom right) -->
  <rect x="220" y="170" width="60" height="36" rx="6" fill="#f1f5f9" stroke="#fb923c" stroke-width="1.5"/>
  <text x="250" y="194" text-anchor="middle" font-size="13" fill="#0f172a">B</text>
  <!-- C (source) -->
  <rect x="130" y="250" width="90" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="175" y="274" text-anchor="middle" font-size="13" fill="#64748b">C</text>
  <!-- Arrows -->
  <line x1="155" y1="106" x2="100" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="108" y="142" font-size="10" fill="#64748b">fst</text>
  <line x1="195" y1="106" x2="240" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="228" y="142" font-size="10" fill="#64748b">snd</text>
  <line x1="175" y1="250" x2="175" y2="110" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="181" y="183" font-size="10" fill="#a78bfa">(f,g)</text>
  <line x1="155" y1="250" x2="100" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="104" y="234" font-size="9" fill="#64748b">f</text>
  <line x1="195" y1="250" x2="240" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="228" y="234" font-size="9" fill="#64748b">g</text>
  <text x="175" y="316" text-anchor="middle" font-size="9" fill="#64748b">(a,b) :: Type</text>

  <!-- Divider -->
  <line x1="350" y1="45" x2="350" y2="320" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- === RIGHT: Coproduct === -->
  <text x="525" y="55" text-anchor="middle" font-size="13" fill="#64748b">Coproduct</text>
  <!-- A + B (center top) -->
  <rect x="480" y="70" width="90" height="36" rx="6" fill="#f1f5f9" stroke="#fb923c" stroke-width="2"/>
  <text x="525" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">A + B</text>
  <!-- A (bottom left) -->
  <rect x="410" y="170" width="60" height="36" rx="6" fill="#f1f5f9" stroke="#34d399" stroke-width="1.5"/>
  <text x="440" y="194" text-anchor="middle" font-size="13" fill="#0f172a">A</text>
  <!-- B (bottom right) -->
  <rect x="570" y="170" width="60" height="36" rx="6" fill="#f1f5f9" stroke="#fb923c" stroke-width="1.5"/>
  <text x="600" y="194" text-anchor="middle" font-size="13" fill="#0f172a">B</text>
  <!-- D (target) -->
  <rect x="480" y="250" width="90" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="525" y="274" text-anchor="middle" font-size="13" fill="#64748b">D</text>
  <!-- Arrows (reversed - injections go into A+B) -->
  <line x1="460" y1="168" x2="498" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="458" y="142" font-size="10" fill="#64748b">Left</text>
  <line x1="590" y1="168" x2="552" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="142" font-size="10" fill="#64748b">Right</text>
  <!-- either f g dashed -->
  <line x1="525" y1="108" x2="525" y2="248" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="530" y="183" font-size="10" fill="#a78bfa">either f g</text>
  <line x1="460" y1="208" x2="498" y2="252" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="452" y="234" font-size="9" fill="#64748b">f</text>
  <line x1="590" y1="208" x2="552" y2="252" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="556" y="234" font-size="9" fill="#64748b">g</text>
  <text x="525" y="316" text-anchor="middle" font-size="9" fill="#64748b">Either a b :: Type</text>
</svg>
