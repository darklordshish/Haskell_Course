<svg xmlns="http://www.w3.org/2000/svg" width="700" height="340" font-family="monospace,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="700" height="340" fill="#0f172a" rx="8"/>
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f0">Произведение (A&#215;B) и Копроизведение (A+B)</text>

  <!-- === LEFT: Product === -->
  <text x="175" y="55" text-anchor="middle" font-size="13" fill="#94a3b8">Произведение</text>
  <!-- A x B (center top) -->
  <rect x="130" y="70" width="90" height="36" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#93c5fd">A &#215; B</text>
  <!-- A (bottom left) -->
  <rect x="60" y="170" width="60" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="194" text-anchor="middle" font-size="13" fill="#86efac">A</text>
  <!-- B (bottom right) -->
  <rect x="220" y="170" width="60" height="36" rx="6" fill="#4c0519" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="250" y="194" text-anchor="middle" font-size="13" fill="#fda4af">B</text>
  <!-- C (source) -->
  <rect x="130" y="250" width="90" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="175" y="274" text-anchor="middle" font-size="13" fill="#94a3b8">C</text>
  <!-- Arrows -->
  <line x1="155" y1="106" x2="100" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="108" y="142" font-size="10" fill="#64748b">fst</text>
  <line x1="195" y1="106" x2="240" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="228" y="142" font-size="10" fill="#64748b">snd</text>
  <line x1="175" y1="250" x2="175" y2="110" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="181" y="183" font-size="10" fill="#818cf8">(f,g)</text>
  <line x1="155" y1="250" x2="100" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="104" y="234" font-size="9" fill="#64748b">f</text>
  <line x1="195" y1="250" x2="240" y2="210" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="228" y="234" font-size="9" fill="#64748b">g</text>
  <text x="175" y="316" text-anchor="middle" font-size="9" fill="#475569">(a,b) :: Type</text>

  <!-- Divider -->
  <line x1="350" y1="45" x2="350" y2="320" stroke="#1e293b" stroke-width="1.5"/>

  <!-- === RIGHT: Coproduct === -->
  <text x="525" y="55" text-anchor="middle" font-size="13" fill="#94a3b8">Копроизведение</text>
  <!-- A + B (center top) -->
  <rect x="480" y="70" width="90" height="36" rx="6" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
  <text x="525" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#fcd34d">A + B</text>
  <!-- A (bottom left) -->
  <rect x="410" y="170" width="60" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="194" text-anchor="middle" font-size="13" fill="#86efac">A</text>
  <!-- B (bottom right) -->
  <rect x="570" y="170" width="60" height="36" rx="6" fill="#4c0519" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="600" y="194" text-anchor="middle" font-size="13" fill="#fda4af">B</text>
  <!-- D (target) -->
  <rect x="480" y="250" width="90" height="36" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="525" y="274" text-anchor="middle" font-size="13" fill="#94a3b8">D</text>
  <!-- Arrows (reversed - injections go into A+B) -->
  <line x1="460" y1="168" x2="498" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="458" y="142" font-size="10" fill="#64748b">Left</text>
  <line x1="590" y1="168" x2="552" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="556" y="142" font-size="10" fill="#64748b">Right</text>
  <!-- either f g dashed -->
  <line x1="525" y1="108" x2="525" y2="248" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="530" y="183" font-size="10" fill="#818cf8">either f g</text>
  <line x1="460" y1="208" x2="498" y2="252" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="452" y="234" font-size="9" fill="#64748b">f</text>
  <line x1="590" y1="208" x2="552" y2="252" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="556" y="234" font-size="9" fill="#64748b">g</text>
  <text x="525" y="316" text-anchor="middle" font-size="9" fill="#475569">Either a b :: Type</text>
</svg>