<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280" font-family="monospace,Arial,sans-serif">
<rect width="480" height="280" fill="#ffffff" stroke="#f1f5f9" rx="8"/>

<!-- Outer: transformer t m a -->
<rect x="30" y="30" width="420" height="220" fill="#e0f2fe" stroke="#1d4ed8" stroke-width="2" rx="10"/>
<text x="240" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">t m a  (трансформер)</text>

<!-- Middle: base monad m a -->
<rect x="80" y="80" width="320" height="140" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="8"/>
<text x="240" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">m a  (базовая монада)</text>

<!-- Inner: value a -->
<rect x="170" y="125" width="140" height="60" fill="#2d2a04" stroke="#b45309" stroke-width="2" rx="6"/>
<text x="240" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">a</text>
<text x="240" y="170" text-anchor="middle" font-size="10" fill="#94a3b8">(значение)</text>

<!-- lift label -->
<text x="22" y="145" font-size="10" font-weight="bold" fill="#94a3b8">lift</text>

<!-- Footer -->
<text x="240" y="265" text-anchor="middle" font-size="10" fill="#64748b">lift :: m a -&gt; t m a   (морфизм монад)</text>
</svg>