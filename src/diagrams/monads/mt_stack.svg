<svg xmlns="http://www.w3.org/2000/svg" width="400" height="380" viewBox="0 0 400 380" font-family="monospace,Arial,sans-serif">
<rect width="400" height="380" fill="#0f172a" stroke="#1e293b" rx="8"/>

<!-- Title -->
<text x="200" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#e2e8f0">Стек трансформеров монад</text>

<!-- ReaderT -->
<rect x="20" y="45" width="360" height="50" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" rx="6"/>
<text x="200" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#93c5fd">ReaderT Config</text>
<text x="200" y="85" text-anchor="middle" font-size="10" fill="#64748b">ask, asks, local</text>

<!-- StateT -->
<rect x="35" y="105" width="330" height="50" fill="#14532d" stroke="#22c55e" stroke-width="2" rx="6"/>
<text x="200" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">StateT AppState</text>
<text x="200" y="145" text-anchor="middle" font-size="10" fill="#64748b">get, put, modify</text>

<!-- WriterT -->
<rect x="50" y="165" width="300" height="50" fill="#422006" stroke="#f59e0b" stroke-width="2" rx="6"/>
<text x="200" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#fcd34d">WriterT [Log]</text>
<text x="200" y="205" text-anchor="middle" font-size="10" fill="#64748b">tell, listen, pass</text>

<!-- ExceptT -->
<rect x="65" y="225" width="270" height="50" fill="#4c0519" stroke="#f43f5e" stroke-width="2" rx="6"/>
<text x="200" y="248" text-anchor="middle" font-size="12" font-weight="bold" fill="#fda4af">ExceptT AppError</text>
<text x="200" y="265" text-anchor="middle" font-size="10" fill="#64748b">throwE, catchE</text>

<!-- IO -->
<rect x="80" y="285" width="240" height="50" fill="#1e1b4b" stroke="#818cf8" stroke-width="2" rx="6"/>
<text x="200" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#a5b4fc">IO</text>
<text x="200" y="325" text-anchor="middle" font-size="10" fill="#64748b">liftIO, базовые эффекты</text>

<!-- lift labels -->
<text x="10" y="80" font-size="9" fill="#475569">lift</text>
<text x="10" y="140" font-size="9" fill="#475569">lift</text>
<text x="10" y="200" font-size="9" fill="#475569">lift</text>
<text x="10" y="260" font-size="9" fill="#475569">liftIO</text>

<!-- run footer -->
<text x="200" y="365" text-anchor="middle" font-size="9" fill="#475569">run: runReaderT . runStateT . runWriterT . runExceptT</text>
</svg>