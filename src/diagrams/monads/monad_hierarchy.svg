<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" font-family="monospace,Arial,sans-serif">
  <rect width="720" height="480" fill="#ffffff" rx="10"/>
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">Monad Hierarchy in Haskell</text>

  <!-- Monad (top) -->
  <rect x="270" y="45" width="180" height="44" rx="6" fill="#f7f8fa" stroke="#8b6db5" stroke-width="2"/>
  <text x="360" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b6db5">Monad</text>
  <text x="360" y="80" text-anchor="middle" font-size="9" fill="#8a93a3">return, &gt;&gt;=, join, &gt;=&gt;</text>

  <!-- Arrows from Monad -->
  <line x1="310" y1="89" x2="160" y2="128" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="360" y1="89" x2="360" y2="128" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="410" y1="89" x2="560" y2="128" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Level 2: Maybe, Either, [] -->
  <rect x="80" y="128" width="150" height="44" rx="5" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="155" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Maybe</text>
  <text x="155" y="163" text-anchor="middle" font-size="9" fill="#8a93a3">1 + a (failure)</text>

  <rect x="280" y="128" width="160" height="44" rx="5" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="360" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Either e</text>
  <text x="360" y="163" text-anchor="middle" font-size="9" fill="#8a93a3">e + a (with info)</text>

  <rect x="490" y="128" width="140" height="44" rx="5" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="560" y="147" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">[] (List)</text>
  <text x="560" y="163" text-anchor="middle" font-size="9" fill="#8a93a3">P(a) (nondeterminism)</text>

  <!-- Maybe isomorphic to Either () a -->
  <text x="155" y="188" text-anchor="middle" font-size="9" fill="#8a93a3">&#8773; Either () a</text>

  <!-- Arrows from Maybe to State/Reader/Writer -->
  <line x1="200" y1="172" x2="120" y2="248" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="360" y1="172" x2="360" y2="248" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="490" y1="172" x2="600" y2="248" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Level 3: State, Reader, Writer -->
  <rect x="35" y="248" width="145" height="44" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="112" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">State s</text>
  <text x="112" y="281" text-anchor="middle" font-size="9" fill="#8a93a3">s -&gt; (a, s)</text>

  <rect x="285" y="248" width="150" height="44" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="360" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">Reader r</text>
  <text x="360" y="281" text-anchor="middle" font-size="9" fill="#8a93a3">r -&gt; a</text>

  <rect x="540" y="248" width="145" height="44" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="612" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">Writer w</text>
  <text x="612" y="281" text-anchor="middle" font-size="9" fill="#8a93a3">(a, w)</text>

  <!-- RWS -->
  <line x1="112" y1="292" x2="280" y2="330" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="360" y1="292" x2="360" y2="330" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="612" y1="292" x2="440" y2="330" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="290" y="330" width="140" height="34" rx="5" fill="#f7f8fa" stroke="#8a6418" stroke-width="1.5"/>
  <text x="360" y="354" text-anchor="middle" font-size="11" font-weight="bold" fill="#8a6418">RWS = R+W+S</text>

  <!-- IO, ST, STM, Cont -->
  <line x1="180" y1="292" x2="60" y2="390" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="540" y1="292" x2="660" y2="390" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="4,3"/>

  <rect x="20" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="70" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">IO</text>
  <text x="70" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">RealWorld</text>

  <rect x="135" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="185" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">ST s</text>
  <text x="185" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">Safe mutable</text>

  <rect x="250" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="300" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">STM</text>
  <text x="300" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">Atom. transact.</text>

  <rect x="370" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="420" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">Cont r</text>
  <text x="420" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">Continuations</text>

  <rect x="490" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="540" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">Free f</text>
  <text x="540" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">DSL/Interpret.</text>

  <rect x="605" y="390" width="100" height="36" rx="4" fill="#f7f8fa" stroke="#d9a441" stroke-width="1"/>
  <text x="655" y="406" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">Parser</text>
  <text x="655" y="420" text-anchor="middle" font-size="8" fill="#8a93a3">&#8773;StateT Maybe</text>

  <!-- Footer -->
  <rect x="20" y="445" width="680" height="28" rx="4" fill="#f7f8fa" stroke="#cbd5e1"/>
  <text x="360" y="458" text-anchor="middle" font-size="9" fill="#8a93a3">Monad transformers: lift effects through the stack</text>
  <text x="360" y="469" text-anchor="middle" font-size="9" fill="#8a93a3">MaybeT, ExceptT, StateT, ReaderT, WriterT, ContT</text>
</svg>
