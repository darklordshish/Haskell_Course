<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340" font-family="monospace,Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/></marker>
  <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/></marker>
  <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/></marker>
  <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/></marker>
</defs>
<rect width="620" height="340" fill="#ffffff" rx="8"/>
<text x="310" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">[0,1] as Quantale = Frame = Complete Heyting Algebra</text>
<rect x="215" y="48" width="190" height="56" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="310" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">([0,1], min, 1)</text>
<text x="310" y="92" text-anchor="middle" font-size="9" fill="#8a93a3">tensor = min, unit = 1, hom a b = if a&lt;=b then 1 else b</text>
<rect x="25" y="155" width="165" height="54" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="2"/>
<text x="107" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">Frame</text>
<text x="107" y="195" text-anchor="middle" font-size="10" fill="#3f9d77">min over sup = sup min</text>
<rect x="218" y="155" width="184" height="54" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="2"/>
<text x="310" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#d9a441">Scott Topologies</text>
<text x="310" y="195" text-anchor="middle" font-size="10" fill="#d9a441">T-up: (t,1]   T-down: [0,t)</text>
<rect x="428" y="155" width="165" height="54" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="510" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b6db5">BiHeyting algebra</text>
<text x="510" y="195" text-anchor="middle" font-size="10" fill="#8b6db5">a=&gt;b and a&lt;=b (two hom)</text>
<line x1="263" y1="104" x2="125" y2="155" stroke="#3f9d77" stroke-width="1.8" marker-end="url(#arrG)"/>
<line x1="310" y1="104" x2="310" y2="155" stroke="#d9a441" stroke-width="1.8" marker-end="url(#arrO)"/>
<line x1="357" y1="104" x2="472" y2="155" stroke="#8b6db5" stroke-width="1.8" marker-end="url(#arrP)"/>
<rect x="40" y="260" width="245" height="52" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="162" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Pl(E) = Int(E) = Lan tau(E)</text>
<text x="162" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Bel(E) = Cl(E) = Ran tauBar(E)</text>
<line x1="120" y1="209" x2="130" y2="260" stroke="#d9a441" stroke-width="1.8" marker-end="url(#arrO)"/>
<rect x="300" y="260" width="280" height="52" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="440" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">coend = sup = Interior</text>
<text x="440" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">end = inf = Closure</text>
<line x1="490" y1="209" x2="490" y2="260" stroke="#8b6db5" stroke-width="1.8" marker-end="url(#arrP)"/>
<text x="310" y="330" text-anchor="middle" font-size="10" fill="#8a93a3">Kan extensions, Scott topologies, BiHeyting — three projections of one structure</text>
</svg>
