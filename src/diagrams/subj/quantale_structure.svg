<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334466"/></marker>
  <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#885500"/></marker>
  <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#663366"/></marker>
  <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#336633"/></marker>
</defs>
<rect width="620" height="340" fill="#f8f9fa" rx="10"/>
<text x="310" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#334466">[0,1] как Quantale = Фрейм = Complete Heyting Algebra</text>
<rect x="215" y="48" width="190" height="56" rx="8" fill="#dce5f5" stroke="#334466" stroke-width="2"/>
<text x="310" y="72" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold"  fill="#334466">([0,1], min, 1)</text>
<text x="310" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="9"  fill="#556688">tensor = min, unit = 1, hom a b = if a&lt;=b then 1 else b</text>
<rect x="25" y="155" width="165" height="54" rx="8" fill="#e0f0e0" stroke="#336633" stroke-width="2"/>
<text x="107" y="178" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#336633">Фрейм (Frame)</text>
<text x="107" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#447744">min over sup = sup min</text>
<rect x="218" y="155" width="184" height="54" rx="8" fill="#fff0d0" stroke="#885500" stroke-width="2"/>
<text x="310" y="178" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#885500">Топологии Скотта</text>
<text x="310" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#996600">T-up: (t,1]   T-down: [0,t)</text>
<rect x="428" y="155" width="165" height="54" rx="8" fill="#f0e0f0" stroke="#663366" stroke-width="2"/>
<text x="510" y="178" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#663366">BiHeyting-алгебра</text>
<text x="510" y="195" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#774477">a=&gt;b и a&lt;=b (два hom)</text>
<line x1="263" y1="104" x2="125" y2="155" stroke="#336633" stroke-width="1.8"  marker-end="url(#arrG)"/>
<line x1="310" y1="104" x2="310" y2="155" stroke="#885500" stroke-width="1.8"  marker-end="url(#arrO)"/>
<line x1="357" y1="104" x2="472" y2="155" stroke="#663366" stroke-width="1.8"  marker-end="url(#arrP)"/>
<rect x="40" y="260" width="245" height="52" rx="8" fill="#f8f8f8" stroke="#aabbcc" stroke-width="1.5"/>
<text x="162" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold"  fill="#334466">Pl(E) = Int(E) = Lan tau(E)</text>
<text x="162" y="298" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold"  fill="#334466">Bel(E) = Cl(E) = Ran tauBar(E)</text>
<line x1="120" y1="209" x2="130" y2="260" stroke="#885500" stroke-width="1.8"  marker-end="url(#arrO)"/>
<rect x="300" y="260" width="280" height="52" rx="8" fill="#f8f8f8" stroke="#aabbcc" stroke-width="1.5"/>
<text x="440" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold"  fill="#334466">coend = sup = Interior</text>
<text x="440" y="298" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold"  fill="#334466">end = inf = Closure</text>
<line x1="490" y1="209" x2="490" y2="260" stroke="#663366" stroke-width="1.8"  marker-end="url(#arrP)"/>
<text x="310" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#888888">Kan-расширения, топологии Скотта, BiHeyting — три проекции одной структуры</text>
</svg>