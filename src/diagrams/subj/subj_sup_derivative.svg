  <text x="430" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#3a4a96">d<tspan dy="-4" font-size="8">&#8744;</tspan><tspan dy="4">i</tspan><tspan dy="-4" font-size="8">&#8744;</tspan><tspan dy="4">f = chi</tspan><tspan dy="2" font-size="8">[0,1]</tspan><tspan dy="-2">  (usc envelope)</tspan></text>

