  <circle cx="385" cy="150" r="4" fill="#ffffff" stroke="#5872c9" stroke-width="2"/>
  <circle cx="475" cy="150" r="4" fill="#ffffff" stroke="#5872c9" stroke-width="2"/>
  <line x1="391" y1="90" x2="469" y2="90" stroke="#5872c9" stroke-width="2.5"/>
  <circle cx="385" cy="90" r="4.5" fill="#3a4a96"/>
