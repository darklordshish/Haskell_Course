  <text x="430" y="72" text-anchor="middle" font-size="9.5" fill="#3a4a96">boundary &#8706; = {0,1} (filled: usc keeps the rim)</text>

  <text x="280" y="196" text-anchor="middle" font-size="10" fill="#8a93a3">i&#8744; &#8867; d&#8744; (Galois):  i&#8744;f &#8804; m &#8660; f &#8804; d&#8744;m;   both densities give the SAME sup-measure on opens &#8212; they differ exactly on &#8706;</text>
