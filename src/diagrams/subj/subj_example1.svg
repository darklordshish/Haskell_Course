<svg xmlns="http://www.w3.org/2000/svg" width="860" height="380" viewBox="0 0 860 380"
     font-family="monospace,Arial,sans-serif">
  <rect width="860" height="380" fill="#ffffff" rx="8"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
    </marker>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">
    Example 1: X = {low, mid, high}, tau monotone
  </text>

  <!-- X nodes -->
  <text x="80" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a93a3">X</text>
  <rect x="30" y="80" width="100" height="40" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="80" y="105" text-anchor="middle" font-size="13" fill="#5872c9">low</text>
  <rect x="30" y="145" width="100" height="40" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="80" y="170" text-anchor="middle" font-size="13" fill="#5872c9">mid</text>
  <rect x="30" y="210" width="100" height="40" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="6"/>
  <text x="80" y="235" text-anchor="middle" font-size="13" fill="#5872c9">high</text>

  <!-- tau values -->
  <text x="180" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a93a3">tau(x)</text>
  <text x="180" y="105" text-anchor="middle" font-size="14" fill="#0f172a">0.3</text>
  <text x="180" y="170" text-anchor="middle" font-size="14" fill="#0f172a">0.7</text>
  <text x="180" y="235" text-anchor="middle" font-size="14" fill="#0f172a">1.0</text>
  <line x1="140" y1="100" x2="160" y2="100" stroke="#8a93a3" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="165" x2="160" y2="165" stroke="#8a93a3" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="140" y1="230" x2="160" y2="230" stroke="#8a93a3" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Divider -->
  <line x1="230" y1="55" x2="230" y2="295" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bitopological approach -->
  <text x="420" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#3f9d77">Bitopological approach</text>
  <rect x="260" y="78" width="320" height="52" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1" rx="6"/>
  <text x="420" y="97" text-anchor="middle" font-size="12" fill="#0f172a">T-up open sets: preimages of (t,1]</text>
  <text x="420" y="114" text-anchor="middle" font-size="11" fill="#8a93a3">{high} at t=0.7,  {mid,high} at t=0.3,  X at t=0</text>
  <rect x="260" y="140" width="320" height="52" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1" rx="6"/>
  <text x="420" y="159" text-anchor="middle" font-size="12" fill="#0f172a">T-down open sets: preimages of [0,t)</text>
  <text x="420" y="176" text-anchor="middle" font-size="11" fill="#8a93a3">{low} at t=0.7,  {low,mid} at t=1.0</text>
  <rect x="260" y="202" width="320" height="40" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1" rx="6"/>
  <text x="420" y="218" text-anchor="middle" font-size="12" fill="#0f172a">Pl(E) = Int_{T-up}(E) = sup tau(x), x in E</text>
  <text x="420" y="233" text-anchor="middle" font-size="11" fill="#8a93a3">Bel(E) = Cl_{T-down}(E) = inf tau-bar(x), x not in E</text>

  <!-- Divider 2 -->
  <line x1="595" y1="55" x2="595" y2="295" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Kan extension approach -->
  <text x="725" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b6db5">Kan Extension</text>
  <rect x="615" y="78" width="220" height="52" fill="#efeaf6" stroke="#8b6db5" stroke-width="1" rx="6"/>
  <text x="725" y="97" text-anchor="middle" font-size="12" fill="#0f172a">J: X -&gt; P(X)  inclusion</text>
  <text x="725" y="114" text-anchor="middle" font-size="11" fill="#8a93a3">x |--&gt; {x} as singleton set</text>
  <rect x="615" y="140" width="220" height="52" fill="#efeaf6" stroke="#8b6db5" stroke-width="1" rx="6"/>
  <text x="725" y="159" text-anchor="middle" font-size="12" fill="#0f172a">Lan_J tau (E) = coend</text>
  <text x="725" y="176" text-anchor="middle" font-size="11" fill="#8a93a3">= sup_{x in E} min(1, tau(x))</text>
  <rect x="615" y="202" width="220" height="40" fill="#efeaf6" stroke="#8b6db5" stroke-width="1" rx="6"/>
  <text x="725" y="218" text-anchor="middle" font-size="12" fill="#0f172a">= sup_{x in E} tau(x) = Pl(E)</text>
  <text x="725" y="233" text-anchor="middle" font-size="11" fill="#8a93a3">exact match</text>

  <!-- Result -->
  <rect x="200" y="305" width="460" height="40" fill="#f4e7cf" stroke="#d9a441" stroke-width="1.5" rx="6"/>
  <text x="430" y="321" text-anchor="middle" font-size="12" fill="#0f172a">Conclusion: on discrete X both approaches give</text>
  <text x="430" y="336" text-anchor="middle" font-size="12" fill="#0f172a">the same formula. This is the baseline case.</text>
</svg>
