<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" font-family="monospace,Arial,sans-serif">
<defs>
<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/></marker>
<marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/></marker>
<marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/></marker>
<marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/></marker>
</defs>
<rect width="620" height="400" fill="#ffffff" rx="8"/>
<text x="310" y="27" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Isbell Duality over V = ([0,1], min, 1)</text>
<rect x="28" y="45" width="185" height="56" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="120" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#5872c9">[C, V]^op</text>
<text x="120" y="84" text-anchor="middle" font-size="10" fill="#8a93a3">copresheaves</text>
<rect x="408" y="45" width="185" height="56" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="505" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#8b6db5">[C^op, V]</text>
<text x="505" y="84" text-anchor="middle" font-size="10" fill="#8b6db5">presheaves</text>
<path d="M 213 58 C 290 35 330 35 408 58" stroke="#5872c9" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<text x="310" y="38" text-anchor="middle" font-size="11" fill="#5872c9">Spec = Lan</text>
<path d="M 408 82 C 330 105 290 105 213 82" stroke="#8b6db5" stroke-width="2" fill="none" marker-end="url(#arrP)"/>
<text x="310" y="110" text-anchor="middle" font-size="11" fill="#8b6db5">O = Ran</text>
<text x="310" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#5872c9">(O &#x22a3; Spec)</text>
<line x1="30" y1="148" x2="590" y2="148" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
<text x="310" y="162" text-anchor="middle" font-size="11" fill="#8a93a3">Instantiation: C = X (discrete), V = [0,1]-Frm</text>
<rect x="28" y="175" width="185" height="60" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="2"/>
<text x="120" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">tau: X -&gt; [0,1]</text>
<text x="120" y="215" text-anchor="middle" font-size="9" fill="#3f9d77">plausibility presheaf</text>
<rect x="408" y="175" width="185" height="60" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="2"/>
<text x="505" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#d9a441">tauBar: X -&gt; [0,1]</text>
<text x="505" y="215" text-anchor="middle" font-size="9" fill="#d9a441">belief presheaf</text>
<path d="M 213 200 C 280 180 340 180 408 200" stroke="#3f9d77" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
<text x="310" y="185" text-anchor="middle" font-size="10" fill="#8a93a3">Isbell: tauBar = O(Spec(tau))? (hypothesis)</text>
<rect x="28" y="278" width="255" height="60" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="155" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#5872c9">Lan_J tau(E) = Pl(E)</text>
<text x="155" y="318" text-anchor="middle" font-size="10" fill="#8a93a3">coend = sup_{x in E} min(1, tau x) = sup tau</text>
<text x="155" y="333" text-anchor="middle" font-size="9" fill="#3f9d77">&#x2705; Proven (coend = sup)</text>
<rect x="338" y="278" width="255" height="60" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="465" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#5872c9">Ran_J tauBar(E) = Bel(E)</text>
<text x="465" y="318" text-anchor="middle" font-size="10" fill="#8a93a3">end = inf_{x not in E} min(1, tauBar x)</text>
<text x="465" y="333" text-anchor="middle" font-size="9" fill="#3f9d77">&#x2705; Proven (end = inf)</text>
<line x1="120" y1="235" x2="120" y2="278" stroke="#3f9d77" stroke-width="1.8" marker-end="url(#arrG)"/>
<line x1="505" y1="235" x2="505" y2="278" stroke="#d9a441" stroke-width="1.8" marker-end="url(#arrO)"/>
<rect x="28" y="358" width="565" height="30" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="1"/>
<text x="310" y="378" text-anchor="middle" font-size="10" fill="#d9a441">&#x26A0; Hypothesis: pair (Pl, Bel) = Isbell self-dual object over [0,1]-Frm | BiHeyting from V-enrichment</text>
</svg>
