<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400">
<defs>
<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334466"/></marker>
<marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#885500"/></marker>
<marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#663366"/></marker>
<marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#336633"/></marker>
</defs>
<rect width="620" height="400" fill="#f8f9fa" rx="10"/>
<text x="310" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold"  fill="#334466">Двойственность Исбелла над V = ([0,1], min, 1)</text>
<rect x="28" y="45" width="185" height="56" rx="8" fill="#dce5f5" stroke="#334466" stroke-width="2"/>
<text x="120" y="67" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold"  fill="#334466">[C, V]^op</text>
<text x="120" y="84" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#556688">копрес&#x43D;опы</text>
<rect x="408" y="45" width="185" height="56" rx="8" fill="#f0e0f0" stroke="#663366" stroke-width="2"/>
<text x="505" y="67" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-weight="bold"  fill="#663366">[C^op, V]</text>
<text x="505" y="84" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#774477">пресноп&#x44B;</text>
<path d="M 213 58 C 290 35 330 35 408 58" stroke="#334466" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<text x="310" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="11"  fill="#334466">Spec = Lan</text>
<path d="M 408 82 C 330 105 290 105 213 82" stroke="#663366" stroke-width="2" fill="none" marker-end="url(#arrP)"/>
<text x="310" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="11"  fill="#663366">O = Ran</text>
<text x="310" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#334466">(O &#x22a3; Spec)</text>
<line x1="30" y1="148" x2="590" y2="148" stroke="#cccccc" stroke-width="1" stroke-dasharray="4,4"/>
<text x="310" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11"  fill="#888888">Конкретизация: C = X (дискретная), V = [0,1]-Frm</text>
<rect x="28" y="175" width="185" height="60" rx="8" fill="#e0f0e0" stroke="#336633" stroke-width="2"/>
<text x="120" y="198" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#336633">tau: X -&gt; [0,1]</text>
<text x="120" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="9"  fill="#447744">пресноп правдоподобия</text>
<rect x="408" y="175" width="185" height="60" rx="8" fill="#fff0d0" stroke="#885500" stroke-width="2"/>
<text x="505" y="198" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#885500">tauBar: X -&gt; [0,1]</text>
<text x="505" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="9"  fill="#996600">пресноп доверия</text>
<path d="M 213 200 C 280 180 340 180 408 200" stroke="#336633" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
<text x="310" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#883333">Isbell: tauBar = O(Spec(tau))? (гипотеза)</text>
<rect x="28" y="278" width="255" height="60" rx="8" fill="#f8f8f8" stroke="#aabbcc" stroke-width="1.5"/>
<text x="155" y="300" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#334466">Lan_J tau(E) = Pl(E)</text>
<text x="155" y="318" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#556688">coend = sup_{x in E} min(1, tau x) = sup tau</text>
<text x="155" y="333" text-anchor="middle" font-family="Georgia,serif" font-size="9"  fill="#336633">&#x2705; Доказано (coend = sup)</text>
<rect x="338" y="278" width="255" height="60" rx="8" fill="#f8f8f8" stroke="#aabbcc" stroke-width="1.5"/>
<text x="465" y="300" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold"  fill="#334466">Ran_J tauBar(E) = Bel(E)</text>
<text x="465" y="318" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#556688">end = inf_{x not in E} min(1, tauBar x)</text>
<text x="465" y="333" text-anchor="middle" font-family="Georgia,serif" font-size="9"  fill="#336633">&#x2705; Доказано (end = inf)</text>
<line x1="120" y1="235" x2="120" y2="278" stroke="#336633" stroke-width="1.8"  marker-end="url(#arrG)"/>
<line x1="505" y1="235" x2="505" y2="278" stroke="#885500" stroke-width="1.8"  marker-end="url(#arrO)"/>
<rect x="28" y="358" width="565" height="30" rx="8" fill="#fff8e0" stroke="#cc9900" stroke-width="1"/>
<text x="310" y="378" text-anchor="middle" font-family="Georgia,serif" font-size="10"  fill="#885500">&#x26A0; Гипотеза: пара (Pl, Bel) = Isbell self-dual object над [0,1]-Frm | BiHeyting из V-enrichment</text>
</svg>