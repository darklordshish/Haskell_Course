<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340" viewBox="0 0 620 340" font-family="system-ui, sans-serif">
  <rect width="620" height="340" fill="#ffffff" rx="8"/>
  <text x="310" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Lattice of scale automorphisms Aut(L)  (Erlangen)</text>
  <text x="310" y="45" text-anchor="middle" font-size="10" fill="#8a93a3">smaller group &#8594; more invariant meaning</text>
  <line x1="255" y1="112" x2="192" y2="150" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="365" y1="112" x2="428" y2="150" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="192" y1="204" x2="255" y2="246" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="428" y1="204" x2="365" y2="246" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="185" y="58" width="250" height="54" rx="8" fill="#ffffff" stroke="#3f9d77" stroke-width="2"/>
  <text x="310" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#2f6f54">Aut(Godel)</text>
  <text x="310" y="93" text-anchor="middle" font-size="10" fill="#0f172a">all monotone bijections</text>
  <text x="310" y="107" text-anchor="middle" font-size="9" fill="#8a93a3">invariant: order only</text>
  <rect x="50" y="150" width="215" height="54" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="157" y="169" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">&#915;<tspan dy="2" font-size="8">S</tspan></text>
  <text x="157" y="185" text-anchor="middle" font-size="10" fill="#0f172a">fix notches S</text>
  <text x="157" y="199" text-anchor="middle" font-size="9" fill="#8a93a3">+ thresholds (bands)</text>
  <rect x="355" y="150" width="215" height="54" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="462" y="169" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">Aut(Goguen) = { a &#8614; a<tspan dy="-4" font-size="8">&#945;</tspan> }</text>
  <text x="462" y="185" text-anchor="middle" font-size="10" fill="#0f172a">power maps</text>
  <text x="462" y="199" text-anchor="middle" font-size="9" fill="#8a93a3">+ log-ratios</text>
  <rect x="165" y="246" width="290" height="54" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
  <text x="310" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#3a4a96">Aut(Lukasiewicz) = { id }</text>
  <text x="310" y="281" text-anchor="middle" font-size="10" fill="#0f172a">scale is absolute</text>
  <text x="310" y="295" text-anchor="middle" font-size="9" fill="#8a93a3">all values = probability</text>
  <text x="310" y="326" text-anchor="middle" font-size="9" fill="#8a93a3">higher = larger group;  &#915;<tspan dy="2" font-size="7">S</tspan><tspan dy="-2"> and Aut(Goguen) are incomparable, meeting only at id</tspan></text>
</svg>
