  <text x="350" y="345" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Yoneda: Nat(Hom(a,-), F) ~ F(a)  -- estestvennyje preobrazovanija iz Hom(a,-) v F ~ F(a)</text>
