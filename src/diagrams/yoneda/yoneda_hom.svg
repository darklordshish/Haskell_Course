  </defs>
  <rect width="700" height="360" fill="#ffffff" rx="8"/>
  <text x="350" y="32" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="bold">Hom-functor Hom(a,-) : C -&gt; Hask</text>
