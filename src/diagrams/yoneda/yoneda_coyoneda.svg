<svg xmlns="http://www.w3.org/2000/svg" width="700" height="290" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
  </defs>
  <rect width="700" height="290" fill="#ffffff" rx="8"/>
  <text x="350" y="32" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="bold">Coyoneda - free functor</text>
  <rect x="25" y="60" width="180" height="120" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="115" y="88" text-anchor="middle" font-size="12" fill="#64748b">F b</text>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#64748b">any type F,</text>
  <text x="115" y="126" text-anchor="middle" font-size="10" fill="#64748b">no Functor needed!</text>
  <text x="115" y="150" text-anchor="middle" font-size="10" fill="#2563eb">liftCoyoneda</text>
  <text x="115" y="167" text-anchor="middle" font-size="9" fill="#64748b">F b -&gt; Coyoneda F a</text>
  <line x1="205" y1="120" x2="270" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="60" width="200" height="120" rx="10" fill="#f1f5f9" stroke="#a78bfa" stroke-width="2"/>
  <text x="370" y="88" text-anchor="middle" font-size="12" fill="#a78bfa" font-weight="bold">Coyoneda F a</text>
  <text x="370" y="110" text-anchor="middle" font-size="11" fill="#0f172a">exists b. (b-&gt;a, F b)</text>
  <text x="370" y="132" text-anchor="middle" font-size="10" fill="#64748b">has Functor!</text>
  <text x="370" y="152" text-anchor="middle" font-size="9" fill="#64748b">fmap h (Coyoneda g fb)</text>
  <text x="370" y="168" text-anchor="middle" font-size="9" fill="#64748b">= Coyoneda (h.g) fb</text>
  <line x1="470" y1="120" x2="535" y2="120" stroke="#34d399" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="502" y="111" text-anchor="middle" font-size="9" fill="#34d399">lower</text>
  <rect x="535" y="60" width="140" height="120" rx="10" fill="#f1f5f9" stroke="#34d399" stroke-width="2"/>
  <text x="605" y="88" text-anchor="middle" font-size="12" fill="#34d399" font-weight="bold">F a</text>
  <text x="605" y="110" text-anchor="middle" font-size="10" fill="#64748b">requires Functor f</text>
  <text x="605" y="130" text-anchor="middle" font-size="9" fill="#0f172a">lowerCoyoneda</text>
  <text x="605" y="148" text-anchor="middle" font-size="9" fill="#64748b">:: Functor f =&gt;</text>
  <rect x="25" y="210" width="650" height="55" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="232" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">Advantage: fmap does not apply immediately, only composes functions</text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#64748b">fmap h (Coyoneda g fb) = Coyoneda (h.g) fb  -- composition only!</text>
</svg>
