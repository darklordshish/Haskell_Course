<svg xmlns="http://www.w3.org/2000/svg" width="700" height="290" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#5872c9"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3f9d77"/></marker>
  </defs>
  <rect width="700" height="290" fill="#ffffff" rx="8"/>
  <text x="350" y="32" text-anchor="middle" font-size="14" fill="#0f172a" font-weight="bold">Coyoneda - free functor</text>
  <rect x="25" y="60" width="180" height="120" rx="10" fill="#f7f8fa" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="115" y="88" text-anchor="middle" font-size="12" fill="#8a93a3">F b</text>
  <text x="115" y="110" text-anchor="middle" font-size="10" fill="#8a93a3">any type F,</text>
  <text x="115" y="126" text-anchor="middle" font-size="10" fill="#8a93a3">no Functor needed!</text>
  <text x="115" y="150" text-anchor="middle" font-size="10" fill="#5872c9">liftCoyoneda</text>
  <text x="115" y="167" text-anchor="middle" font-size="9" fill="#8a93a3">F b -&gt; Coyoneda F a</text>
  <line x1="205" y1="120" x2="270" y2="120" stroke="#5872c9" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="60" width="200" height="120" rx="10" fill="#f7f8fa" stroke="#8b6db5" stroke-width="2"/>
  <text x="370" y="88" text-anchor="middle" font-size="12" fill="#8b6db5" font-weight="bold">Coyoneda F a</text>
  <text x="370" y="110" text-anchor="middle" font-size="11" fill="#0f172a">exists b. (b-&gt;a, F b)</text>
  <text x="370" y="132" text-anchor="middle" font-size="10" fill="#8a93a3">has Functor!</text>
  <text x="370" y="152" text-anchor="middle" font-size="9" fill="#8a93a3">fmap h (Coyoneda g fb)</text>
  <text x="370" y="168" text-anchor="middle" font-size="9" fill="#8a93a3">= Coyoneda (h.g) fb</text>
  <line x1="470" y1="120" x2="535" y2="120" stroke="#3f9d77" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="502" y="111" text-anchor="middle" font-size="9" fill="#3f9d77">lower</text>
  <rect x="535" y="60" width="140" height="120" rx="10" fill="#f7f8fa" stroke="#3f9d77" stroke-width="2"/>
  <text x="605" y="88" text-anchor="middle" font-size="12" fill="#3f9d77" font-weight="bold">F a</text>
  <text x="605" y="110" text-anchor="middle" font-size="10" fill="#8a93a3">requires Functor f</text>
  <text x="605" y="130" text-anchor="middle" font-size="9" fill="#0f172a">lowerCoyoneda</text>
  <text x="605" y="148" text-anchor="middle" font-size="9" fill="#8a93a3">:: Functor f =&gt;</text>
  <rect x="25" y="210" width="650" height="55" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="350" y="232" text-anchor="middle" font-size="11" fill="#5872c9" font-weight="bold">Advantage: fmap does not apply immediately, only composes functions</text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#8a93a3">fmap h (Coyoneda g fb) = Coyoneda (h.g) fb  -- composition only!</text>
</svg>
