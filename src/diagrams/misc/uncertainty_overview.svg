<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker>
    <marker id="arro" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker>
  </defs>
  <rect width="900" height="460" fill="#ffffff" rx="8"/>
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Uncertainty as Category: Stochastic Morphisms</text>
  <rect x="20" y="50" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">Set</text>
  <text x="100" y="92" text-anchor="middle" font-size="10" fill="#64748b">deterministic</text>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#2563eb">f : A -&gt; B</text>
  <text x="100" y="124" text-anchor="middle" font-size="9" fill="#64748b">morphism = function</text>
  <text x="100" y="140" text-anchor="middle" font-size="9" fill="#64748b">compose = (.)</text>
  <line x1="182" y1="100" x2="238" y2="100" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="92" text-anchor="middle" font-size="9" fill="#64748b">embed</text>
  <rect x="240" y="50" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#34d399" stroke-width="1.5"/>
  <text x="330" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#34d399">FinStoch</text>
  <text x="330" y="92" text-anchor="middle" font-size="10" fill="#64748b">finite probability</text>
  <text x="330" y="108" text-anchor="middle" font-size="10" fill="#34d399">k : A -&gt; Dist B</text>
  <text x="330" y="124" text-anchor="middle" font-size="9" fill="#64748b">stochastic matrix</text>
  <text x="330" y="140" text-anchor="middle" font-size="9" fill="#64748b">Kleisli(Dist)</text>
  <line x1="422" y1="100" x2="478" y2="100" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="450" y="92" text-anchor="middle" font-size="9" fill="#64748b">extend</text>
  <rect x="480" y="50" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#fb923c" stroke-width="1.5"/>
  <text x="570" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#fb923c">Meas</text>
  <text x="570" y="92" text-anchor="middle" font-size="10" fill="#64748b">measurable spaces</text>
  <text x="570" y="108" text-anchor="middle" font-size="10" fill="#fb923c">k : X -&gt; Giry(Y)</text>
  <text x="570" y="124" text-anchor="middle" font-size="9" fill="#64748b">Markov kernel</text>
  <text x="570" y="140" text-anchor="middle" font-size="9" fill="#64748b">Kleisli(Giry)</text>
  <line x1="662" y1="100" x2="718" y2="100" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="690" y="92" text-anchor="middle" font-size="9" fill="#64748b">generalize</text>
  <rect x="720" y="50" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="800" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#a78bfa">Fuzzy / Modal</text>
  <text x="800" y="92" text-anchor="middle" font-size="10" fill="#64748b">graded truth</text>
  <text x="800" y="108" text-anchor="middle" font-size="10" fill="#a78bfa">mu : X -&gt; [0,1]</text>
  <text x="800" y="124" text-anchor="middle" font-size="9" fill="#64748b">Lawvere metric</text>
  <text x="800" y="140" text-anchor="middle" font-size="9" fill="#64748b">enriched cat.</text>
  <text x="450" y="178" text-anchor="middle" font-size="11" fill="#64748b">Uncertainty Monads (Haskell)</text>
  <rect x="20" y="190" width="130" height="80" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="85" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">Maybe</text>
  <text x="85" y="228" text-anchor="middle" font-size="9" fill="#2563eb">absence</text>
  <text x="85" y="244" text-anchor="middle" font-size="9" fill="#64748b">2-valued logic</text>
  <text x="85" y="260" text-anchor="middle" font-size="9" fill="#64748b">Option monad</text>
  <rect x="165" y="190" width="130" height="80" rx="6" fill="#f0fdf4" stroke="#34d399" stroke-width="1"/>
  <text x="230" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#34d399">List / []</text>
  <text x="230" y="228" text-anchor="middle" font-size="9" fill="#34d399">nondeterminism</text>
  <text x="230" y="244" text-anchor="middle" font-size="9" fill="#64748b">power set monad</text>
  <text x="230" y="260" text-anchor="middle" font-size="9" fill="#64748b">concatMap</text>
  <rect x="310" y="190" width="150" height="80" rx="6" fill="#f0fdf4" stroke="#34d399" stroke-width="1.5"/>
  <text x="385" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#34d399">Dist (prob.)</text>
  <text x="385" y="228" text-anchor="middle" font-size="9" fill="#34d399">discrete probability</text>
  <text x="385" y="244" text-anchor="middle" font-size="9" fill="#64748b">[(a, Double)]</text>
  <text x="385" y="260" text-anchor="middle" font-size="9" fill="#64748b">FinStoch monad</text>
  <rect x="475" y="190" width="150" height="80" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="550" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#fb923c">Giry (measure)</text>
  <text x="550" y="228" text-anchor="middle" font-size="9" fill="#fb923c">probability measures</text>
  <text x="550" y="244" text-anchor="middle" font-size="9" fill="#64748b">sigma-algebra</text>
  <text x="550" y="260" text-anchor="middle" font-size="9" fill="#64748b">Meas monad</text>
  <rect x="640" y="190" width="130" height="80" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="705" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#a78bfa">Fuzzy</text>
  <text x="705" y="228" text-anchor="middle" font-size="9" fill="#a78bfa">graded membership</text>
  <text x="705" y="244" text-anchor="middle" font-size="9" fill="#64748b">t-norm algebra</text>
  <text x="705" y="260" text-anchor="middle" font-size="9" fill="#64748b">Lawvere [0,1]</text>
  <rect x="785" y="190" width="100" height="80" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="835" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#a78bfa">Modal</text>
  <text x="835" y="228" text-anchor="middle" font-size="9" fill="#a78bfa">Box / Diamond</text>
  <text x="835" y="244" text-anchor="middle" font-size="9" fill="#64748b">nec./poss.</text>
  <text x="835" y="260" text-anchor="middle" font-size="9" fill="#64748b">Kripke frames</text>
  <rect x="20" y="290" width="860" height="150" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Key Laws and Connections</text>
  <rect x="35" y="322" width="265" height="105" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="167" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#fb923c">Giry Monad</text>
  <text x="167" y="356" text-anchor="middle" font-size="9" fill="#fb923c">return x = Dirac delta_x</text>
  <text x="167" y="372" text-anchor="middle" font-size="9" fill="#fb923c">join = disintegration</text>
  <text x="167" y="388" text-anchor="middle" font-size="9" fill="#64748b">P(A) = integral over kernel</text>
  <text x="167" y="404" text-anchor="middle" font-size="9" fill="#64748b">Radon-Nikodym theorem</text>
  <text x="167" y="420" text-anchor="middle" font-size="9" fill="#64748b">Kleisli: Markov kernels</text>
  <rect x="315" y="322" width="255" height="105" rx="6" fill="#f0fdf4" stroke="#34d399" stroke-width="1"/>
  <text x="443" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#34d399">Dist Monad (Kleisli)</text>
  <text x="443" y="356" text-anchor="middle" font-size="9" fill="#34d399">return a = [(a, 1.0)]</text>
  <text x="443" y="372" text-anchor="middle" font-size="9" fill="#34d399">m &gt;&gt;= f = weighted sum</text>
  <text x="443" y="388" text-anchor="middle" font-size="9" fill="#64748b">compose = matrix multiply</text>
  <text x="443" y="404" text-anchor="middle" font-size="9" fill="#64748b">Bayesian update via bind</text>
  <text x="443" y="420" text-anchor="middle" font-size="9" fill="#64748b">entropy: H = -sum p*log(p)</text>
  <rect x="585" y="322" width="285" height="105" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="727" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#a78bfa">Fuzzy + Modal</text>
  <text x="727" y="356" text-anchor="middle" font-size="9" fill="#a78bfa">mu(x) in [0,1]: membership</text>
  <text x="727" y="372" text-anchor="middle" font-size="9" fill="#a78bfa">t-norm: T(a,b) = min(a,b)</text>
  <text x="727" y="388" text-anchor="middle" font-size="9" fill="#64748b">Box P = necessary</text>
  <text x="727" y="404" text-anchor="middle" font-size="9" fill="#64748b">Diamond P = possible</text>
  <text x="727" y="420" text-anchor="middle" font-size="9" fill="#64748b">Kripke: Box P = all worlds</text>
</svg>
