<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
    <marker id="arro" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>
  <rect width="900" height="460" fill="#ffffff" rx="8"/>
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Uncertainty as Category: Stochastic Morphisms</text>
  <rect x="20" y="50" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Set</text>
  <text x="100" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">deterministic</text>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#2563eb">f : A -&gt; B</text>
  <text x="100" y="124" text-anchor="middle" font-size="9" fill="#64748b">morphism = function</text>
  <text x="100" y="140" text-anchor="middle" font-size="9" fill="#64748b">compose = (.)</text>
  <line x1="182" y1="100" x2="238" y2="100" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="92" text-anchor="middle" font-size="9" fill="#94a3b8">embed</text>
  <rect x="240" y="50" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#059669" stroke-width="1.5"/>
  <text x="330" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">FinStoch</text>
  <text x="330" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">finite probability</text>
  <text x="330" y="108" text-anchor="middle" font-size="10" fill="#059669">k : A -&gt; Dist B</text>
  <text x="330" y="124" text-anchor="middle" font-size="9" fill="#64748b">stochastic matrix</text>
  <text x="330" y="140" text-anchor="middle" font-size="9" fill="#64748b">Kleisli(Dist)</text>
  <line x1="422" y1="100" x2="478" y2="100" stroke="#059669" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="450" y="92" text-anchor="middle" font-size="9" fill="#94a3b8">extend</text>
  <rect x="480" y="50" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#ea580c" stroke-width="1.5"/>
  <text x="570" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#ea580c">Meas</text>
  <text x="570" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">measurable spaces</text>
  <text x="570" y="108" text-anchor="middle" font-size="10" fill="#ea580c">k : X -&gt; Giry(Y)</text>
  <text x="570" y="124" text-anchor="middle" font-size="9" fill="#64748b">Markov kernel</text>
  <text x="570" y="140" text-anchor="middle" font-size="9" fill="#64748b">Kleisli(Giry)</text>
  <line x1="662" y1="100" x2="718" y2="100" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="690" y="92" text-anchor="middle" font-size="9" fill="#94a3b8">generalize</text>
  <rect x="720" y="50" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="800" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">Fuzzy / Modal</text>
  <text x="800" y="92" text-anchor="middle" font-size="10" fill="#94a3b8">graded truth</text>
  <text x="800" y="108" text-anchor="middle" font-size="10" fill="#7c3aed">mu : X -&gt; [0,1]</text>
  <text x="800" y="124" text-anchor="middle" font-size="9" fill="#64748b">Lawvere metric</text>
  <text x="800" y="140" text-anchor="middle" font-size="9" fill="#64748b">enriched cat.</text>
  <text x="450" y="178" text-anchor="middle" font-size="11" fill="#64748b">Uncertainty Monads (Haskell)</text>
  <rect x="20" y="190" width="130" height="80" rx="6" fill="#0c2340" stroke="#1d4ed8" stroke-width="1"/>
  <text x="85" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Maybe</text>
  <text x="85" y="228" text-anchor="middle" font-size="9" fill="#2563eb">absence</text>
  <text x="85" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">2-valued logic</text>
  <text x="85" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">Option monad</text>
  <rect x="165" y="190" width="130" height="80" rx="6" fill="#0c2340" stroke="#0e7490" stroke-width="1"/>
  <text x="230" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#0891b2">List / []</text>
  <text x="230" y="228" text-anchor="middle" font-size="9" fill="#0e7490">nondeterminism</text>
  <text x="230" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">power set monad</text>
  <text x="230" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">concatMap</text>
  <rect x="310" y="190" width="150" height="80" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="385" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Dist (prob.)</text>
  <text x="385" y="228" text-anchor="middle" font-size="9" fill="#16a34a">discrete probability</text>
  <text x="385" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">[(a, Double)]</text>
  <text x="385" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">FinStoch monad</text>
  <rect x="475" y="190" width="150" height="80" rx="6" fill="#1c1306" stroke="#b45309" stroke-width="1.5"/>
  <text x="550" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Giry (measure)</text>
  <text x="550" y="228" text-anchor="middle" font-size="9" fill="#d97706">probability measures</text>
  <text x="550" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">sigma-algebra</text>
  <text x="550" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">Meas monad</text>
  <rect x="640" y="190" width="130" height="80" rx="6" fill="#2d1b4e" stroke="#9333ea" stroke-width="1"/>
  <text x="705" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#e9d5ff">Fuzzy</text>
  <text x="705" y="228" text-anchor="middle" font-size="9" fill="#6d28d9">graded membership</text>
  <text x="705" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">t-norm algebra</text>
  <text x="705" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">Lawvere [0,1]</text>
  <rect x="785" y="190" width="100" height="80" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
  <text x="835" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5b4fc">Modal</text>
  <text x="835" y="228" text-anchor="middle" font-size="9" fill="#818cf8">Box / Diamond</text>
  <text x="835" y="244" text-anchor="middle" font-size="9" fill="#94a3b8">nec./poss.</text>
  <text x="835" y="260" text-anchor="middle" font-size="9" fill="#94a3b8">Kripke frames</text>
  <rect x="20" y="290" width="860" height="150" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Key Laws and Connections</text>
  <rect x="35" y="322" width="265" height="105" rx="6" fill="#1c1306" stroke="#b45309" stroke-width="1"/>
  <text x="167" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Giry Monad</text>
  <text x="167" y="356" text-anchor="middle" font-size="9" fill="#d97706">return x = Dirac delta_x</text>
  <text x="167" y="372" text-anchor="middle" font-size="9" fill="#d97706">join = disintegration</text>
  <text x="167" y="388" text-anchor="middle" font-size="9" fill="#94a3b8">P(A) = integral over kernel</text>
  <text x="167" y="404" text-anchor="middle" font-size="9" fill="#94a3b8">Radon-Nikodym theorem</text>
  <text x="167" y="420" text-anchor="middle" font-size="9" fill="#64748b">Kleisli: Markov kernels</text>
  <rect x="315" y="322" width="255" height="105" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="443" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Dist Monad (Kleisli)</text>
  <text x="443" y="356" text-anchor="middle" font-size="9" fill="#16a34a">return a = [(a, 1.0)]</text>
  <text x="443" y="372" text-anchor="middle" font-size="9" fill="#16a34a">m &gt;&gt;= f = weighted sum</text>
  <text x="443" y="388" text-anchor="middle" font-size="9" fill="#94a3b8">compose = matrix multiply</text>
  <text x="443" y="404" text-anchor="middle" font-size="9" fill="#94a3b8">Bayesian update via bind</text>
  <text x="443" y="420" text-anchor="middle" font-size="9" fill="#64748b">entropy: H = -sum p*log(p)</text>
  <rect x="585" y="322" width="285" height="105" rx="6" fill="#2d1b4e" stroke="#9333ea" stroke-width="1"/>
  <text x="727" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#e9d5ff">Fuzzy + Modal</text>
  <text x="727" y="356" text-anchor="middle" font-size="9" fill="#6d28d9">mu(x) in [0,1]: membership</text>
  <text x="727" y="372" text-anchor="middle" font-size="9" fill="#6d28d9">t-norm: T(a,b) = min(a,b)</text>
  <text x="727" y="388" text-anchor="middle" font-size="9" fill="#94a3b8">Box P = necessary</text>
  <text x="727" y="404" text-anchor="middle" font-size="9" fill="#94a3b8">Diamond P = possible</text>
  <text x="727" y="420" text-anchor="middle" font-size="9" fill="#64748b">Kripke: Box P = all worlds</text>
</svg>