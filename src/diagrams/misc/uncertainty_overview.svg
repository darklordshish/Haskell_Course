<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/></marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/></marker>
    <marker id="arro" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/></marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/></marker>
  </defs>
  <rect width="900" height="460" fill="#ffffff" rx="8"/>
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Uncertainty as Category: Stochastic Morphisms</text>
  <rect x="20" y="50" width="160" height="100" rx="8" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.5"/>
  <text x="100" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#5872c9">Set</text>
  <text x="100" y="92" text-anchor="middle" font-size="10" fill="#8a93a3">deterministic</text>
  <text x="100" y="108" text-anchor="middle" font-size="10" fill="#5872c9">f : A -&gt; B</text>
  <text x="100" y="124" text-anchor="middle" font-size="9" fill="#8a93a3">morphism = function</text>
  <text x="100" y="140" text-anchor="middle" font-size="9" fill="#8a93a3">compose = (.)</text>
  <line x1="182" y1="100" x2="238" y2="100" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="92" text-anchor="middle" font-size="9" fill="#8a93a3">embed</text>
  <rect x="240" y="50" width="180" height="100" rx="8" fill="#f7f8fa" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="330" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">FinStoch</text>
  <text x="330" y="92" text-anchor="middle" font-size="10" fill="#8a93a3">finite probability</text>
  <text x="330" y="108" text-anchor="middle" font-size="10" fill="#3f9d77">k : A -&gt; Dist B</text>
  <text x="330" y="124" text-anchor="middle" font-size="9" fill="#8a93a3">stochastic matrix</text>
  <text x="330" y="140" text-anchor="middle" font-size="9" fill="#8a93a3">Kleisli(Dist)</text>
  <line x1="422" y1="100" x2="478" y2="100" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="450" y="92" text-anchor="middle" font-size="9" fill="#8a93a3">extend</text>
  <rect x="480" y="50" width="180" height="100" rx="8" fill="#f7f8fa" stroke="#d9a441" stroke-width="1.5"/>
  <text x="570" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#d9a441">Meas</text>
  <text x="570" y="92" text-anchor="middle" font-size="10" fill="#8a93a3">measurable spaces</text>
  <text x="570" y="108" text-anchor="middle" font-size="10" fill="#d9a441">k : X -&gt; Giry(Y)</text>
  <text x="570" y="124" text-anchor="middle" font-size="9" fill="#8a93a3">Markov kernel</text>
  <text x="570" y="140" text-anchor="middle" font-size="9" fill="#8a93a3">Kleisli(Giry)</text>
  <line x1="662" y1="100" x2="718" y2="100" stroke="#d9a441" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="690" y="92" text-anchor="middle" font-size="9" fill="#8a93a3">generalize</text>
  <rect x="720" y="50" width="160" height="100" rx="8" fill="#f7f8fa" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="800" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b6db5">Fuzzy / Modal</text>
  <text x="800" y="92" text-anchor="middle" font-size="10" fill="#8a93a3">graded truth</text>
  <text x="800" y="108" text-anchor="middle" font-size="10" fill="#8b6db5">mu : X -&gt; [0,1]</text>
  <text x="800" y="124" text-anchor="middle" font-size="9" fill="#8a93a3">Lawvere metric</text>
  <text x="800" y="140" text-anchor="middle" font-size="9" fill="#8a93a3">enriched cat.</text>
  <text x="450" y="178" text-anchor="middle" font-size="11" fill="#8a93a3">Uncertainty Monads (Haskell)</text>
  <rect x="20" y="190" width="130" height="80" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="85" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Maybe</text>
  <text x="85" y="228" text-anchor="middle" font-size="9" fill="#5872c9">absence</text>
  <text x="85" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">2-valued logic</text>
  <text x="85" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">Option monad</text>
  <rect x="165" y="190" width="130" height="80" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1"/>
  <text x="230" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">List / []</text>
  <text x="230" y="228" text-anchor="middle" font-size="9" fill="#3f9d77">nondeterminism</text>
  <text x="230" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">power set monad</text>
  <text x="230" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">concatMap</text>
  <rect x="310" y="190" width="150" height="80" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="385" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">Dist (prob.)</text>
  <text x="385" y="228" text-anchor="middle" font-size="9" fill="#3f9d77">discrete probability</text>
  <text x="385" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">[(a, Double)]</text>
  <text x="385" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">FinStoch monad</text>
  <rect x="475" y="190" width="150" height="80" rx="6" fill="#f4e7cf" stroke="#d9a441" stroke-width="1.5"/>
  <text x="550" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#d9a441">Giry (measure)</text>
  <text x="550" y="228" text-anchor="middle" font-size="9" fill="#d9a441">probability measures</text>
  <text x="550" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">sigma-algebra</text>
  <text x="550" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">Meas monad</text>
  <rect x="640" y="190" width="130" height="80" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="705" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">Fuzzy</text>
  <text x="705" y="228" text-anchor="middle" font-size="9" fill="#8b6db5">graded membership</text>
  <text x="705" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">t-norm algebra</text>
  <text x="705" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">Lawvere [0,1]</text>
  <rect x="785" y="190" width="100" height="80" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="835" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6db5">Modal</text>
  <text x="835" y="228" text-anchor="middle" font-size="9" fill="#8b6db5">Box / Diamond</text>
  <text x="835" y="244" text-anchor="middle" font-size="9" fill="#8a93a3">nec./poss.</text>
  <text x="835" y="260" text-anchor="middle" font-size="9" fill="#8a93a3">Kripke frames</text>
  <rect x="20" y="290" width="860" height="150" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="312" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Key Laws and Connections</text>
  <rect x="35" y="322" width="265" height="105" rx="6" fill="#f4e7cf" stroke="#d9a441" stroke-width="1"/>
  <text x="167" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#d9a441">Giry Monad</text>
  <text x="167" y="356" text-anchor="middle" font-size="9" fill="#d9a441">return x = Dirac delta_x</text>
  <text x="167" y="372" text-anchor="middle" font-size="9" fill="#d9a441">join = disintegration</text>
  <text x="167" y="388" text-anchor="middle" font-size="9" fill="#8a93a3">P(A) = integral over kernel</text>
  <text x="167" y="404" text-anchor="middle" font-size="9" fill="#8a93a3">Radon-Nikodym theorem</text>
  <text x="167" y="420" text-anchor="middle" font-size="9" fill="#8a93a3">Kleisli: Markov kernels</text>
  <rect x="315" y="322" width="255" height="105" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1"/>
  <text x="443" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#3f9d77">Dist Monad (Kleisli)</text>
  <text x="443" y="356" text-anchor="middle" font-size="9" fill="#3f9d77">return a = [(a, 1.0)]</text>
  <text x="443" y="372" text-anchor="middle" font-size="9" fill="#3f9d77">m &gt;&gt;= f = weighted sum</text>
  <text x="443" y="388" text-anchor="middle" font-size="9" fill="#8a93a3">compose = matrix multiply</text>
  <text x="443" y="404" text-anchor="middle" font-size="9" fill="#8a93a3">Bayesian update via bind</text>
  <text x="443" y="420" text-anchor="middle" font-size="9" fill="#8a93a3">entropy: H = -sum p*log(p)</text>
  <rect x="585" y="322" width="285" height="105" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="727" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#8b6db5">Fuzzy + Modal</text>
  <text x="727" y="356" text-anchor="middle" font-size="9" fill="#8b6db5">mu(x) in [0,1]: membership</text>
  <text x="727" y="372" text-anchor="middle" font-size="9" fill="#8b6db5">t-norm: T(a,b) = min(a,b)</text>
  <text x="727" y="388" text-anchor="middle" font-size="9" fill="#8a93a3">Box P = necessary</text>
  <text x="727" y="404" text-anchor="middle" font-size="9" fill="#8a93a3">Diamond P = possible</text>
  <text x="727" y="420" text-anchor="middle" font-size="9" fill="#8a93a3">Kripke: Box P = all worlds</text>
</svg>
