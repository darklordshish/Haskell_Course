<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="monospace,Arial,sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Light Theme — Palette Reference</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#8a93a3">Unified color scheme for all SVG diagrams</text>

  <!-- Divider -->
  <line x1="30" y1="62" x2="870" y2="62" stroke="#cbd5e1" stroke-width="1"/>

  <!-- === COLOR SWATCHES === -->
  <text x="30" y="85" font-size="12" font-weight="bold" fill="#8a93a3">PALETTE:</text>

  <!-- bg card -->
  <rect x="30" y="92" width="110" height="44" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="85" y="110" text-anchor="middle" font-size="11" fill="#0f172a">#f7f8fa</text>
  <text x="85" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">card bg</text>

  <!-- blue -->
  <rect x="155" y="92" width="110" height="44" fill="#f7f8fa" stroke="#5872c9" stroke-width="2" rx="5"/>
  <text x="210" y="110" text-anchor="middle" font-size="11" fill="#5872c9">#5872c9</text>
  <text x="210" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">accent blue</text>

  <!-- green -->
  <rect x="280" y="92" width="110" height="44" fill="#f7f8fa" stroke="#3f9d77" stroke-width="2" rx="5"/>
  <text x="335" y="110" text-anchor="middle" font-size="11" fill="#3f9d77">#3f9d77</text>
  <text x="335" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">accent green</text>

  <!-- violet -->
  <rect x="405" y="92" width="110" height="44" fill="#f7f8fa" stroke="#8b6db5" stroke-width="2" rx="5"/>
  <text x="460" y="110" text-anchor="middle" font-size="11" fill="#8b6db5">#8b6db5</text>
  <text x="460" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">accent purple</text>

  <!-- orange -->
  <rect x="530" y="92" width="110" height="44" fill="#f7f8fa" stroke="#d9a441" stroke-width="2" rx="5"/>
  <text x="585" y="110" text-anchor="middle" font-size="11" fill="#d9a441">#d9a441</text>
  <text x="585" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">accent orange</text>

  <!-- secondary text -->
  <rect x="655" y="92" width="110" height="44" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="710" y="110" text-anchor="middle" font-size="11" fill="#8a93a3">#8a93a3</text>
  <text x="710" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">secondary</text>

  <!-- main text -->
  <rect x="780" y="92" width="100" height="44" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1" rx="5"/>
  <text x="830" y="110" text-anchor="middle" font-size="11" fill="#0f172a">#0f172a</text>
  <text x="830" y="125" text-anchor="middle" font-size="10" fill="#8a93a3">main text</text>

  <line x1="30" y1="148" x2="870" y2="148" stroke="#cbd5e1" stroke-width="1"/>

  <!-- === DEMO DIAGRAM: Functor category diagram === -->
  <text x="30" y="170" font-size="12" font-weight="bold" fill="#8a93a3">DIAGRAM EXAMPLE — Functor F : C &#8594; D:</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5872c9"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
    </marker>
    <marker id="arrV" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
    </marker>
    <marker id="arrD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a93a3"/>
    </marker>
  </defs>

  <!-- Category C box -->
  <rect x="40" y="178" width="300" height="240" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
  <text x="190" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5872c9">C</text>

  <!-- Objects in C -->
  <rect x="70" y="215" width="80" height="40" fill="#ffffff" stroke="#5872c9" stroke-width="1.5" rx="6"/>
  <text x="110" y="240" text-anchor="middle" font-size="13" fill="#0f172a">A</text>

  <rect x="250" y="215" width="80" height="40" fill="#ffffff" stroke="#5872c9" stroke-width="1.5" rx="6"/>
  <text x="290" y="240" text-anchor="middle" font-size="13" fill="#0f172a">B</text>

  <!-- Morphism f in C -->
  <line x1="152" y1="235" x2="248" y2="235" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="200" y="226" text-anchor="middle" font-size="12" fill="#8a93a3">f</text>

  <!-- self arrows id_A, id_B -->
  <path d="M 90 214 Q 80 185 110 185 Q 140 185 130 214" fill="none" stroke="#8a93a3" stroke-width="1.2" marker-end="url(#arrD)"/>
  <text x="110" y="182" text-anchor="middle" font-size="11" fill="#8a93a3">id&#8336;</text>

  <path d="M 270 214 Q 260 185 290 185 Q 320 185 310 214" fill="none" stroke="#8a93a3" stroke-width="1.2" marker-end="url(#arrD)"/>
  <text x="290" y="182" text-anchor="middle" font-size="11" fill="#8a93a3">id&#8337;</text>

  <!-- Composition g.f -->
  <rect x="160" y="340" width="80" height="40" fill="#ffffff" stroke="#8b6db5" stroke-width="1.5" rx="6"/>
  <text x="200" y="365" text-anchor="middle" font-size="12" fill="#8b6db5">A&#8594;C</text>
  <line x1="130" y1="270" x2="175" y2="338" stroke="#8a93a3" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
  <line x1="270" y1="270" x2="225" y2="338" stroke="#8a93a3" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
  <text x="142" y="310" font-size="11" fill="#8a93a3">g</text>
  <text x="252" y="310" font-size="11" fill="#8a93a3">g&#8728;f</text>

  <!-- Category D box -->
  <rect x="560" y="178" width="300" height="240" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
  <text x="710" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#3f9d77">D</text>

  <!-- Objects in D (images under F) -->
  <rect x="590" y="215" width="80" height="40" fill="#ffffff" stroke="#3f9d77" stroke-width="1.5" rx="6"/>
  <text x="630" y="240" text-anchor="middle" font-size="13" fill="#0f172a">F A</text>

  <rect x="770" y="215" width="80" height="40" fill="#ffffff" stroke="#3f9d77" stroke-width="1.5" rx="6"/>
  <text x="810" y="240" text-anchor="middle" font-size="13" fill="#0f172a">F B</text>

  <!-- Morphism F(f) in D -->
  <line x1="672" y1="235" x2="768" y2="235" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="720" y="226" text-anchor="middle" font-size="12" fill="#8a93a3">F f</text>

  <!-- Composition F(g.f) = F(g).F(f) -->
  <rect x="680" y="340" width="80" height="40" fill="#ffffff" stroke="#8b6db5" stroke-width="1.5" rx="6"/>
  <text x="720" y="365" text-anchor="middle" font-size="12" fill="#8b6db5">F(A&#8594;C)</text>
  <line x1="650" y1="270" x2="695" y2="338" stroke="#8a93a3" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
  <line x1="790" y1="270" x2="745" y2="338" stroke="#8a93a3" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrD)"/>

  <!-- Functor arrow F in the middle -->
  <line x1="345" y1="250" x2="558" y2="250" stroke="#d9a441" stroke-width="2.5" marker-end="url(#arrV)"/>
  <rect x="400" y="226" width="102" height="28" fill="#ffffff" stroke="#d9a441" stroke-width="1" rx="4"/>
  <text x="451" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#d9a441">F</text>

  <!-- Legend -->
  <line x1="30" y1="432" x2="870" y2="432" stroke="#cbd5e1" stroke-width="1"/>
  <text x="30" y="452" font-size="11" font-weight="bold" fill="#8a93a3">LEGEND:</text>
  <line x1="100" y1="449" x2="140" y2="449" stroke="#5872c9" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="148" y="453" font-size="11" fill="#5872c9">objects/morphisms C</text>
  <line x1="320" y1="449" x2="360" y2="449" stroke="#3f9d77" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="368" y="453" font-size="11" fill="#3f9d77">objects/morphisms D</text>
  <line x1="540" y1="449" x2="580" y2="449" stroke="#d9a441" stroke-width="2" marker-end="url(#arrV)"/>
  <text x="588" y="453" font-size="11" fill="#d9a441">functor F</text>
  <line x1="680" y1="449" x2="720" y2="449" stroke="#8a93a3" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
  <text x="728" y="453" font-size="11" fill="#8a93a3">auxiliary</text>

  <!-- Laws -->
  <text x="30" y="478" font-size="11" fill="#8a93a3">Laws: </text>
  <text x="78" y="478" font-size="11" fill="#0f172a">F(id&#8336;) = id&#8497;&#8336;  |  F(g &#8728; f) = F(g) &#8728; F(f)</text>

  <text x="450" y="505" text-anchor="middle" font-size="10" fill="#8a93a3">design_dark_template.svg — palette reference for light diagrams</text>
</svg>
