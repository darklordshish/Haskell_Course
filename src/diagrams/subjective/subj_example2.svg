<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#0f172a">Example 2 (Medium): phi: X -&gt; Y, pushforward tau</text>

  <!-- ── Left: Space X ── -->
  <rect x="20" y="50" width="190" height="320" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="115" y="72" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#8a93a3">Space X (Sensor)</text>

  <rect x="50" y="85" width="130" height="34" rx="5" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="115" y="99" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a4a96">TempLow</text>
  <text x="115" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#5872c9">tau = 0.9</text>

  <rect x="50" y="130" width="130" height="34" rx="5" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="115" y="144" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a4a96">TempMed</text>
  <text x="115" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#5872c9">tau = 0.5</text>

  <rect x="50" y="175" width="130" height="34" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="115" y="189" text-anchor="middle" font-family="monospace" font-size="11" fill="#2f6f54">VibLow</text>
  <text x="115" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#3f9d77">tau = 0.3</text>

  <rect x="50" y="220" width="130" height="34" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="115" y="234" text-anchor="middle" font-family="monospace" font-size="11" fill="#2f6f54">VibHigh</text>
  <text x="115" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#3f9d77">tau = 0.1</text>

  <!-- ── Arrow phi in middle ── -->
  <text x="270" y="185" text-anchor="middle" font-family="monospace" font-size="18" fill="#d9a441">phi</text>
  <line x1="215" y1="175" x2="310" y2="140" stroke="#d9a441" stroke-width="2" marker-end="url(#oarr)"/>
  <line x1="215" y1="175" x2="310" y2="240" stroke="#d9a441" stroke-width="2" marker-end="url(#oarr)"/>
  <line x1="215" y1="205" x2="310" y2="140" stroke="#d9a441" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#oarr)"/>
  <line x1="215" y1="240" x2="310" y2="240" stroke="#d9a441" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#oarr)"/>
  <text x="252" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#d9a441">Temp* -&gt; Normal</text>
  <text x="252" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#d9a441">Vib* -&gt; Fault</text>

  <!-- ── Right: Space Y ── -->
  <rect x="315" y="90" width="160" height="200" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="395" y="112" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#8a93a3">Space Y (Status)</text>

  <rect x="340" y="125" width="110" height="50" rx="5" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="395" y="143" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a4a96">Normal</text>
  <text x="395" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">phi^-1 = {TempLow, TempMed}</text>

  <rect x="340" y="195" width="110" height="50" rx="5" fill="#f4e7cf" stroke="#d9a441" stroke-width="1.5"/>
  <text x="395" y="213" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a6418">Fault</text>
  <text x="395" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">phi^-1 = {VibLow, VibHigh}</text>

  <!-- ── Bitopology Result ── -->
  <rect x="505" y="50" width="185" height="320" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="597" y="72" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8a93a3">Bitopology Result</text>
  <text x="597" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">pushforward phi_*(tau)</text>

  <rect x="525" y="100" width="150" height="55" rx="5" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="600" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#3a4a96">Pl(Normal) =</text>
  <text x="600" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="#3a4a96">sup tau(phi^-1(Normal))</text>
  <text x="600" y="147" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#5872c9">= sup{0.9, 0.5} = 0.9</text>

  <rect x="525" y="165" width="150" height="55" rx="5" fill="#f4e7cf" stroke="#d9a441" stroke-width="1"/>
  <text x="600" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a6418">Pl(Fault) =</text>
  <text x="600" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a6418">sup tau(phi^-1(Fault))</text>
  <text x="600" y="212" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#d9a441">= sup{0.3, 0.1} = 0.3</text>

  <line x1="525" y1="232" x2="675" y2="232" stroke="#cbd5e1" stroke-width="1"/>
  <text x="597" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">Bel(Normal) = inf{0.9,0.5}</text>
  <text x="597" y="266" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3f9d77">= 0.5</text>
  <text x="597" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">Bel(Fault) = inf{0.3,0.1}</text>
  <text x="597" y="301" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3f9d77">= 0.1</text>

  <!-- ── Kan Extension Result ── -->
  <rect x="710" y="50" width="175" height="320" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="797" y="72" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8a93a3">Kan Extension</text>
  <text x="797" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">Lan_J tau via coend</text>

  <rect x="725" y="100" width="145" height="60" rx="5" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="797" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">Lan(Normal) =</text>
  <text x="797" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">coend_{phi(x)=Normal}</text>
  <text x="797" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">min(1, tau(x))</text>
  <text x="797" y="162" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b6db5">= sup = 0.9</text>

  <rect x="725" y="172" width="145" height="60" rx="5" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="797" y="189" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">Lan(Fault) =</text>
  <text x="797" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">coend_{phi(x)=Fault}</text>
  <text x="797" y="219" text-anchor="middle" font-family="monospace" font-size="10" fill="#5f4a86">min(1, tau(x))</text>
  <text x="797" y="234" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b6db5">= sup = 0.3</text>

  <rect x="725" y="248" width="145" height="85" rx="5" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="797" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#2f6f54">Bitop Pl agrees</text>
  <text x="797" y="281" text-anchor="middle" font-family="monospace" font-size="10" fill="#2f6f54">with Kan (sup)</text>
  <text x="797" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">Bitop Bel is extra:</text>
  <text x="797" y="314" text-anchor="middle" font-family="monospace" font-size="10" fill="#8a93a3">needs phi_* topology</text>
  <text x="797" y="330" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#3f9d77">Kan = Pl(bitop)</text>

  <!-- Bottom -->
  <text x="450" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a93a3">phi: X -&gt; Y requires topology pushforward (bitop) or Kan extension; they agree on Pl but differ on Bel</text>

  <defs>
    <marker id="oarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d9a441"/>
    </marker>
  </defs>
</svg>