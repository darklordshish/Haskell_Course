<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#0f172a">Example 2 (Medium): phi: X -&gt; Y, pushforward tau</text>

  <!-- ── Left: Space X ── -->
  <rect x="20" y="50" width="190" height="320" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="115" y="72" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">Space X (Sensor)</text>

  <rect x="50" y="85" width="130" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="99" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">TempLow</text>
  <text x="115" y="113" text-anchor="middle" font-family="monospace" font-size="10" fill="#2563eb">tau = 0.9</text>

  <rect x="50" y="130" width="130" height="34" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="115" y="144" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">TempMed</text>
  <text x="115" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#2563eb">tau = 0.5</text>

  <rect x="50" y="175" width="130" height="34" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="115" y="189" text-anchor="middle" font-family="monospace" font-size="11" fill="#065f46">VibLow</text>
  <text x="115" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">tau = 0.3</text>

  <rect x="50" y="220" width="130" height="34" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="115" y="234" text-anchor="middle" font-family="monospace" font-size="11" fill="#065f46">VibHigh</text>
  <text x="115" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">tau = 0.1</text>

  <!-- ── Arrow phi in middle ── -->
  <text x="270" y="185" text-anchor="middle" font-family="monospace" font-size="18" fill="#fb923c">phi</text>
  <line x1="215" y1="175" x2="310" y2="140" stroke="#fb923c" stroke-width="2" marker-end="url(#oarr)"/>
  <line x1="215" y1="175" x2="310" y2="240" stroke="#fb923c" stroke-width="2" marker-end="url(#oarr)"/>
  <line x1="215" y1="205" x2="310" y2="140" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#oarr)"/>
  <line x1="215" y1="240" x2="310" y2="240" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#oarr)"/>
  <text x="252" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb923c">Temp* -&gt; Normal</text>
  <text x="252" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#fb923c">Vib* -&gt; Fault</text>

  <!-- ── Right: Space Y ── -->
  <rect x="315" y="90" width="160" height="200" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="395" y="112" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">Space Y (Status)</text>

  <rect x="340" y="125" width="110" height="50" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="395" y="143" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">Normal</text>
  <text x="395" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">phi^-1 = {TempLow, TempMed}</text>

  <rect x="340" y="195" width="110" height="50" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="395" y="213" text-anchor="middle" font-family="monospace" font-size="11" fill="#92400e">Fault</text>
  <text x="395" y="228" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">phi^-1 = {VibLow, VibHigh}</text>

  <!-- ── Bitopology Result ── -->
  <rect x="505" y="50" width="185" height="320" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="597" y="72" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#64748b">Bitopology Result</text>
  <text x="597" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">pushforward phi_*(tau)</text>

  <rect x="525" y="100" width="150" height="55" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="600" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e40af">Pl(Normal) =</text>
  <text x="600" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e40af">sup tau(phi^-1(Normal))</text>
  <text x="600" y="147" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#2563eb">= sup{0.9, 0.5} = 0.9</text>

  <rect x="525" y="165" width="150" height="55" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#92400e">Pl(Fault) =</text>
  <text x="600" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="#92400e">sup tau(phi^-1(Fault))</text>
  <text x="600" y="212" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f59e0b">= sup{0.3, 0.1} = 0.3</text>

  <line x1="525" y1="232" x2="675" y2="232" stroke="#cbd5e1" stroke-width="1"/>
  <text x="597" y="250" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Bel(Normal) = inf{0.9,0.5}</text>
  <text x="597" y="266" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#059669">= 0.5</text>
  <text x="597" y="285" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Bel(Fault) = inf{0.3,0.1}</text>
  <text x="597" y="301" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#059669">= 0.1</text>

  <!-- ── Kan Extension Result ── -->
  <rect x="710" y="50" width="175" height="320" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="797" y="72" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#64748b">Kan Extension</text>
  <text x="797" y="90" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Lan_J tau via coend</text>

  <rect x="725" y="100" width="145" height="60" rx="5" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="797" y="117" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">Lan(Normal) =</text>
  <text x="797" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">coend_{phi(x)=Normal}</text>
  <text x="797" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">min(1, tau(x))</text>
  <text x="797" y="162" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7c3aed">= sup = 0.9</text>

  <rect x="725" y="172" width="145" height="60" rx="5" fill="#fdf4ff" stroke="#c084fc" stroke-width="1"/>
  <text x="797" y="189" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">Lan(Fault) =</text>
  <text x="797" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">coend_{phi(x)=Fault}</text>
  <text x="797" y="219" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">min(1, tau(x))</text>
  <text x="797" y="234" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#7c3aed">= sup = 0.3</text>

  <rect x="725" y="248" width="145" height="85" rx="5" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <text x="797" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#065f46">Bitop Pl agrees</text>
  <text x="797" y="281" text-anchor="middle" font-family="monospace" font-size="10" fill="#065f46">with Kan (sup)</text>
  <text x="797" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Bitop Bel is extra:</text>
  <text x="797" y="314" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">needs phi_* topology</text>
  <text x="797" y="330" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#059669">Kan = Pl(bitop)</text>

  <!-- Bottom -->
  <text x="450" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">phi: X -&gt; Y requires topology pushforward (bitop) or Kan extension; they agree on Pl but differ on Bel</text>

  <defs>
    <marker id="oarr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb923c"/>
    </marker>
  </defs>
</svg>