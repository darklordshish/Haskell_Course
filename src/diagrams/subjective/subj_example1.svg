<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <rect width="900" height="380" fill="#ffffff"/>
  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#0f172a">Example 1 (Simple): X = {low, mid, high}, monotone tau</text>

  <!-- ── Left panel: X with tau values ── -->
  <rect x="20" y="55" width="200" height="290" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="120" y="78" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#8a93a3">Space X + tau</text>

  <!-- nodes -->
  <rect x="60" y="95" width="120" height="38" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" font-family="monospace" font-size="12" fill="#3a4a96">low</text>
  <text x="120" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#5872c9">tau = 0.3</text>

  <rect x="60" y="155" width="120" height="38" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="120" y="170" text-anchor="middle" font-family="monospace" font-size="12" fill="#2f6f54">mid</text>
  <text x="120" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="#3f9d77">tau = 0.7</text>

  <rect x="60" y="215" width="120" height="38" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="120" y="230" text-anchor="middle" font-family="monospace" font-size="12" fill="#5f4a86">high</text>
  <text x="120" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b6db5">tau = 1.0</text>

  <!-- monotone arrow -->
  <text x="120" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a93a3">0.3 &lt; 0.7 &lt; 1.0</text>
  <text x="120" y="298" text-anchor="middle" font-family="monospace" font-size="11" fill="#3f9d77">monotone ✓</text>
  <line x1="120" y1="133" x2="120" y2="155" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="120" y1="193" x2="120" y2="215" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Middle panel: Bitopology approach ── -->
  <rect x="245" y="55" width="290" height="290" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="390" y="78" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#8a93a3">Bitopology T-up / T-down</text>

  <!-- T-up open sets -->
  <text x="390" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#5872c9">T-up: preimages of (t,1]</text>
  <rect x="265" y="108" width="240" height="22" rx="4" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="385" y="123" text-anchor="middle" font-family="monospace" font-size="10" fill="#3a4a96">t=0.7: {high}   open: {high}</text>
  <rect x="265" y="133" width="240" height="22" rx="4" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="385" y="148" text-anchor="middle" font-family="monospace" font-size="10" fill="#3a4a96">t=0.3: {mid,high}   open: {mid,high}</text>
  <rect x="265" y="158" width="240" height="22" rx="4" fill="#eef1fb" stroke="#5872c9" stroke-width="1"/>
  <text x="385" y="173" text-anchor="middle" font-family="monospace" font-size="10" fill="#3a4a96">t=0.0: X   open: X</text>

  <!-- Integral formula -->
  <line x1="265" y1="190" x2="505" y2="190" stroke="#cbd5e1" stroke-width="1"/>
  <text x="390" y="208" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">Pl(E) = Int T-up(E) = sup_{x in E} tau(x)</text>
  <text x="390" y="226" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">Bel(E) = Cl T-down(E) = inf_{x in E} tau(x)</text>

  <!-- Result box -->
  <rect x="285" y="245" width="210" height="50" rx="6" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="390" y="265" text-anchor="middle" font-family="monospace" font-size="11" fill="#2f6f54">Both methods agree:</text>
  <text x="390" y="282" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#3f9d77">Pl = Bel = tau (point measure)</text>

  <!-- ── Right panel: Kan Extension approach ── -->
  <rect x="560" y="55" width="320" height="290" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="720" y="78" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#8a93a3">Kan Extension Lan_J tau</text>

  <text x="720" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b6db5">J: X -&gt; P(X), J(x) = {x}</text>
  <text x="720" y="118" text-anchor="middle" font-family="monospace" font-size="11" fill="#0f172a">Coend formula:</text>

  <rect x="575" y="126" width="290" height="28" rx="4" fill="#efeaf6" stroke="#8b6db5" stroke-width="1"/>
  <text x="720" y="145" text-anchor="middle" font-family="monospace" font-size="11" fill="#5f4a86">Lan_J tau(E) = coend = sup_{x in E} tau(x)</text>

  <!-- three rows -->
  <rect x="575" y="165" width="290" height="24" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="580" y="181" font-family="monospace" font-size="10" fill="#5872c9">E={low}:</text>
  <text x="720" y="181" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">sup{0.3} = 0.3</text>

  <rect x="575" y="193" width="290" height="24" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="580" y="209" font-family="monospace" font-size="10" fill="#3f9d77">E={mid,high}:</text>
  <text x="720" y="209" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">sup{0.7, 1.0} = 1.0</text>

  <rect x="575" y="221" width="290" height="24" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="580" y="237" font-family="monospace" font-size="10" fill="#8b6db5">E=X:</text>
  <text x="720" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">sup{0.3, 0.7, 1.0} = 1.0</text>

  <!-- Result box -->
  <rect x="595" y="258" width="250" height="50" rx="6" fill="#efeaf6" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="720" y="278" text-anchor="middle" font-family="monospace" font-size="11" fill="#5f4a86">Lan_J tau = Pl (bitop.)</text>
  <text x="720" y="296" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b6db5">Trivial case: all agree</text>

  <!-- Bottom note -->
  <text x="450" y="360" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a93a3">Discrete X: bitopology and Kan extension are equivalent — both reduce to pointwise tau</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8a93a3"/>
    </marker>
  </defs>
</svg>