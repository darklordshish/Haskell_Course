<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="28" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#0f172a">Example 3 (Complex): X – Poset, [0,1]-enriched Category</text>

  <!-- ── Left: Hasse diagram of poset ── -->
  <rect x="20" y="45" width="210" height="340" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="125" y="67" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">Poset X (Hasse)</text>
  <text x="125" y="83" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">OK &lt;= Warn &lt;= Fail</text>
  <text x="125" y="97" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">OK &lt;= Degrade &lt;= Fail</text>

  <!-- nodes -->
  <rect x="75" y="108" width="100" height="34" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="125" y="122" text-anchor="middle" font-family="monospace" font-size="12" fill="#713f12">Fail</text>
  <text x="125" y="136" text-anchor="middle" font-family="monospace" font-size="10" fill="#eab308">tau = 1.0</text>

  <rect x="40" y="175" width="80" height="34" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="80" y="189" text-anchor="middle" font-family="monospace" font-size="11" fill="#991b1b">Warn</text>
  <text x="80" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">tau=0.6</text>

  <rect x="135" y="175" width="80" height="34" rx="5" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="175" y="189" text-anchor="middle" font-family="monospace" font-size="11" fill="#78350f">Degrade</text>
  <text x="175" y="203" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">tau=0.8</text>

  <rect x="75" y="242" width="100" height="34" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="125" y="256" text-anchor="middle" font-family="monospace" font-size="12" fill="#065f46">OK</text>
  <text x="125" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">tau = 0.2</text>

  <!-- Hasse edges -->
  <line x1="80" y1="175" x2="105" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#garr)"/>
  <line x1="175" y1="175" x2="150" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#garr)"/>
  <line x1="80" y1="242" x2="80" y2="209" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#garr)"/>
  <line x1="125" y1="242" x2="165" y2="209" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#garr)"/>

  <!-- monotone check -->
  <text x="125" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">tau monotone:</text>
  <text x="125" y="320" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">0.2 &lt;= 0.6 &lt;= 1.0 OK</text>
  <text x="125" y="335" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">0.2 &lt;= 0.8 &lt;= 1.0 OK</text>

  <!-- ── Middle: [0,1]-enriched structure ── -->
  <rect x="248" y="45" width="240" height="340" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="368" y="67" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">[0,1]-Enriched Category</text>

  <text x="368" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed">Hom(a,b) = [tau(a &lt;= b)]</text>
  <text x="368" y="104" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">= tau(b) if a &lt;= b, else 0</text>

  <!-- Hom table -->
  <rect x="258" y="112" width="220" height="180" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="130" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#0f172a">from \</text>
  <text x="396" y="130" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#0f172a">OK</text>
  <text x="430" y="130" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#0f172a">Warn</text>
  <text x="466" y="130" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#0f172a">Fail</text>
  <line x1="258" y1="135" x2="478" y2="135" stroke="#e2e8f0" stroke-width="1"/>

  <!-- row OK -->
  <text x="310" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">OK</text>
  <text x="396" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">0.2</text>
  <text x="430" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">0.6</text>
  <text x="466" y="152" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">1.0</text>

  <!-- row Warn -->
  <text x="310" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">Warn</text>
  <text x="396" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0</text>
  <text x="430" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">0.6</text>
  <text x="466" y="172" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">1.0</text>

  <!-- row Degrade -->
  <text x="310" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">Degr</text>
  <text x="396" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0</text>
  <text x="430" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0</text>
  <text x="466" y="192" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">1.0</text>

  <!-- row Fail -->
  <text x="310" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#eab308">Fail</text>
  <text x="396" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0</text>
  <text x="430" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0</text>
  <text x="466" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">1.0</text>

  <line x1="258" y1="220" x2="478" y2="220" stroke="#e2e8f0" stroke-width="1"/>
  <text x="368" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Hom(a,b) in [0,1]</text>
  <text x="368" y="256" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">diagonal = tau(x)</text>
  <text x="368" y="272" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">off-diag = tau(b) if a&lt;=b</text>
  <text x="368" y="288" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">else 0</text>

  <rect x="268" y="308" width="210" height="50" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="373" y="325" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">Composition: Hom(a,c) &gt;=</text>
  <text x="373" y="341" text-anchor="middle" font-family="monospace" font-size="10" fill="#5b21b6">Hom(a,b) * Hom(b,c) (tensor)</text>
  <text x="373" y="357" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#7c3aed">tau is V-functor</text>

  <!-- ── Right: Scott topology and Kan ── -->
  <rect x="508" y="45" width="375" height="340" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="695" y="67" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#64748b">Scott Topology + Kan Extension</text>

  <!-- Scott topology -->
  <rect x="520" y="78" width="165" height="145" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="602" y="96" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af">Scott topology on X</text>
  <text x="602" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563eb">Open U: a in U, a&lt;=b =&gt; b in U</text>
  <text x="602" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#2563eb">(upward closed)</text>
  <rect x="530" y="135" width="145" height="18" rx="3" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="602" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">{Fail}, {Warn,Fail}, {Degr,Fail}</text>
  <rect x="530" y="156" width="145" height="18" rx="3" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="602" y="169" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">{Warn,Degr,Fail}, X, empty</text>
  <text x="602" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">Pl(E) = sup_{x in E} tau(x)</text>
  <text x="602" y="209" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">Bel(E) = inf_{x in E} tau(x)</text>

  <!-- Kan via enriched -->
  <rect x="698" y="78" width="175" height="145" rx="5" fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="785" y="96" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#5b21b6">Kan via V-enriched</text>
  <text x="785" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">Lan_J tau(E) = coend</text>
  <text x="785" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">= sup_{x in E} Hom(J(x),E)*tau(x)</text>
  <text x="785" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">For poset: Hom = indicator</text>
  <text x="785" y="164" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">Lan_J tau(E) = sup_{x: x in E} tau(x)</text>
  <text x="785" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">Lan(E) = sup tau on E</text>
  <text x="785" y="209" text-anchor="middle" font-family="monospace" font-size="10" fill="#0f172a">= Pl(E) (bitop) !</text>

  <!-- Computed examples -->
  <line x1="520" y1="238" x2="873" y2="238" stroke="#cbd5e1" stroke-width="1"/>
  <text x="695" y="255" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#0f172a">Computed values on key subsets:</text>

  <rect x="520" y="263" width="340" height="100" rx="5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <!-- header -->
  <text x="560" y="280" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#64748b">E</text>
  <text x="640" y="280" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#64748b">Pl=sup tau</text>
  <text x="720" y="280" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#64748b">Bel=inf tau</text>
  <text x="820" y="280" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#64748b">Kan=Pl</text>
  <line x1="520" y1="285" x2="860" y2="285" stroke="#e2e8f0" stroke-width="1"/>

  <text x="560" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#059669">{OK}</text>
  <text x="640" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">0.2</text>
  <text x="720" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">0.2</text>
  <text x="820" y="300" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#7c3aed">0.2</text>

  <text x="560" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">{Warn,Fail}</text>
  <text x="640" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">1.0</text>
  <text x="720" y="318" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">0.6</text>
  <text x="820" y="318" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#7c3aed">1.0</text>

  <text x="560" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b">{OK,Degr,Fail}</text>
  <text x="640" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">1.0</text>
  <text x="720" y="336" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">0.2</text>
  <text x="820" y="336" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#7c3aed">1.0</text>

  <text x="560" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">X (all)</text>
  <text x="640" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">1.0</text>
  <text x="720" y="354" text-anchor="middle" font-family="monospace" font-size="9" fill="#0f172a">0.2</text>
  <text x="820" y="354" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#7c3aed">1.0</text>

  <!-- Key insight box -->
  <rect x="520" y="375" width="355" height="35" rx="5" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <text x="697" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#065f46">Poset: Scott-topology Pl = Kan. Bel extra (needs lower sets).</text>
  <text x="697" y="405" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#059669">Enriched Hom unifies poset order with [0,1]-measure structure.</text>

  <!-- Bottom footer -->
  <text x="450" y="413" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">X as [0,1]-enriched category: tau is V-functor; Kan extension = Pl of Scott topology on poset</text>

  <defs>
    <marker id="garr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>