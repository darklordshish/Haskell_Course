<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#c4625f"/>
  </marker>
  <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/>
  </marker>
  <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
  </marker>
  <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/>
  </marker>
</defs>
<rect width="600" height="380" fill="#ffffff" rx="10"/>
<text x="300" y="35" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="17" fill="#3a4a96" font-weight="bold">Left Kan Extension (Lan)</text>
<text x="300" y="55" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#5872c9">Nat(h, f&#183;g) &#8773; Nat(Lan g h, f)</text>
<rect x="60" y="100" width="90" height="46" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="105" y="128" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="22" fill="#3a4a96" font-weight="bold">C</text>
<rect x="450" y="100" width="90" height="46" rx="8" fill="#eef1fb" stroke="#5872c9" stroke-width="2"/>
<text x="495" y="128" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="22" fill="#3a4a96" font-weight="bold">D</text>
<rect x="255" y="290" width="90" height="46" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="300" y="318" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="22" fill="#5f4a86" font-weight="bold">E</text>
<line x1="154" y1="123" x2="445" y2="123" stroke="#5872c9" stroke-width="2.5" marker-end="url(#arrB)"/>
<text x="300" y="113" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="15" fill="#3a4a96">g</text>
<line x1="88" y1="148" x2="266" y2="285" stroke="#c4625f" stroke-width="2.5" marker-end="url(#arrR)"/>
<text x="152" y="224" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="15" fill="#c4625f">h</text>
<line x1="508" y1="148" x2="350" y2="285" stroke="#d9a441" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrO)"/>
<text x="448" y="222" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#d9a441">Lan g h</text>
<line x1="492" y1="148" x2="342" y2="283" stroke="#8b6db5" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrP)"/>
<text x="449" y="248" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#8b6db5">f</text>
<path d="M 368 210 Q 408 198 428 210" stroke="#d9a441" stroke-width="1.8" fill="none" marker-end="url(#arrY)"/>
<text x="394" y="196" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#d9a441">&#946; (unique)</text>
<rect x="30" y="205" width="210" height="62" rx="6" fill="#eef1fb" stroke="#5872c9" stroke-width="1.2"/>
<text x="135" y="225" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3a4a96">universal property:</text>
<text x="135" y="241" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#d9a441">Nat(h,f&#183;g) &#8773; Nat(Lan g h, f)</text>
<text x="135" y="257" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="10" fill="#3a4a96">uniquely determines Lan g h</text>
<rect x="340" y="205" width="232" height="46" rx="6" fill="#f4e7cf" stroke="#d9a441" stroke-width="1.2"/>
<text x="456" y="224" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">data Lan g h a =</text>
<text x="456" y="240" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">forall b. Lan (g b-&gt;a) (h b)</text>
</svg>
