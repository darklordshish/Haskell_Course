<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="monospace,Arial,sans-serif">
<defs>
  <marker id="dl_arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
</defs>
<rect width="640" height="280" fill="#ffffff"/>
<text x="320" y="30" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">DList = Codensity [] : O(n^2) -&gt; O(n)</text>

<!-- LEFT: slow -->
<rect x="20" y="55" width="290" height="180" rx="8" fill="#f5e3e2" stroke="#c4625f" stroke-width="1.6"/>
<text x="165" y="78" text-anchor="middle" font-size="13" fill="#a11" font-weight="bold">naive list: left-nested ++</text>
<text x="165" y="104" text-anchor="middle" font-size="13" fill="#8f3f3c">((a ++ b) ++ c) ++ d</text>
<line x1="40" y1="118" x2="290" y2="118" stroke="#f5e3e2" stroke-width="1"/>
<text x="165" y="140" text-anchor="middle" font-size="11" fill="#8f3f3c">each ++ copies the left list</text>
<text x="165" y="158" text-anchor="middle" font-size="11" fill="#8f3f3c">again from scratch</text>
<rect x="40" y="172" width="250" height="44" rx="5" fill="#f5e3e2" stroke="#a11"/>
<text x="165" y="190" text-anchor="middle" font-size="12" fill="#8f3f3c" font-weight="bold">total cost: O(n^2)</text>
<text x="165" y="207" text-anchor="middle" font-size="10" fill="#8f3f3c">quadratic in number of pieces</text>

<!-- RIGHT: fast -->
<rect x="330" y="55" width="290" height="180" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.6"/>
<text x="475" y="78" text-anchor="middle" font-size="13" fill="#2f6f54" font-weight="bold">DList: function composition</text>
<text x="475" y="104" text-anchor="middle" font-size="12" fill="#2f6f54">newtype DList a = [a] -&gt; [a]</text>
<line x1="350" y1="118" x2="600" y2="118" stroke="#e9f4ee" stroke-width="1"/>
<text x="475" y="140" text-anchor="middle" font-size="11" fill="#2f6f54">++ becomes (.) ; appends</text>
<text x="475" y="158" text-anchor="middle" font-size="11" fill="#2f6f54">right-associate for free</text>
<rect x="350" y="172" width="250" height="44" rx="5" fill="#e9f4ee" stroke="#2f6f54"/>
<text x="475" y="190" text-anchor="middle" font-size="12" fill="#2f6f54" font-weight="bold">total cost: O(n)</text>
<text x="475" y="207" text-anchor="middle" font-size="10" fill="#2f6f54">toList d = runDList d []</text>

<text x="320" y="262" text-anchor="middle" font-size="11" fill="#3a4a96">difference lists right-associate appends (Codensity of [])</text>
</svg>
