<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340">
<defs>
  <marker id="arrdn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="arrOdn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/>
  </marker>
  <marker id="arrGdn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
  </marker>
</defs>
<rect width="660" height="340" fill="#ffffff" rx="10"/>
<text x="330" y="30" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="15" fill="#3a4a96" font-weight="bold">Density comonad (Density = Lan f f)</text>
<text x="330" y="52" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#5872c9">data Density f a = forall b. Density (f b -&gt; a) (f b)</text>

<!-- Left: Lan f f triangle -->
<rect x="20" y="70" width="280" height="190" rx="8" fill="#f4e7cf" stroke="#d9a441" stroke-width="1.5"/>
<text x="160" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#8a6418" font-weight="bold">Lan f f &#8594; comonad</text>
<rect x="40" y="110" width="50" height="30" rx="5" fill="#f4e7cf" stroke="#d9a441"/>
<text x="65" y="130" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#8a6418">C</text>
<rect x="155" y="110" width="50" height="30" rx="5" fill="#f4e7cf" stroke="#d9a441"/>
<text x="180" y="130" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#8a6418">C</text>
<rect x="97" y="175" width="50" height="30" rx="5" fill="#f4e7cf" stroke="#8a6418"/>
<text x="122" y="195" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#8a6418">D</text>
<line x1="93" y1="125" x2="150" y2="125" stroke="#d9a441" stroke-width="2" marker-end="url(#arrOdn)"/>
<text x="122" y="118" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">f</text>
<line x1="60" y1="142" x2="108" y2="173" stroke="#d9a441" stroke-width="2" marker-end="url(#arrOdn)"/>
<text x="70" y="164" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">f</text>
<line x1="175" y1="142" x2="138" y2="173" stroke="#d9a441" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrOdn)"/>
<text x="170" y="164" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">Lan</text>
<text x="160" y="222" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">extract   :: Density f a -&gt; a</text>
<text x="160" y="238" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#8a6418">duplicate :: D f a -&gt; D f (D f a)</text>
<text x="160" y="254" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="10" fill="#d9a441">D = Density f  (every f gives a comonad)</text>

<!-- Right: examples -->
<rect x="320" y="70" width="320" height="190" rx="8" fill="#e9f4ee" stroke="#2f6f54" stroke-width="1.5"/>
<text x="480" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#2f6f54" font-weight="bold">Examples</text>
<text x="480" y="112" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">Density Identity = Store Identity</text>
<text x="480" y="128" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">  &#8773; Store s a (state comonad)</text>
<line x1="330" y1="140" x2="635" y2="140" stroke="#e9f4ee" stroke-width="1"/>
<text x="480" y="160" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3f9d77">Density [] = Stream []</text>
<text x="480" y="176" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3f9d77">  &#8773; ZipList comonad</text>
<line x1="330" y1="190" x2="635" y2="190" stroke="#e9f4ee" stroke-width="1"/>
<text x="480" y="210" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">Density ((-&gt;) e) = Traced e</text>
<text x="480" y="226" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">  &#8773; Writer/Traced comonad</text>
<text x="480" y="250" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="10" fill="#2f6f54">every functor f generates its own comonad</text>

<!-- Bottom -->
<rect x="20" y="275" width="620" height="52" rx="6" fill="#f7f8fa" stroke="#5872c9" stroke-width="1.2"/>
<text x="330" y="295" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#3a4a96" font-weight="bold">Symmetry: Codensity = Ran f f (monad)  vs  Density = Lan f f (comonad)</text>
<text x="330" y="314" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#5872c9">left/right Kan &#8596; comonad/monad &#8212; a deep duality</text>
</svg>
