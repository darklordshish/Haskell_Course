<svg xmlns="http://www.w3.org/2000/svg" width="600" height="280" viewBox="0 0 600 280" font-family="monospace,Arial,sans-serif">
<defs>
  <marker id="ma_arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="ma_arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="ma_arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#8b6db5"/>
  </marker>
</defs>
<rect width="600" height="280" fill="#ffffff"/>
<text x="300" y="30" text-anchor="middle" font-size="16" fill="#0f172a" font-weight="bold">Monad from an adjunction: T = g . f</text>

<!-- adjunction f -| g -->
<rect x="40" y="60" width="110" height="48" rx="8" fill="#eef1fb" stroke="#3a4a96" stroke-width="2"/>
<text x="95" y="89" text-anchor="middle" font-size="18" fill="#3a4a96" font-weight="bold">C</text>
<rect x="290" y="60" width="110" height="48" rx="8" fill="#efeaf6" stroke="#8b6db5" stroke-width="2"/>
<text x="345" y="89" text-anchor="middle" font-size="18" fill="#5f4a86" font-weight="bold">D</text>

<line x1="152" y1="76" x2="286" y2="76" stroke="#3a4a96" stroke-width="2" marker-end="url(#ma_arrB)"/>
<text x="219" y="68" text-anchor="middle" font-size="13" fill="#3a4a96">f</text>
<line x1="286" y1="96" x2="152" y2="96" stroke="#8b6db5" stroke-width="2" marker-end="url(#ma_arrP)"/>
<text x="219" y="112" text-anchor="middle" font-size="13" fill="#8b6db5">g</text>
<text x="219" y="92" text-anchor="middle" font-size="13" fill="#3a4a96">f -| g</text>

<!-- composite T -->
<rect x="430" y="60" width="140" height="48" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="2"/>
<text x="500" y="80" text-anchor="middle" font-size="13" fill="#2f6f54" font-weight="bold">T = g . f</text>
<text x="500" y="98" text-anchor="middle" font-size="11" fill="#2f6f54">monad on C</text>

<!-- structure -->
<rect x="40" y="135" width="520" height="56" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="300" y="158" text-anchor="middle" font-size="13" fill="#0f172a">return = &#951;       join = g . &#949; . f</text>
<text x="300" y="178" text-anchor="middle" font-size="11" fill="#3a4a96">unit &#951;: Id -&gt; g f = T,   counit &#949;: f g -&gt; Id   (triangle identities =&gt; monad laws)</text>

<!-- examples -->
<rect x="40" y="205" width="520" height="56" rx="6" fill="#eef1fb" stroke="#3a4a96" stroke-width="1.2"/>
<text x="300" y="225" text-anchor="middle" font-size="12" fill="#3a4a96" font-weight="bold">examples: adjunction =&gt; monad</text>
<text x="160" y="247" text-anchor="middle" font-size="11" fill="#3a4a96">(e,) -| (e-&gt;) =&gt; State</text>
<text x="320" y="247" text-anchor="middle" font-size="11" fill="#3a4a96">Free -| Forget =&gt; []</text>
<text x="470" y="247" text-anchor="middle" font-size="11" fill="#3a4a96">Maybe-str -| Id =&gt; Maybe</text>
</svg>
