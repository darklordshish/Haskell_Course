<text x="455" y="224" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#144422">newtype Ran g h a =</text>
<text x="455" y="240" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#226633">Ran { forall b. (a-&gt;g b)-&gt;h b }</text>
