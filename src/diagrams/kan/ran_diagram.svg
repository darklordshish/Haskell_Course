<rect width="600" height="380" fill="#ffffff" rx="10"/>
<text x="300" y="35" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="17" fill="#1a2a6a" font-weight="bold">Right Kan Extension (Ran)</text>
<text x="300" y="55" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#556688">Nat(f&#183;g, h) &#8773; Nat(f, Ran g h)</text>
