<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360">
<defs>
  <marker id="arrc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#334466"/>
  </marker>
  <marker id="arrGc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#228844"/>
  </marker>
  <marker id="arrBc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#2255cc"/>
  </marker>
</defs>
<rect width="680" height="360" fill="#ffffff" rx="10"/>
<text x="340" y="30" text-anchor="middle" font-family="monospace" font-size="15" fill="#e0e0ff" font-weight="bold">Codensity: CPS-&#1087;&#1088;&#1077;&#1086;&#1073;&#1088;&#1072;&#1079;&#1086;&#1074;&#1072;&#1085;&#1080;&#1077; &#1080; &#1086;&#1087;&#1090;&#1080;&#1084;&#1080;&#1079;&#1072;&#1094;&#1080;&#1103;</text>

<!-- Left: naive list -->
<rect x="20" y="50" width="300" height="140" rx="8" fill="#1a0a0a" stroke="#994444" stroke-width="1.5"/>
<text x="170" y="73" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff8888" font-weight="bold">&#1053;&#1072;&#1080;&#1074;&#1085;&#1072;&#1103; &#1089;&#1073;&#1086;&#1088;&#1082;&#1072; &#1089;&#1087;&#1080;&#1089;&#1082;&#1072;</text>
<text x="170" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc8888">foldl (++) [] [[1],[2],...,[n]]</text>
<text x="170" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc8888">= (...([] ++ [1]) ++ [2]) ++ [n]</text>
<!-- visual: left-leaning tree -->
<line x1="90" y1="140" x2="130" y2="160" stroke="#cc4444" stroke-width="1.5"/>
<line x1="130" y1="160" x2="160" y2="145" stroke="#cc4444" stroke-width="1.5"/>
<text x="90" y="137" font-family="monospace" font-size="10" fill="#ff6666">[1]</text>
<line x1="130" y1="162" x2="170" y2="182" stroke="#cc4444" stroke-width="1.5"/>
<line x1="170" y1="182" x2="200" y2="167" stroke="#cc4444" stroke-width="1.5"/>
<text x="165" y="165" font-family="monospace" font-size="10" fill="#ff6666">[2]</text>
<line x1="170" y1="184" x2="210" y2="180" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="218" y="182" font-family="monospace" font-size="10" fill="#ff6666">[n]</text>
<text x="170" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#884444">O(n^2) &#1079;&#1072; &#1089;&#1095;&#1077;&#1090; &#1087;&#1077;&#1088;&#1077;&#1089;&#1090;&#1088;&#1086;&#1081;&#1082;&#1080;</text>

<!-- Arrow -->
<line x1="323" y1="120" x2="355" y2="120" stroke="#ccaa00" stroke-width="2.5" marker-end="url(#arrc)"/>
<text x="339" y="111" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffdd44">codensity</text>
<text x="339" y="135" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffdd44">/ DList</text>

<!-- Right: DList/Codensity -->
<rect x="358" y="50" width="302" height="140" rx="8" fill="#0a1a0a" stroke="#226644" stroke-width="1.5"/>
<text x="509" y="73" text-anchor="middle" font-family="monospace" font-size="13" fill="#55cc77" font-weight="bold">DList = Codensity []</text>
<text x="509" y="95" text-anchor="middle" font-family="monospace" font-size="11" fill="#88cc88">DList = [a]-&gt;[a]</text>
<text x="509" y="113" text-anchor="middle" font-family="monospace" font-size="11" fill="#88cc88">singleton x = (x:)</text>
<text x="509" y="129" text-anchor="middle" font-family="monospace" font-size="11" fill="#88cc88">append f g = f . g</text>
<text x="509" y="145" text-anchor="middle" font-family="monospace" font-size="11" fill="#88cc88">toList f = f []</text>
<!-- visual: right-balanced tree -->
<line x1="460" y1="170" x2="490" y2="155" stroke="#228844" stroke-width="1.5"/>
<line x1="490" y1="155" x2="520" y2="170" stroke="#228844" stroke-width="1.5"/>
<line x1="520" y1="170" x2="545" y2="155" stroke="#228844" stroke-width="1.5"/>
<text x="450" y="183" font-family="monospace" font-size="10" fill="#55ff88">[1]</text>
<text x="518" y="183" font-family="monospace" font-size="10" fill="#55ff88">[2]</text>
<text x="538" y="152" font-family="monospace" font-size="10" fill="#55ff88">[n]</text>
<text x="509" y="118" text-anchor="middle" font-family="monospace" font-size="10" fill="#336644">O(n) &#1095;&#1077;&#1088;&#1077;&#1079; &#1087;&#1088;&#1072;&#1074;&#1086;&#1072;&#1089;&#1089;&#1086;&#1094;&#1080;&#1072;&#1090;&#1080;&#1074;&#1085;&#1086;&#1089;&#1090;&#1100;</text>

<!-- Bottom: general pattern -->
<rect x="20" y="225" width="640" height="120" rx="8" fill="#0a0a20" stroke="#334477" stroke-width="1.5"/>
<text x="340" y="247" text-anchor="middle" font-family="monospace" font-size="13" fill="#aaccff" font-weight="bold">&#1054;&#1073;&#1097;&#1080;&#1081; &#1087;&#1072;&#1090;&#1090;&#1077;&#1088;&#1085; Codensity &#1084;&#1086;&#1085;&#1072;&#1076;&#1099;</text>
<text x="340" y="268" text-anchor="middle" font-family="monospace" font-size="12" fill="#7788bb">liftCodensity :: m a -&gt; Codensity m a</text>
<text x="340" y="285" text-anchor="middle" font-family="monospace" font-size="12" fill="#7788bb">liftCodensity m = Codensity (m &gt;&gt;=)</text>
<text x="340" y="302" text-anchor="middle" font-family="monospace" font-size="12" fill="#7788bb">lowerCodensity :: Monad m =&gt; Codensity m a -&gt; m a</text>
<text x="340" y="319" text-anchor="middle" font-family="monospace" font-size="12" fill="#7788bb">lowerCodensity m = runCodensity m return</text>
<text x="340" y="337" text-anchor="middle" font-family="monospace" font-size="11" fill="#556688">-- &#1084;&#1086;&#1085;&#1072;&#1076;&#1072; &#1084;&#1077;&#1085;&#1103;&#1077;&#1090;&#1089;&#1103;, &#1085;&#1086; &#1089;&#1077;&#1084;&#1072;&#1085;&#1090;&#1080;&#1082;&#1072; &#1090;&#1072; &#1078;&#1077;: lift &#1086; lower = id</text>
</svg>