<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340" viewBox="0 0 660 340">
<defs>
  <marker id="arry" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3a4a96"/>
  </marker>
  <marker id="arrYy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#d9a441"/>
  </marker>
  <marker id="arrGy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#3f9d77"/>
  </marker>
</defs>
<rect width="660" height="340" fill="#ffffff" rx="10"/>
<text x="330" y="30" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="15" fill="#3a4a96" font-weight="bold">Yoneda lemma as Ran g=Id</text>
<text x="330" y="50" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#5872c9">Ran Id h a = forall b. (a -&gt; b) -&gt; h b  &#8773;  h a</text>

<!-- Left box: General Ran -->
<rect x="20" y="70" width="290" height="180" rx="8" fill="#eef1fb" stroke="#3a4a96" stroke-width="1.5"/>
<text x="165" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#3a4a96" font-weight="bold">General Ran g h</text>
<text x="165" y="113" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3a4a96">g : C &#8594; D, h : C &#8594; E</text>
<!-- Triangle -->
<rect x="40" y="128" width="50" height="32" rx="5" fill="#eef1fb" stroke="#5872c9"/>
<text x="65" y="149" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#3a4a96">C</text>
<rect x="155" y="128" width="50" height="32" rx="5" fill="#eef1fb" stroke="#5872c9"/>
<text x="180" y="149" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#3a4a96">D</text>
<rect x="97" y="192" width="50" height="32" rx="5" fill="#efeaf6" stroke="#8b6db5"/>
<text x="122" y="213" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#5f4a86">E</text>
<line x1="93" y1="144" x2="150" y2="144" stroke="#5872c9" stroke-width="2" marker-end="url(#arry)"/>
<text x="122" y="138" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3a4a96">g</text>
<line x1="60" y1="162" x2="108" y2="190" stroke="#c4625f" stroke-width="2" marker-end="url(#arry)"/>
<text x="72" y="182" font-family="monospace,Arial,sans-serif" font-size="11" fill="#c4625f">h</text>
<line x1="175" y1="162" x2="138" y2="190" stroke="#3f9d77" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrGy)"/>
<text x="170" y="184" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3f9d77">Ran</text>
<text x="165" y="240" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3a4a96">forall b. (a -&gt; g b) -&gt; h b</text>

<!-- Arrow specialise -->
<rect x="313" y="145" width="34" height="50" rx="6" fill="#f4e7cf" stroke="#d9a441"/>
<text x="330" y="164" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#d9a441">g</text>
<text x="330" y="178" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#d9a441">=</text>
<text x="330" y="192" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#d9a441">Id</text>
<line x1="348" y1="170" x2="375" y2="170" stroke="#d9a441" stroke-width="2" marker-end="url(#arrYy)"/>

<!-- Right box: Yoneda -->
<rect x="380" y="70" width="260" height="180" rx="8" fill="#e9f4ee" stroke="#3f9d77" stroke-width="1.5"/>
<text x="510" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#2f6f54" font-weight="bold">Yoneda lemma</text>
<text x="510" y="113" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">g = Id : C &#8594; C</text>
<text x="510" y="143" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#3f9d77">Ran Id h a</text>
<text x="510" y="163" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#2f6f54">= forall b.(a-&gt;b)-&gt;h b</text>
<text x="510" y="183" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#2f6f54">&#8773; h a</text>
<rect x="395" y="200" width="230" height="38" rx="5" fill="#e9f4ee" stroke="#2f6f54"/>
<text x="510" y="216" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">Nat(Hom(a,-), h) &#8773; h a</text>
<text x="510" y="230" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2f6f54">bijection on natural transformations</text>

<!-- Bottom note -->
<rect x="20" y="268" width="620" height="58" rx="8" fill="#f7f8fa" stroke="#3a4a96" stroke-width="1.2"/>
<text x="330" y="288" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#3a4a96" font-weight="bold">Haskell: Yoneda [] a = forall b. (a -&gt; b) -&gt; [b]  &#8773;  [a]</text>
<text x="330" y="306" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#3a4a96">list representation via universal property</text>
<text x="330" y="320" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#5872c9">toYoneda :: [a] -&gt; (forall b.(a-&gt;b)-&gt;[b]);  fromYoneda :: (forall b.(a-&gt;b)-&gt;[b]) -&gt; [a]</text>
</svg>
