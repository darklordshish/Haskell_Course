<svg xmlns="http://www.w3.org/2000/svg" width="660" height="340">
<defs>
  <marker id="arry" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#334466"/>
  </marker>
  <marker id="arrYy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#ccaa00"/>
  </marker>
  <marker id="arrGy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#228844"/>
  </marker>
</defs>
<rect width="660" height="340" fill="#ffffff" rx="10"/>
<text x="330" y="30" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="15" fill="#1a2a6a" font-weight="bold">Yoneda lemma as Ran g=Id</text>
<text x="330" y="50" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#556688">Ran Id h a = forall b. (a -&gt; b) -&gt; h b  &#8773;  h a</text>

<!-- Left box: General Ran -->
<rect x="20" y="70" width="290" height="180" rx="8" fill="#dbeafe" stroke="#2255aa" stroke-width="1.5"/>
<text x="165" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#1a3a88" font-weight="bold">General Ran g h</text>
<text x="165" y="113" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#334466">g : C &#8594; D, h : C &#8594; E</text>
<!-- Triangle -->
<rect x="40" y="128" width="50" height="32" rx="5" fill="#bfdbfe" stroke="#4477bb"/>
<text x="65" y="149" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#1a3a88">C</text>
<rect x="155" y="128" width="50" height="32" rx="5" fill="#bfdbfe" stroke="#4477bb"/>
<text x="180" y="149" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#1a3a88">D</text>
<rect x="97" y="192" width="50" height="32" rx="5" fill="#ede9fe" stroke="#7733bb"/>
<text x="122" y="213" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="14" fill="#4422aa">E</text>
<line x1="93" y1="144" x2="150" y2="144" stroke="#4488dd" stroke-width="2" marker-end="url(#arry)"/>
<text x="122" y="138" font-family="monospace,Arial,sans-serif" font-size="11" fill="#2255cc">g</text>
<line x1="60" y1="162" x2="108" y2="190" stroke="#cc4444" stroke-width="2" marker-end="url(#arry)"/>
<text x="72" y="182" font-family="monospace,Arial,sans-serif" font-size="11" fill="#cc4444">h</text>
<line x1="175" y1="162" x2="138" y2="190" stroke="#228844" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrGy)"/>
<text x="170" y="184" font-family="monospace,Arial,sans-serif" font-size="11" fill="#228844">Ran</text>
<text x="165" y="240" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#334466">forall b. (a -&gt; g b) -&gt; h b</text>

<!-- Arrow specialise -->
<rect x="313" y="145" width="34" height="50" rx="6" fill="#fef9c3" stroke="#aa8800"/>
<text x="330" y="164" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#886600">g</text>
<text x="330" y="178" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#886600">=</text>
<text x="330" y="192" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#886600">Id</text>
<line x1="348" y1="170" x2="375" y2="170" stroke="#ccaa00" stroke-width="2" marker-end="url(#arrYy)"/>

<!-- Right box: Yoneda -->
<rect x="380" y="70" width="260" height="180" rx="8" fill="#dcfce7" stroke="#226644" stroke-width="1.5"/>
<text x="510" y="93" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="13" fill="#144422" font-weight="bold">Yoneda lemma</text>
<text x="510" y="113" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#226633">g = Id : C &#8594; C</text>
<text x="510" y="143" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#228844">Ran Id h a</text>
<text x="510" y="163" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#116633">= forall b.(a-&gt;b)-&gt;h b</text>
<text x="510" y="183" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#0a4422">&#8773; h a</text>
<rect x="395" y="200" width="230" height="38" rx="5" fill="#bbf7d0" stroke="#115522"/>
<text x="510" y="216" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#144422">Nat(Hom(a,-), h) &#8773; h a</text>
<text x="510" y="230" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#226633">bijection on natural transformations</text>

<!-- Bottom note -->
<rect x="20" y="268" width="620" height="58" rx="8" fill="#f1f5f9" stroke="#334466" stroke-width="1.2"/>
<text x="330" y="288" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="12" fill="#1a2a6a" font-weight="bold">Haskell: Yoneda [] a = forall b. (a -&gt; b) -&gt; [b]  &#8773;  [a]</text>
<text x="330" y="306" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#334466">list representation via universal property</text>
<text x="330" y="320" text-anchor="middle" font-family="monospace,Arial,sans-serif" font-size="11" fill="#556688">toYoneda :: [a] -&gt; (forall b.(a-&gt;b)-&gt;[b]);  fromYoneda :: (forall b.(a-&gt;b)-&gt;[b]) -&gt; [a]</text>
</svg>
