<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8a93a3"/>
    </marker>
  </defs>
  <rect width="760" height="320" fill="#ffffff" rx="8"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Template Haskell: Compilation Stages</text>

  <!-- Stage 1: Source -->
  <rect x="20" y="60" width="130" height="70" rx="8" fill="#3a4a96" stroke="#3a4a96" stroke-width="1.5"/>
  <text x="85" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a4a96">Source code</text>
  <text x="85" y="106" text-anchor="middle" font-size="10" fill="#5872c9">$(makeGet 'foo)</text>
  <text x="85" y="120" text-anchor="middle" font-size="10" fill="#8a93a3">TH-splice</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="95" x2="190" y2="95" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="171" y="88" text-anchor="middle" font-size="9" fill="#8a93a3">parse</text>

  <!-- Stage 2: AST + Q-monad -->
  <rect x="190" y="60" width="130" height="70" rx="8" fill="#2f6f54" stroke="#3f9d77" stroke-width="1.5"/>
  <text x="255" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#3f9d77">AST + Q monad</text>
  <text x="255" y="106" text-anchor="middle" font-size="10" fill="#3f9d77">runQ :: Q a -&gt; IO a</text>
  <text x="255" y="120" text-anchor="middle" font-size="10" fill="#8a93a3">reify, newName</text>

  <!-- Arrow 2 -->
  <line x1="322" y1="95" x2="360" y2="95" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="341" y="88" text-anchor="middle" font-size="9" fill="#8a93a3">splice</text>

  <!-- Stage 3: Code Gen -->
  <rect x="360" y="60" width="130" height="70" rx="8" fill="#8a6418" stroke="#8a6418" stroke-width="1.5"/>
  <text x="425" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#8a6418">Code generation</text>
  <text x="425" y="106" text-anchor="middle" font-size="10" fill="#d9a441">Dec, Exp, Type</text>
  <text x="425" y="120" text-anchor="middle" font-size="10" fill="#8a93a3">Haskell AST</text>

  <!-- Arrow 3 -->
  <line x1="492" y1="95" x2="530" y2="95" stroke="#8a93a3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="511" y="88" text-anchor="middle" font-size="9" fill="#8a93a3">insert</text>

  <!-- Stage 4: Compiled -->
  <rect x="530" y="60" width="130" height="70" rx="8" fill="#5f4a86" stroke="#8b6db5" stroke-width="1.5"/>
  <text x="595" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#efeaf6">Compiled</text>
  <text x="595" y="106" text-anchor="middle" font-size="10" fill="#5f4a86">getFoo :: Foo -&gt; Int</text>
  <text x="595" y="120" text-anchor="middle" font-size="10" fill="#8a93a3">normal Haskell</text>

  <!-- Q Monad capabilities -->
  <rect x="20" y="160" width="720" height="130" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="380" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Q Monad capabilities</text>

  <!-- 4 capability boxes -->
  <rect x="35" y="195" width="160" height="78" rx="6" fill="#3a4a96" stroke="#3a4a96" stroke-width="1"/>
  <text x="115" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#3a4a96">Quotation</text>
  <text x="115" y="232" text-anchor="middle" font-size="10" fill="#5872c9">[| expr |]</text>
  <text x="115" y="248" text-anchor="middle" font-size="10" fill="#5872c9">[d| decl |]</text>
  <text x="115" y="264" text-anchor="middle" font-size="10" fill="#5872c9">[t| Type |]</text>

  <rect x="210" y="195" width="160" height="78" rx="6" fill="#2f6f54" stroke="#3f9d77" stroke-width="1"/>
  <text x="290" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#3f9d77">Splicing</text>
  <text x="290" y="232" text-anchor="middle" font-size="10" fill="#3f9d77">$(expr)</text>
  <text x="290" y="248" text-anchor="middle" font-size="10" fill="#3f9d77">insert into code</text>
  <text x="290" y="264" text-anchor="middle" font-size="10" fill="#8a93a3">compile-time</text>

  <rect x="385" y="195" width="160" height="78" rx="6" fill="#8a6418" stroke="#8a6418" stroke-width="1"/>
  <text x="465" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#8a6418">Reflection</text>
  <text x="465" y="232" text-anchor="middle" font-size="10" fill="#d9a441">reify ''Type</text>
  <text x="465" y="248" text-anchor="middle" font-size="10" fill="#d9a441">Info about types</text>
  <text x="465" y="264" text-anchor="middle" font-size="10" fill="#8a93a3">and functions</text>

  <rect x="560" y="195" width="165" height="78" rx="6" fill="#5f4a86" stroke="#8b6db5" stroke-width="1"/>
  <text x="643" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#efeaf6">New names</text>
  <text x="643" y="232" text-anchor="middle" font-size="10" fill="#5f4a86">newName "x"</text>
  <text x="643" y="248" text-anchor="middle" font-size="10" fill="#5f4a86">unique</text>
  <text x="643" y="264" text-anchor="middle" font-size="10" fill="#8a93a3">identifiers</text>
</svg>