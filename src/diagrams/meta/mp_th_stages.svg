<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="760" height="320" fill="#ffffff" rx="8"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Template Haskell: Compilation Stages</text>

  <!-- Stage 1: Source -->
  <rect x="20" y="60" width="130" height="70" rx="8" fill="#0c2340" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="85" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Source code</text>
  <text x="85" y="106" text-anchor="middle" font-size="10" fill="#2563eb">$(makeGet 'foo)</text>
  <text x="85" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">TH-splice</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="95" x2="190" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="171" y="88" text-anchor="middle" font-size="9" fill="#64748b">parse</text>

  <!-- Stage 2: AST + Q-monad -->
  <rect x="190" y="60" width="130" height="70" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="255" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">AST + Q monad</text>
  <text x="255" y="106" text-anchor="middle" font-size="10" fill="#16a34a">runQ :: Q a -&gt; IO a</text>
  <text x="255" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">reify, newName</text>

  <!-- Arrow 2 -->
  <line x1="322" y1="95" x2="360" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="341" y="88" text-anchor="middle" font-size="9" fill="#64748b">splice</text>

  <!-- Stage 3: Code Gen -->
  <rect x="360" y="60" width="130" height="70" rx="8" fill="#1c1306" stroke="#b45309" stroke-width="1.5"/>
  <text x="425" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Code generation</text>
  <text x="425" y="106" text-anchor="middle" font-size="10" fill="#d97706">Dec, Exp, Type</text>
  <text x="425" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">Haskell AST</text>

  <!-- Arrow 3 -->
  <line x1="492" y1="95" x2="530" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="511" y="88" text-anchor="middle" font-size="9" fill="#64748b">insert</text>

  <!-- Stage 4: Compiled -->
  <rect x="530" y="60" width="130" height="70" rx="8" fill="#2d1b4e" stroke="#9333ea" stroke-width="1.5"/>
  <text x="595" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#e9d5ff">Compiled</text>
  <text x="595" y="106" text-anchor="middle" font-size="10" fill="#6d28d9">getFoo :: Foo -&gt; Int</text>
  <text x="595" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">normal Haskell</text>

  <!-- Q Monad capabilities -->
  <rect x="20" y="160" width="720" height="130" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="380" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Q Monad capabilities</text>

  <!-- 4 capability boxes -->
  <rect x="35" y="195" width="160" height="78" rx="6" fill="#0c2340" stroke="#1d4ed8" stroke-width="1"/>
  <text x="115" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Quotation</text>
  <text x="115" y="232" text-anchor="middle" font-size="10" fill="#2563eb">[| expr |]</text>
  <text x="115" y="248" text-anchor="middle" font-size="10" fill="#2563eb">[d| decl |]</text>
  <text x="115" y="264" text-anchor="middle" font-size="10" fill="#2563eb">[t| Type |]</text>

  <rect x="210" y="195" width="160" height="78" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="290" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Splicing</text>
  <text x="290" y="232" text-anchor="middle" font-size="10" fill="#16a34a">$(expr)</text>
  <text x="290" y="248" text-anchor="middle" font-size="10" fill="#16a34a">insert into code</text>
  <text x="290" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">compile-time</text>

  <rect x="385" y="195" width="160" height="78" rx="6" fill="#1c1306" stroke="#b45309" stroke-width="1"/>
  <text x="465" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Reflection</text>
  <text x="465" y="232" text-anchor="middle" font-size="10" fill="#d97706">reify ''Type</text>
  <text x="465" y="248" text-anchor="middle" font-size="10" fill="#d97706">Info about types</text>
  <text x="465" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">and functions</text>

  <rect x="560" y="195" width="165" height="78" rx="6" fill="#2d1b4e" stroke="#9333ea" stroke-width="1"/>
  <text x="643" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#e9d5ff">New names</text>
  <text x="643" y="232" text-anchor="middle" font-size="10" fill="#6d28d9">newName "x"</text>
  <text x="643" y="248" text-anchor="middle" font-size="10" fill="#6d28d9">unique</text>
  <text x="643" y="264" text-anchor="middle" font-size="10" fill="#94a3b8">identifiers</text>
</svg>