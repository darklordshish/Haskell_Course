<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340" font-family="monospace,Arial,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8a93a3"/>
    </marker>
  </defs>
  <rect width="760" height="340" fill="#ffffff" rx="8"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">GHC.Generics: ADT Representation</text>

  <!-- Source ADT -->
  <rect x="20" y="50" width="200" height="110" rx="8" fill="#3a4a96" stroke="#3a4a96" stroke-width="1.5"/>
  <text x="120" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a4a96">Haskell ADT</text>
  <text x="120" y="92" text-anchor="middle" font-size="10" fill="#5872c9">data Shape</text>
  <text x="120" y="108" text-anchor="middle" font-size="10" fill="#5872c9"> = Circle Double</text>
  <text x="120" y="124" text-anchor="middle" font-size="10" fill="#5872c9"> | Rect Double Double</text>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="#5872c9"> deriving Generic</text>
  <text x="120" y="155" text-anchor="middle" font-size="9" fill="#3a4a96">class Generic</text>

  <!-- Big Arrow -->
  <line x1="222" y1="105" x2="265" y2="105" stroke="#8a93a3" stroke-width="2.5" marker-end="url(#arr2)"/>
  <text x="243" y="96" text-anchor="middle" font-size="9" fill="#8a93a3">Rep</text>

  <!-- Generic Rep box -->
  <rect x="265" y="50" width="470" height="230" rx="8" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="500" y="73" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">Generic Rep (structural representation)</text>

  <!-- D1 / M1 -->
  <rect x="280" y="85" width="440" height="180" rx="6" fill="#8a6418" stroke="#8a6418" stroke-width="1.5"/>
  <text x="290" y="103" font-size="10" font-weight="bold" fill="#8a6418">D1 (type metadata)</text>

  <!-- C1 Circle -->
  <rect x="295" y="110" width="190" height="140" rx="5" fill="#2f6f54" stroke="#3f9d77" stroke-width="1"/>
  <text x="305" y="128" font-size="10" font-weight="bold" fill="#3f9d77">C1 Circle</text>
  <rect x="310" y="135" width="165" height="104" rx="4" fill="#2f6f54" stroke="#3f9d77" stroke-width="1"/>
  <text x="320" y="153" font-size="10" fill="#3f9d77">S1 (field Double)</text>
  <rect x="325" y="160" width="135" height="68" rx="3" fill="#2f6f54" stroke="#3f9d77" stroke-width="1"/>
  <text x="393" y="178" text-anchor="middle" font-size="10" fill="#3f9d77">Rec0 Double</text>
  <text x="393" y="195" text-anchor="middle" font-size="10" fill="#8a93a3">(primitive)</text>
  <text x="393" y="212" text-anchor="middle" font-size="9" fill="#8a93a3">K1 R Double</text>
  <text x="393" y="228" text-anchor="middle" font-size="9" fill="#8a93a3">= Rec0 Double</text>

  <!-- :+: combinator -->
  <text x="497" y="190" text-anchor="middle" font-size="18" font-weight="bold" fill="#8a93a3">:+:</text>
  <text x="497" y="207" text-anchor="middle" font-size="9" fill="#8a93a3">sum</text>

  <!-- C1 Rect -->
  <rect x="515" y="110" width="195" height="140" rx="5" fill="#5f4a86" stroke="#8b6db5" stroke-width="1"/>
  <text x="525" y="128" font-size="10" font-weight="bold" fill="#efeaf6">C1 Rect</text>
  <rect x="530" y="135" width="165" height="104" rx="4" fill="#5f4a86" stroke="#8b6db5" stroke-width="1"/>
  <text x="612" y="153" text-anchor="middle" font-size="10" fill="#5f4a86">S1 :*: S1</text>
  <text x="560" y="170" text-anchor="middle" font-size="9" fill="#5f4a86">Rec0 Double</text>
  <text x="580" y="185" text-anchor="middle" font-size="12" fill="#8b6db5">:*:</text>
  <text x="580" y="197" text-anchor="middle" font-size="9" fill="#8a93a3">product</text>
  <text x="660" y="170" text-anchor="middle" font-size="9" fill="#5f4a86">Rec0 Double</text>
  <text x="612" y="228" text-anchor="middle" font-size="9" fill="#8a93a3">width :*: height</text>

  <!-- Bottom legend -->
  <rect x="20" y="295" width="720" height="34" rx="6" fill="#f7f8fa" stroke="#cbd5e1" stroke-width="1"/>
  <text x="380" y="311" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Combinators: U1 (empty) | V1 (void) | K1 (primitive) | M1 (meta) | :+: (sum) | :*: (product)</text>
  <text x="380" y="323" text-anchor="middle" font-size="10" fill="#8a93a3">from :: a -&gt; Rep a x  |  to :: Rep a x -&gt; a</text>
</svg>