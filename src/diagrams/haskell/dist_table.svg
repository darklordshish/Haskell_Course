<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" font-family="monospace,Arial,sans-serif">
  <rect width="700" height="220" fill="#ffffff" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="700" height="36" fill="#f7f8fa" rx="8"/>
  <rect x="0" y="28" width="700" height="8" fill="#f7f8fa"/>
  <text x="350" y="23" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Categorical View: Unified Picture</text>

  <!-- Column headers -->
  <rect x="10" y="44" width="215" height="28" fill="#eef1fb" rx="4"/>
  <text x="117" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Concept</text>

  <rect x="235" y="44" width="215" height="28" fill="#eef1fb" rx="4"/>
  <text x="342" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Categorical Object</text>

  <rect x="460" y="44" width="228" height="28" fill="#eef1fb" rx="4"/>
  <text x="574" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#5872c9">Categorical Morphism</text>

  <!-- Row 1 -->
  <rect x="10" y="80" width="215" height="28" fill="#f7f8fa" rx="3"/>
  <text x="117" y="98" text-anchor="middle" font-size="11" fill="#8b6db5">Pi-calculus</text>
  <rect x="235" y="80" width="215" height="28" fill="#f7f8fa" rx="3"/>
  <text x="342" y="98" text-anchor="middle" font-size="10" fill="#8a93a3">channel types</text>
  <rect x="460" y="80" width="228" height="28" fill="#f7f8fa" rx="3"/>
  <text x="574" y="98" text-anchor="middle" font-size="10" fill="#8a93a3">processes</text>

  <!-- Row 2 -->
  <rect x="10" y="116" width="215" height="28" fill="#eef1fb" rx="3"/>
  <text x="117" y="134" text-anchor="middle" font-size="11" fill="#8b6db5">Cloud Haskell</text>
  <rect x="235" y="116" width="215" height="28" fill="#eef1fb" rx="3"/>
  <text x="342" y="134" text-anchor="middle" font-size="10" fill="#8a93a3">actors (ProcessId)</text>
  <rect x="460" y="116" width="228" height="28" fill="#eef1fb" rx="3"/>
  <text x="574" y="134" text-anchor="middle" font-size="10" fill="#8a93a3">messages</text>

  <!-- Row 3 -->
  <rect x="10" y="152" width="215" height="28" fill="#f7f8fa" rx="3"/>
  <text x="117" y="170" text-anchor="middle" font-size="11" fill="#8b6db5">CRDT</text>
  <rect x="235" y="152" width="215" height="28" fill="#f7f8fa" rx="3"/>
  <text x="342" y="170" text-anchor="middle" font-size="10" fill="#8a93a3">node states</text>
  <rect x="460" y="152" width="228" height="28" fill="#f7f8fa" rx="3"/>
  <text x="574" y="170" text-anchor="middle" font-size="10" fill="#8a93a3">merge (semilattice)</text>

  <!-- Row 4 -->
  <rect x="10" y="188" width="215" height="28" fill="#eef1fb" rx="3"/>
  <text x="117" y="206" text-anchor="middle" font-size="11" fill="#8b6db5">MapReduce</text>
  <rect x="235" y="188" width="215" height="28" fill="#eef1fb" rx="3"/>
  <text x="342" y="206" text-anchor="middle" font-size="10" fill="#8a93a3">data shards</text>
  <rect x="460" y="188" width="228" height="28" fill="#eef1fb" rx="3"/>
  <text x="574" y="206" text-anchor="middle" font-size="10" fill="#8a93a3">mapper and reducer</text>
</svg>
